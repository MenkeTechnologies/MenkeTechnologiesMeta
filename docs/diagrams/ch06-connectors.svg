<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" font-family="'Share Tech Mono', ui-monospace, monospace">
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L8 4.5 L0 9 Z" fill="#05d9e8"/>
    </marker>
    <marker id="ahm" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L8 4.5 L0 9 Z" fill="#7a8ba8"/>
    </marker>
    <style>
      .t     { fill:#e0f0ff; font-size:12px; }
      .dim   { fill:#7a8ba8; font-size:11px; }
      .cyan  { fill:#05d9e8; }
      .mag   { fill:#d300c5; }
      .pink  { fill:#ff6b9d; }
      .green { fill:#39ff14; }
      .title { font-family:'Orbitron', sans-serif; font-weight:700; }
      .h     { fill:#05d9e8; font-size:13px; font-family:'Orbitron', sans-serif; font-weight:700; }
      .box   { fill:#0d0d1a; stroke:#05d9e8; stroke-width:1.5; }
      .jitbx { fill:#0d0d1a; stroke:#d300c5; stroke-width:1.5; }
      .aotbx { fill:#0d0d1a; stroke:#ff2a6d; stroke-width:1.5; }
      .optbx { fill:#0b140b; stroke:#39ff14; stroke-width:1.4; }
      .chip  { fill:#10102a; stroke:#1a1a3e; stroke-width:1; }
      .sub   { fill:#10102a; stroke:#2a1a4e; stroke-width:1; }
      .arrow { stroke:#05d9e8; stroke-width:1.6; fill:none; marker-end:url(#ah); }
      .dash  { stroke:#7a8ba8; stroke-width:1.1; stroke-dasharray:4 3; fill:none; marker-end:url(#ahm); }
    </style>
  </defs>

  <rect x="0" y="0" width="1000" height="500" fill="#0a0a14"/>
  <rect x="2" y="2" width="996" height="496" fill="none" stroke="#1a1a3e" stroke-width="1"/>

  <text x="24" y="34" class="title" fill="#05d9e8" font-size="19">THE CONNECTOR ECOSYSTEM &#8212; ONE LANGUAGE, MANY REPOS</text>
  <text x="24" y="52" class="dim">one strykelang core &#8594; 31 first-party stryke-* connector repos, grouped by backend category</text>
  <rect x="812" y="38" width="166" height="21" rx="4" class="chip"/>
  <text x="895" y="53" class="cyan" text-anchor="middle" font-size="11">31 connector repos</text>

  <!-- ===== ROW 1 : four cluster boxes ===== -->
  <rect x="20"  y="78" width="228" height="112" rx="4" class="box"/>
  <text x="32"  y="100" class="cyan title" font-size="12">DATABASES &#183; 9</text>
  <text x="32"  y="122" class="dim" font-size="10.5">postgres &#183; mysql &#183; mssql</text>
  <text x="32"  y="140" class="dim" font-size="10.5">mongo &#183; redis &#183; scylla</text>
  <text x="32"  y="158" class="dim" font-size="10.5">clickhouse &#183; duckdb</text>
  <text x="32"  y="176" class="dim" font-size="10.5">neo4j</text>

  <rect x="262" y="78" width="228" height="112" rx="4" class="box"/>
  <text x="274" y="100" class="cyan title" font-size="12">COLUMNAR / DATA &#183; 4</text>
  <text x="274" y="124" class="dim" font-size="10.5">arrow &#183; parquet</text>
  <text x="274" y="142" class="dim" font-size="10.5">polars &#183; spark</text>

  <rect x="504" y="78" width="228" height="112" rx="4" class="box"/>
  <text x="516" y="100" class="cyan title" font-size="12">CLOUD &#183; 3</text>
  <text x="516" y="124" class="dim" font-size="10.5">aws &#183; gcp &#183; azure</text>

  <rect x="746" y="78" width="228" height="112" rx="4" class="box"/>
  <text x="758" y="100" class="cyan title" font-size="12">MESSAGING / RPC &#183; 3</text>
  <text x="758" y="124" class="dim" font-size="10.5">kafka &#183; zmq &#183; grpc</text>

  <!-- ===== ROW 2 : side clusters + core hub ===== -->
  <rect x="20"  y="206" width="228" height="96" rx="4" class="box"/>
  <text x="32"  y="228" class="cyan title" font-size="12">ORCHESTRATION &#183; 2</text>
  <text x="32"  y="252" class="dim" font-size="10.5">docker &#183; k8s</text>

  <rect x="310" y="210" width="380" height="88" rx="4" class="box"/>
  <text x="500" y="240" class="cyan title" font-size="14" text-anchor="middle">strykelang core</text>
  <text x="500" y="261" class="dim"  text-anchor="middle">the language + fusevm runtime</text>
  <text x="500" y="280" class="green" font-size="10.5" text-anchor="middle">one surface, one installer: s install</text>

  <rect x="746" y="206" width="228" height="96" rx="4" class="box"/>
  <text x="758" y="228" class="cyan title" font-size="12">SEARCH / OFFICE &#183; 2</text>
  <text x="758" y="252" class="dim" font-size="10.5">search &#183; office</text>

  <!-- ===== ROW 3 : three cluster boxes ===== -->
  <rect x="20"  y="322" width="300" height="110" rx="4" class="box"/>
  <text x="32"  y="344" class="cyan title" font-size="12">WEB / GUI AUTOMATION &#183; 3</text>
  <text x="32"  y="368" class="dim" font-size="10.5">scrape &#183; selenium &#183; gui</text>

  <rect x="350" y="322" width="300" height="110" rx="4" class="box"/>
  <text x="362" y="344" class="cyan title" font-size="12">COMM / AGENTS &#183; 3</text>
  <text x="362" y="368" class="dim" font-size="10.5">email &#183; mcpd &#183; fleet</text>

  <rect x="680" y="322" width="300" height="110" rx="4" class="box"/>
  <text x="692" y="344" class="cyan title" font-size="12">META / TOOLING &#183; 2</text>
  <text x="692" y="368" class="dim" font-size="10.5">demo &#183; utils</text>

  <!-- ===== HUB LINKS ===== -->
  <path d="M420 212 L134 190" class="arrow"/>
  <path d="M470 212 L376 190" class="arrow"/>
  <path d="M530 212 L618 190" class="arrow"/>
  <path d="M580 212 L860 190" class="arrow"/>

  <path d="M310 250 L248 252" class="arrow"/>
  <path d="M690 250 L746 252" class="arrow"/>

  <path d="M430 298 L170 322" class="arrow"/>
  <path d="M500 298 L500 322" class="arrow"/>
  <path d="M570 298 L830 322" class="arrow"/>

  <text x="24" y="478" class="dim" font-size="10">one language surface &#8212; the breadth of a full data ecosystem grown from a single language &#183; stryke-*</text>
</svg>
