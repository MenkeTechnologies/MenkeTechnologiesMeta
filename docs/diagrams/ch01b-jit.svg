<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" font-family="'Share Tech Mono', ui-monospace, monospace">
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L8 4.5 L0 9 Z" fill="#05d9e8"/>
    </marker>
    <marker id="ahm" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L8 4.5 L0 9 Z" fill="#7a8ba8"/>
    </marker>
    <style>
      .t     { fill:#e0f0ff; font-size:12px; }
      .dim   { fill:#7a8ba8; font-size:11px; }
      .cyan  { fill:#05d9e8; }
      .mag   { fill:#d300c5; }
      .pink  { fill:#ff6b9d; }
      .green { fill:#39ff14; }
      .title { font-family:'Orbitron', sans-serif; font-weight:700; }
      .h     { fill:#05d9e8; font-size:13px; font-family:'Orbitron', sans-serif; font-weight:700; }
      .box   { fill:#0d0d1a; stroke:#05d9e8; stroke-width:1.5; }
      .jitbx { fill:#0d0d1a; stroke:#d300c5; stroke-width:1.5; }
      .aotbx { fill:#0d0d1a; stroke:#ff2a6d; stroke-width:1.5; }
      .optbx { fill:#0b140b; stroke:#39ff14; stroke-width:1.4; }
      .chip  { fill:#10102a; stroke:#1a1a3e; stroke-width:1; }
      .sub   { fill:#10102a; stroke:#2a1a4e; stroke-width:1; }
      .arrow { stroke:#05d9e8; stroke-width:1.6; fill:none; marker-end:url(#ah); }
      .dash  { stroke:#7a8ba8; stroke-width:1.1; stroke-dasharray:4 3; fill:none; marker-end:url(#ahm); }
    </style>
  </defs>

  <rect x="0" y="0" width="1000" height="600" fill="#0a0a14"/>
  <rect x="2" y="2" width="996" height="596" fill="none" stroke="#1a1a3e" stroke-width="1"/>

  <text x="24" y="34" class="title" fill="#05d9e8" font-size="19">FUSEVM JIT &#8212; TRACING, DEOPT, SIDE-TRACES</text>
  <text x="24" y="52" class="dim">a hot loop trace-records across frames, lowers to native machine code, guards its speculation, and deopts back into the interpreter</text>

  <!-- ===== INTERPRETER (cyan) ===== -->
  <rect x="20" y="70" width="955" height="74" rx="4" class="box"/>
  <text x="38" y="92" class="h">INTERPRETER</text>
  <text x="38" y="112" class="dim">runs fusevm bytecode through <tspan class="cyan">VM::exec_op</tspan> &#8212; the semantic source of truth &#183; always available</text>
  <text x="38" y="130" class="dim">a hot loop or call-site trips its execution counter past the JIT threshold and the tracer takes over</text>

  <path d="M120 144 L120 185" class="arrow"/>
  <text x="130" y="170" class="dim" font-size="10.5">hot counter trips threshold</text>

  <!-- ===== TRACE RECORDING (jitbx) ===== -->
  <rect x="20" y="185" width="310" height="180" rx="4" class="jitbx"/>
  <text x="38" y="208" class="title" fill="#d300c5" font-size="13">TRACE RECORDING</text>
  <text x="38" y="228" class="dim">one linear trace through branches</text>
  <rect x="38" y="240" width="274" height="26" rx="3" class="chip"/>
  <text x="175" y="258" class="cyan" text-anchor="middle" font-size="11">MAX_INLINE_RECURSION = 4</text>
  <text x="38" y="288" class="dim">&#8250; inlines calls (bounded self-recursion)</text>
  <text x="38" y="306" class="dim">&#8250; spans caller + inlined-callee frames</text>
  <text x="38" y="324" class="dim">&#8250; guards inserted along the path</text>
  <text x="38" y="352" class="mag" font-size="10.5">recorded across frames</text>

  <path d="M330 275 L342 275" class="arrow"/>

  <!-- ===== LOWER TO NATIVE (jitbx) ===== -->
  <rect x="342" y="185" width="300" height="180" rx="4" class="jitbx"/>
  <text x="360" y="208" class="title" fill="#d300c5" font-size="13">LOWER &#8594; NATIVE</text>
  <text x="360" y="228" class="dim">Cranelift IR &#8594; machine code</text>
  <rect x="360" y="240" width="264" height="26" rx="3" class="chip"/>
  <text x="492" y="258" class="cyan" text-anchor="middle" font-size="11">cranelift_jit::JITModule</text>
  <text x="360" y="288" class="dim">&#8250; finalized fn &#8594; native fn pointer</text>
  <text x="360" y="306" class="dim">&#8250; mmap + PROT_EXEC on-disk cache</text>
  <text x="360" y="324" class="dim">&#8250; cache survives process restarts</text>
  <text x="360" y="352" class="mag" font-size="10.5">native code generated at runtime</text>

  <path d="M642 275 L654 275" class="arrow"/>

  <!-- ===== GUARDS + SIDE TRACES (jitbx) ===== -->
  <rect x="654" y="185" width="321" height="180" rx="4" class="jitbx"/>
  <text x="672" y="208" class="title" fill="#d300c5" font-size="13">GUARDS + SIDE TRACES</text>
  <text x="672" y="228" class="dim">a guard at each speculative point</text>
  <rect x="672" y="240" width="285" height="26" rx="3" class="chip"/>
  <text x="814" y="258" class="cyan" text-anchor="middle" font-size="11">MAX_TRACE_CHAIN = 4</text>
  <text x="672" y="288" class="dim">&#8250; guard holds &#8594; stay in native</text>
  <text x="672" y="306" class="dim">&#8250; hot side-exit stitches a side trace</text>
  <text x="672" y="324" class="dim">&#8250; side-trace chain, hard-bounded</text>
  <text x="672" y="352" class="mag" font-size="10.5">speculation, checked each step</text>

  <path d="M814 365 L814 430" class="arrow"/>
  <text x="822" y="402" class="dim" font-size="10.5">cold / failed guard</text>

  <!-- ===== DEOPT (cyan) ===== -->
  <rect x="20" y="430" width="955" height="100" rx="4" class="box"/>
  <text x="38" y="453" class="h">DEOPT &#8212; materialize_deopt_frames()  &#183; vm.rs</text>
  <text x="38" y="473" class="dim">a cold or failed guard bails out of native and reconstructs full interpreter state:</text>
  <rect x="38" y="482" width="150" height="26" rx="3" class="sub"/>
  <text x="113" y="500" class="cyan" text-anchor="middle" font-size="11">synthetic frames</text>
  <rect x="196" y="482" width="120" height="26" rx="3" class="sub"/>
  <text x="256" y="500" class="cyan" text-anchor="middle" font-size="11">live stack</text>
  <text x="330" y="500" class="dim">&#8250; resumes mid-callee in the interpreter &#8212; native and interpreter semantics never diverge</text>

  <!-- ===== return loop: deopt back to interpreter ===== -->
  <path d="M336 430 L336 146" class="dash"/>
  <text x="336" y="422" class="dim" text-anchor="middle" font-size="10.5">&#8593; resume mid-callee in interpreter</text>

  <text x="24" y="575" class="dim" font-size="10">speculative tracing JITs are well-trodden (LuaJIT, PyPy); the novelty is the solo from-scratch build</text>
</svg>
