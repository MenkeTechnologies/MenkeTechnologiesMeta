<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" font-family="'Share Tech Mono', ui-monospace, monospace">
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L8 4.5 L0 9 Z" fill="#05d9e8"/>
    </marker>
    <marker id="ahm" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L8 4.5 L0 9 Z" fill="#7a8ba8"/>
    </marker>
    <style>
      .t     { fill:#e0f0ff; font-size:12px; }
      .dim   { fill:#7a8ba8; font-size:11px; }
      .cyan  { fill:#05d9e8; }
      .mag   { fill:#d300c5; }
      .pink  { fill:#ff6b9d; }
      .green { fill:#39ff14; }
      .title { font-family:'Orbitron', sans-serif; font-weight:700; }
      .h     { fill:#05d9e8; font-size:13px; font-family:'Orbitron', sans-serif; font-weight:700; }
      .box   { fill:#0d0d1a; stroke:#05d9e8; stroke-width:1.5; }
      .jitbx { fill:#0d0d1a; stroke:#d300c5; stroke-width:1.5; }
      .aotbx { fill:#0d0d1a; stroke:#ff2a6d; stroke-width:1.5; }
      .optbx { fill:#0b140b; stroke:#39ff14; stroke-width:1.4; }
      .chip  { fill:#10102a; stroke:#1a1a3e; stroke-width:1; }
      .sub   { fill:#10102a; stroke:#2a1a4e; stroke-width:1; }
      .arrow { stroke:#05d9e8; stroke-width:1.6; fill:none; marker-end:url(#ah); }
      .dash  { stroke:#7a8ba8; stroke-width:1.1; stroke-dasharray:4 3; fill:none; marker-end:url(#ahm); }
    </style>
  </defs>

  <rect x="0" y="0" width="1000" height="500" fill="#0a0a14"/>
  <rect x="2" y="2" width="996" height="496" fill="none" stroke="#1a1a3e" stroke-width="1"/>

  <text x="24" y="34" class="title" fill="#05d9e8" font-size="19">THE COMMAND LINE &#8212; RUST CLI REWRITES</text>
  <text x="24" y="52" class="dim">single-purpose Rust reimplementations of classic terminal tools; the ledger keeps each at its assigned confidence</text>

  <!-- ===== GROUP HEADER ===== -->
  <text x="24" y="82" class="h">CLI / TUI TOOLS</text>
  <text x="976" y="82" class="dim" text-anchor="end">ch07 &#183; ledger #112&#8211;119 &#183; confidence tag per tool</text>

  <!-- ===== ROW 1 ===== -->
  <rect x="20"  y="92" width="300" height="80" rx="4" class="chip"/>
  <text x="36"  y="116" class="cyan title" font-size="12.5">lsofrs</text>
  <text x="304" y="110" class="dim" text-anchor="end" font-size="9.5">med</text>
  <text x="36"  y="136" class="dim">open files &amp; sockets</text>
  <text x="36"  y="156" class="dim" font-size="10">lsof reimpl &#183; 5&#8211;21&#215; &#183; JSON/CSV &#183; leak TUI</text>

  <rect x="350" y="92" width="300" height="80" rx="4" class="chip"/>
  <text x="366" y="116" class="cyan title" font-size="12.5">iftoprs</text>
  <text x="634" y="110" class="dim" text-anchor="end" font-size="9.5">low</text>
  <text x="366" y="136" class="dim">network bandwidth top</text>
  <text x="366" y="156" class="dim" font-size="10">iftop &#183; native proc attribution &#183; NDJSON</text>

  <rect x="680" y="92" width="300" height="80" rx="4" class="chip"/>
  <text x="696" y="116" class="cyan title" font-size="12.5">nmaprs</text>
  <text x="964" y="110" class="dim" text-anchor="end" font-size="9.5">low</text>
  <text x="696" y="136" class="dim">port &amp; network scanner</text>
  <text x="696" y="156" class="dim" font-size="10">raw-packet, multi-technique &#183; safe Rust</text>

  <!-- ===== ROW 2 ===== -->
  <rect x="20"  y="184" width="300" height="80" rx="4" class="chip"/>
  <text x="36"  y="208" class="cyan title" font-size="12.5">temprs</text>
  <text x="304" y="202" class="dim" text-anchor="end" font-size="9.5">low</text>
  <text x="36"  y="228" class="dim">temp-file stack CLI (tp)</text>
  <text x="36"  y="248" class="dim" font-size="10">push/pop/shift/unshift &#183; original concept</text>

  <rect x="350" y="184" width="300" height="80" rx="4" class="chip"/>
  <text x="366" y="208" class="cyan title" font-size="12.5">zcolorizer</text>
  <text x="634" y="202" class="dim" text-anchor="end" font-size="9.5">low</text>
  <text x="366" y="228" class="dim">streaming log colorizer</text>
  <text x="366" y="248" class="dim" font-size="10">TOML token model &#183; ccze + pygments</text>

  <rect x="680" y="184" width="300" height="80" rx="4" class="chip"/>
  <text x="696" y="208" class="cyan title" font-size="12.5">powerliners</text>
  <text x="964" y="202" class="dim" text-anchor="end" font-size="9.5">med</text>
  <text x="696" y="228" class="dim">powerline, native binary</text>
  <text x="696" y="248" class="dim" font-size="10">zero-Python &#183; 462 parity tests</text>

  <!-- ===== ROW 3 ===== -->
  <rect x="20"  y="276" width="300" height="80" rx="4" class="chip"/>
  <text x="36"  y="300" class="cyan title" font-size="12.5">api-rest-generator</text>
  <text x="304" y="294" class="dim" text-anchor="end" font-size="9.5">low</text>
  <text x="36"  y="320" class="dim">SQL DDL &#8594; REST backend</text>
  <text x="36"  y="340" class="dim" font-size="10">JVM (Spring) + Rust/Loco targets</text>

  <rect x="350" y="276" width="300" height="80" rx="4" class="chip"/>
  <text x="366" y="300" class="cyan title" font-size="12.5">zcite</text>
  <text x="634" y="294" class="dim" text-anchor="end" font-size="9.5">med</text>
  <text x="366" y="320" class="dim">embeddable Zotero engine</text>
  <text x="366" y="340" class="dim" font-size="10">CSL &#183; 37 item types &#183; C ABI &#183; in dev</text>

  <rect x="680" y="276" width="300" height="80" rx="4" class="chip"/>
  <text x="696" y="300" class="cyan title" font-size="12.5">storageshower</text>
  <text x="696" y="320" class="dim">disk-usage TUI</text>
  <text x="696" y="340" class="dim" font-size="10">interactive space browser</text>

  <!-- ===== HONEST NOTE ===== -->
  <rect x="20" y="372" width="960" height="60" rx="4" class="optbx"/>
  <text x="38" y="396" class="green" font-size="11.5">fastest-in-class implementations &#8212; speed &amp; UX wins over the classic tool each descends from</text>
  <text x="38" y="418" class="dim">where a tool duplicates an existing one the ledger tags it lower and flags: world's fastest &#8800; world's first</text>

  <text x="24" y="466" class="dim" font-size="10">fast, single-purpose Rust tools across the terminal workflow &#183; ch07</text>
</svg>
