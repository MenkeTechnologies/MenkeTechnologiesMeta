<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 530" font-family="'Share Tech Mono', ui-monospace, monospace">
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L8 4.5 L0 9 Z" fill="#05d9e8"/>
    </marker>
    <marker id="ahm" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L8 4.5 L0 9 Z" fill="#7a8ba8"/>
    </marker>
    <style>
      .t     { fill:#e0f0ff; font-size:12px; }
      .dim   { fill:#7a8ba8; font-size:11px; }
      .cyan  { fill:#05d9e8; }
      .mag   { fill:#d300c5; }
      .pink  { fill:#ff6b9d; }
      .green { fill:#39ff14; }
      .title { font-family:'Orbitron', sans-serif; font-weight:700; }
      .h     { fill:#05d9e8; font-size:13px; font-family:'Orbitron', sans-serif; font-weight:700; }
      .box   { fill:#0d0d1a; stroke:#05d9e8; stroke-width:1.5; }
      .jitbx { fill:#0d0d1a; stroke:#d300c5; stroke-width:1.5; }
      .aotbx { fill:#0d0d1a; stroke:#ff2a6d; stroke-width:1.5; }
      .optbx { fill:#0b140b; stroke:#39ff14; stroke-width:1.4; }
      .chip  { fill:#10102a; stroke:#1a1a3e; stroke-width:1; }
      .sub   { fill:#10102a; stroke:#2a1a4e; stroke-width:1; }
      .arrow { stroke:#05d9e8; stroke-width:1.6; fill:none; marker-end:url(#ah); }
      .dash  { stroke:#7a8ba8; stroke-width:1.1; stroke-dasharray:4 3; fill:none; marker-end:url(#ahm); }
    </style>
  </defs>

  <rect x="0" y="0" width="1000" height="530" fill="#0a0a14"/>
  <rect x="2" y="2" width="996" height="526" fill="none" stroke="#1a1a3e" stroke-width="1"/>

  <text x="24" y="34" class="title" fill="#05d9e8" font-size="19">THE CLIP / ARRANGER ENGINE (zpwr-clip-engine)</text>
  <text x="24" y="52" class="dim">one general-purpose DAW arranger core, embeddable as a plugin &#183; a host pulls the same swung step clock the JUCE plugins drive</text>

  <!-- ===== CORE ===== -->
  <rect x="20" y="70" width="960" height="64" rx="4" class="box"/>
  <text x="38" y="94" class="h">ClipEngine &#8212; transport + arranger core</text>
  <text x="38" y="115" class="dim">pure C++, no JUCE &#183; holds the pattern <tspan class="cyan">[{ s, l, n, len, v }]</tspan> + transport &#183; advances a swung step clock &#183; fires NoteOn / NoteOff events (timing ported verbatim from clip.js)</text>

  <path d="M130 134 L130 160" class="arrow"/>
  <path d="M370 134 L370 160" class="arrow"/>
  <path d="M610 134 L610 160" class="arrow"/>
  <path d="M850 134 L850 160" class="arrow"/>

  <!-- ===== DRIVEN COMPONENTS ===== -->
  <rect x="20" y="162" width="220" height="122" rx="4" class="box"/>
  <text x="32" y="184" class="h" font-size="12">CLIP TIMELINE</text>
  <text x="32" y="205" class="cyan" font-size="11.5">AudioClip player</text>
  <text x="32" y="222" class="dim">repitch &#183; WSOLA stretch</text>
  <text x="32" y="239" class="dim">warp map &#183; comp / take</text>
  <text x="32" y="261" class="cyan" font-size="11.5">MIDI clips</text>
  <text x="32" y="278" class="dim">MidiFile &#8594; SMF export</text>

  <rect x="260" y="162" width="220" height="122" rx="4" class="box"/>
  <text x="272" y="184" class="h" font-size="12">ClipSeq SEQUENCER</text>
  <text x="272" y="205" class="cyan" font-size="11.5">ClipSeqHooks</text>
  <text x="272" y="222" class="dim">pattern / transport</text>
  <text x="272" y="239" class="dim">play / step / wired()</text>
  <text x="272" y="261" class="cyan" font-size="11.5">audio-thread step clock</text>
  <text x="272" y="278" class="dim">drives hasClipSeq</text>

  <rect x="500" y="162" width="220" height="122" rx="4" class="box"/>
  <text x="512" y="184" class="h" font-size="12">AUTOMATION LANES</text>
  <text x="512" y="205" class="cyan" font-size="11.5">breakpoint automation</text>
  <text x="512" y="222" class="dim">per-parameter lanes</text>
  <text x="512" y="261" class="cyan" font-size="11.5">tempo / meter maps</text>
  <text x="512" y="278" class="dim">shared arrangement clock</text>

  <rect x="740" y="162" width="220" height="122" rx="4" class="box"/>
  <text x="752" y="184" class="h" font-size="12">LAUNCHER / SCENE</text>
  <text x="752" y="205" class="cyan" font-size="11.5">Session clip grid</text>
  <text x="752" y="222" class="dim">scene launch</text>
  <text x="752" y="261" class="cyan" font-size="11.5">two-view arranger</text>
  <text x="752" y="278" class="dim">Arrangement + Session</text>

  <path d="M130 284 L130 309" class="arrow"/>
  <path d="M370 284 L370 309" class="arrow"/>
  <path d="M610 284 L610 309" class="arrow"/>
  <path d="M850 284 L850 309" class="arrow"/>

  <!-- ===== EMBEDDABLE SEAM ===== -->
  <rect x="20" y="311" width="960" height="56" rx="4" class="jitbx"/>
  <text x="38" y="335" class="title" fill="#d300c5" font-size="13">EMBEDDABLE SEAM &#8212; host-agnostic C ABI + JUCE hooks</text>
  <text x="38" y="356" class="dim">capi/clip_engine.h &#183; <tspan class="cyan">zpc_clip_new / set_pattern / set_transport / play / advance / poll_events / render_midi</tspan> &#183; ClipSeqHooks &#183; ClipAudioHooks &#8212; Rust + JUCE hosts drive one engine</text>

  <path d="M106 367 L106 390" class="arrow"/>
  <path d="M298 367 L298 390" class="arrow"/>
  <path d="M490 367 L490 390" class="arrow"/>
  <path d="M682 367 L682 390" class="arrow"/>
  <path d="M874 367 L874 390" class="dash"/>

  <!-- ===== CONSUMERS ===== -->
  <rect x="20"  y="392" width="172" height="72" rx="4" class="box"/>
  <text x="106" y="420" class="cyan title" font-size="12.5" text-anchor="middle">zpwr-daw</text>
  <text x="106" y="439" class="dim" text-anchor="middle">VST3 + standalone</text>
  <text x="106" y="455" class="green" font-size="10" text-anchor="middle">arranger verified</text>

  <rect x="212" y="392" width="172" height="72" rx="4" class="box"/>
  <text x="298" y="420" class="cyan title" font-size="12.5" text-anchor="middle">zpwr-synth</text>
  <text x="298" y="439" class="dim" text-anchor="middle">JUCE host</text>
  <text x="298" y="455" class="dim" font-size="10" text-anchor="middle">shared engine</text>

  <rect x="404" y="392" width="172" height="72" rx="4" class="box"/>
  <text x="490" y="420" class="cyan title" font-size="12.5" text-anchor="middle">zpwr-fx</text>
  <text x="490" y="439" class="dim" text-anchor="middle">JUCE host</text>
  <text x="490" y="455" class="dim" font-size="10" text-anchor="middle">shared engine</text>

  <rect x="596" y="392" width="172" height="72" rx="4" class="box"/>
  <text x="682" y="420" class="cyan title" font-size="12.5" text-anchor="middle">Audio-Haxor</text>
  <text x="682" y="439" class="dim" text-anchor="middle">Rust host &#183; C ABI</text>
  <text x="682" y="455" class="dim" font-size="10" text-anchor="middle">drives zpc_clip_*</text>

  <rect x="788" y="392" width="172" height="72" rx="4" class="box" stroke="#7a8ba8" stroke-dasharray="4 3"/>
  <text x="874" y="420" class="title" fill="#7a8ba8" font-size="12.5" text-anchor="middle">ztranslator</text>
  <text x="874" y="439" class="dim" text-anchor="middle">non-audio host</text>
  <text x="874" y="455" class="dim" font-size="10" text-anchor="middle">design intent (#64)</text>

  <text x="24" y="502" class="dim" font-size="10">arranger + automation verified &#183; audio render unverified &#183; non-audio hosts not yet wired (#64) &#183; zpwr-clip-engine</text>
</svg>
