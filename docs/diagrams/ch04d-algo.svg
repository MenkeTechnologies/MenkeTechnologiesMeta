<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 420" font-family="'Share Tech Mono', ui-monospace, monospace">
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L8 4.5 L0 9 Z" fill="#05d9e8"/>
    </marker>
    <marker id="ahm" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L8 4.5 L0 9 Z" fill="#7a8ba8"/>
    </marker>
    <style>
      .t     { fill:#e0f0ff; font-size:12px; }
      .dim   { fill:#7a8ba8; font-size:11px; }
      .cyan  { fill:#05d9e8; }
      .mag   { fill:#d300c5; }
      .pink  { fill:#ff6b9d; }
      .green { fill:#39ff14; }
      .title { font-family:'Orbitron', sans-serif; font-weight:700; }
      .h     { fill:#05d9e8; font-size:13px; font-family:'Orbitron', sans-serif; font-weight:700; }
      .box   { fill:#0d0d1a; stroke:#05d9e8; stroke-width:1.5; }
      .jitbx { fill:#0d0d1a; stroke:#d300c5; stroke-width:1.5; }
      .aotbx { fill:#0d0d1a; stroke:#ff2a6d; stroke-width:1.5; }
      .optbx { fill:#0b140b; stroke:#39ff14; stroke-width:1.4; }
      .chip  { fill:#10102a; stroke:#1a1a3e; stroke-width:1; }
      .sub   { fill:#10102a; stroke:#2a1a4e; stroke-width:1; }
      .arrow { stroke:#05d9e8; stroke-width:1.6; fill:none; marker-end:url(#ah); }
      .dash  { stroke:#7a8ba8; stroke-width:1.1; stroke-dasharray:4 3; fill:none; marker-end:url(#ahm); }
    </style>
  </defs>

  <rect x="0" y="0" width="1000" height="420" fill="#0a0a14"/>
  <rect x="2" y="2" width="996" height="416" fill="none" stroke="#1a1a3e" stroke-width="1"/>

  <text x="24" y="34" class="title" fill="#05d9e8" font-size="19">ALGORITHMIC PRODUCTION (#83)</text>
  <text x="24" y="52" class="dim">a standalone Rust engine emits a complete professionally-arranged track &#8212; genre + key/tempo &#8594; a real DAW project</text>

  <!-- ===== STAGE 1: INPUTS ===== -->
  <rect x="20" y="80" width="210" height="230" rx="4" class="box"/>
  <text x="38" y="104" class="h">INPUTS</text>
  <rect x="36" y="120" width="178" height="46" rx="4" class="sub"/>
  <text x="48" y="140" class="cyan" font-size="12">genre</text>
  <text x="48" y="157" class="dim">the track&#8217;s style</text>
  <rect x="36" y="176" width="178" height="46" rx="4" class="sub"/>
  <text x="48" y="196" class="cyan" font-size="12">key / tempo</text>
  <text x="48" y="213" class="dim">root key + BPM</text>
  <rect x="36" y="232" width="178" height="62" rx="4" class="sub"/>
  <text x="48" y="252" class="cyan" font-size="12">key-compatibility</text>
  <text x="48" y="269" class="dim">music theory picks</text>
  <text x="48" y="285" class="dim">compatible keys</text>

  <path d="M230 195 L268 195" class="arrow"/>

  <!-- ===== STAGE 2: GENERATORS ===== -->
  <rect x="270" y="80" width="430" height="230" rx="4" class="box"/>
  <text x="288" y="104" class="h">GENERATORS</text>
  <text x="418" y="104" class="dim">real module names &#183; build-verified</text>
  <rect x="288" y="120" width="394" height="52" rx="4" class="sub"/>
  <text x="302" y="140" class="cyan" font-size="12">als_generator.rs</text>
  <text x="302" y="159" class="dim">section structure &#183; intro &#183; build &#183; drop &#183; breakdown &#183; outro</text>
  <rect x="288" y="180" width="394" height="52" rx="4" class="sub"/>
  <text x="302" y="200" class="cyan" font-size="12">midi_generator.rs</text>
  <text x="302" y="219" class="dim">per-section MIDI &#183; chords/harmony, drums, bass, lead</text>
  <rect x="288" y="240" width="394" height="52" rx="4" class="sub"/>
  <text x="302" y="260" class="cyan" font-size="12">trance_generator.rs</text>
  <text x="302" y="279" class="dim">genre engine &#183; arranges the sections into a full track</text>

  <path d="M700 195 L738 195" class="arrow"/>

  <!-- ===== STAGE 3: OUTPUT WRITERS ===== -->
  <rect x="740" y="80" width="235" height="230" rx="4" class="box"/>
  <text x="758" y="104" class="h">OUTPUT WRITERS</text>
  <rect x="756" y="120" width="203" height="84" rx="4" class="sub"/>
  <text x="768" y="140" class="cyan" font-size="12">als_project.rs + XML</text>
  <text x="768" y="159" class="pink" font-size="12">Ableton .als Live Set</text>
  <text x="768" y="176" class="dim">MIDI + audio clips</text>
  <text x="768" y="192" class="dim">+ automation</text>
  <rect x="756" y="212" width="203" height="80" rx="4" class="sub"/>
  <text x="768" y="232" class="cyan" font-size="12">zdp.rs</text>
  <text x="768" y="251" class="green" font-size="12">native .zdp project</text>
  <text x="768" y="268" class="dim">live project JSON &#8594;</text>
  <text x="768" y="284" class="dim">instant in-DAW load</text>

  <!-- ===== VERIFICATION + CAVEAT ===== -->
  <rect x="20" y="328" width="600" height="52" rx="4" class="optbx"/>
  <text x="38" y="350" class="green title" font-size="12">VERIFIED</text>
  <text x="120" y="350" class="dim">all 7 generator modules build &#183; ~280 tests pass</text>
  <text x="38" y="369" class="dim">semantics + arrangement exercised by the suite, not just compiled</text>
  <rect x="636" y="328" width="339" height="52" rx="4" class="aotbx"/>
  <text x="654" y="350" class="pink title" font-size="12">CAVEAT</text>
  <text x="726" y="350" class="dim">genre coverage currently mainly trance</text>
  <text x="654" y="369" class="dim">one action &#8594; one finished, arranged, DAW-ready project</text>

  <text x="24" y="404" class="dim" font-size="10">generates a full arranged track to a real Ableton .als or native .zdp project &#183; zpwr-algo-production</text>
</svg>
