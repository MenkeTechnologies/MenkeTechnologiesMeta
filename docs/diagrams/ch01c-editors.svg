<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 560" font-family="'Share Tech Mono', ui-monospace, monospace">
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L8 4.5 L0 9 Z" fill="#05d9e8"/>
    </marker>
    <marker id="ahm" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L8 4.5 L0 9 Z" fill="#7a8ba8"/>
    </marker>
    <style>
      .t     { fill:#e0f0ff; font-size:12px; }
      .dim   { fill:#7a8ba8; font-size:11px; }
      .cyan  { fill:#05d9e8; }
      .mag   { fill:#d300c5; }
      .pink  { fill:#ff6b9d; }
      .green { fill:#39ff14; }
      .title { font-family:'Orbitron', sans-serif; font-weight:700; }
      .h     { fill:#05d9e8; font-size:13px; font-family:'Orbitron', sans-serif; font-weight:700; }
      .box   { fill:#0d0d1a; stroke:#05d9e8; stroke-width:1.5; }
      .jitbx { fill:#0d0d1a; stroke:#d300c5; stroke-width:1.5; }
      .aotbx { fill:#0d0d1a; stroke:#ff2a6d; stroke-width:1.5; }
      .optbx { fill:#0b140b; stroke:#39ff14; stroke-width:1.4; }
      .chip  { fill:#10102a; stroke:#1a1a3e; stroke-width:1; }
      .sub   { fill:#10102a; stroke:#2a1a4e; stroke-width:1; }
      .arrow { stroke:#05d9e8; stroke-width:1.6; fill:none; marker-end:url(#ah); }
      .dash  { stroke:#7a8ba8; stroke-width:1.1; stroke-dasharray:4 3; fill:none; marker-end:url(#ahm); }
    </style>
  </defs>

  <rect x="0" y="0" width="1000" height="560" fill="#0a0a14"/>
  <rect x="2" y="2" width="996" height="556" fill="none" stroke="#1a1a3e" stroke-width="1"/>

  <text x="24" y="34" class="title" fill="#05d9e8" font-size="19">EDITORS DISSOLVED (#5-10)</text>
  <text x="24" y="52" class="dim">three languages welded to a host tool, extracted into standalone runtimes on fusevm &#8212; was: needs host &#8594; now: on the VM</text>

  <!-- ===== COLUMN 1: elisprs (#5-6) ===== -->
  <rect x="20" y="70" width="298" height="46" rx="4" class="chip"/>
  <text x="34" y="90" class="dim">was:</text>
  <text x="169" y="107" class="dim" text-anchor="middle">Elisp only runs inside Emacs</text>
  <line x1="76" y1="102" x2="262" y2="102" stroke="#7a8ba8" stroke-width="1"/>
  <path d="M169 116 L169 150" class="dash"/>
  <text x="182" y="137" class="dim" font-size="10">&#8722; host removed</text>

  <rect x="20" y="152" width="298" height="212" rx="4" class="jitbx"/>
  <text x="34" y="176" class="title" fill="#d300c5" font-size="13.5">elisprs</text>
  <text x="34" y="194" class="dim">now: Emacs Lisp with no Emacs</text>
  <rect x="34" y="204" width="120" height="30" rx="3" class="chip"/>
  <text x="94" y="223" class="mag" text-anchor="middle" font-size="11">JIT &#183; Cranelift</text>
  <text x="34" y="256" class="dim">&#8250; #5: hot loops &#8594; native code</text>
  <text x="34" y="274" class="dim">&#8250; 234 subrs &#183; 617 prelude defuns</text>
  <text x="34" y="292" class="dim">&#8250; #6: AOT &#8594; standalone Mach-O</text>
  <text x="34" y="310" class="dim">&#8250; 1M-iter while JIT-ran correctly</text>
  <text x="34" y="348" class="mag" font-size="10.5">Elisp as a JIT runtime, editor gone</text>

  <!-- ===== COLUMN 2: vimlrs (#7-8) ===== -->
  <rect x="351" y="70" width="298" height="46" rx="4" class="chip"/>
  <text x="365" y="90" class="dim">was:</text>
  <text x="500" y="107" class="dim" text-anchor="middle">VimL only runs inside Vim / Neovim</text>
  <line x1="382" y1="102" x2="618" y2="102" stroke="#7a8ba8" stroke-width="1"/>
  <path d="M500 116 L500 150" class="dash"/>
  <text x="513" y="137" class="dim" font-size="10">&#8722; host removed</text>

  <rect x="351" y="152" width="298" height="212" rx="4" class="box"/>
  <text x="365" y="176" class="title" fill="#05d9e8" font-size="13.5">vimlrs</text>
  <text x="365" y="194" class="dim">now: VimL with no editor host</text>
  <rect x="365" y="204" width="120" height="30" rx="3" class="chip"/>
  <text x="425" y="223" class="cyan" text-anchor="middle" font-size="11">STANDALONE</text>
  <text x="365" y="256" class="dim">&#8250; #7: .vim runs as a program</text>
  <text x="365" y="274" class="dim">&#8250; numeric loops trace &#8594; native</text>
  <text x="365" y="292" class="dim">&#8250; #8: AOT &#8594; arm64 binary</text>
  <text x="365" y="310" class="dim">&#8250; ~113 builtins of Neovim funcs.c</text>
  <text x="365" y="348" class="cyan" font-size="10.5">VimL as a real runtime, no Vim</text>

  <!-- ===== COLUMN 3: awkrs (#9-10) ===== -->
  <rect x="679" y="70" width="296" height="46" rx="4" class="chip"/>
  <text x="693" y="90" class="dim">was:</text>
  <text x="827" y="107" class="dim" text-anchor="middle">AWK needs the awk interpreter</text>
  <line x1="712" y1="102" x2="942" y2="102" stroke="#7a8ba8" stroke-width="1"/>
  <path d="M827 116 L827 150" class="dash"/>
  <text x="840" y="137" class="dim" font-size="10">&#8722; host removed</text>

  <rect x="679" y="152" width="296" height="212" rx="4" class="aotbx"/>
  <text x="693" y="176" class="title" fill="#ff6b9d" font-size="13.5">awkrs</text>
  <text x="693" y="194" class="dim">now: AWK, no interpreter shipped</text>
  <rect x="693" y="204" width="120" height="30" rx="3" class="chip"/>
  <text x="753" y="223" class="pink" text-anchor="middle" font-size="11">AOT &#8594; .o</text>
  <text x="693" y="256" class="dim">&#8250; #9: BEGIN prog &#8594; native exe</text>
  <text x="693" y="274" class="dim">&#8250; links libawkrs.a, no runtime</text>
  <text x="693" y="292" class="dim">&#8250; #10: two-tier disk cache</text>
  <text x="693" y="310" class="dim">&#8250; bytecode + machine code persist</text>
  <text x="693" y="348" class="pink" font-size="10.5">AWK lowered to an object, not read</text>

  <!-- ===== FEED INTO SHARED VM ===== -->
  <path d="M169 364 L169 394" class="arrow"/>
  <path d="M500 364 L500 394" class="arrow"/>
  <path d="M827 364 L827 394" class="arrow"/>

  <rect x="20" y="396" width="955" height="46" rx="4" class="box"/>
  <text x="38" y="424" class="h">fusevm bytecode</text>
  <text x="230" y="424" class="dim">one shared VM &#183; interpret / JIT / AOT &#183; no editor host required by any frontend</text>

  <text x="24" y="480" class="dim" font-size="10">the language outlives its host tool &#8212; each runs on the shared VM with no editor &#183; fusevm</text>
</svg>
