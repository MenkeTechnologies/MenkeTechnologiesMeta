<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 640" font-family="'Share Tech Mono', ui-monospace, monospace">
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L8 4.5 L0 9 Z" fill="#05d9e8"/>
    </marker>
    <marker id="ahm" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L8 4.5 L0 9 Z" fill="#7a8ba8"/>
    </marker>
    <style>
      .t     { fill:#e0f0ff; font-size:12px; }
      .dim   { fill:#7a8ba8; font-size:11px; }
      .cyan  { fill:#05d9e8; }
      .mag   { fill:#d300c5; }
      .pink  { fill:#ff6b9d; }
      .green { fill:#39ff14; }
      .title { font-family:'Orbitron', sans-serif; font-weight:700; }
      .h     { fill:#05d9e8; font-size:13px; font-family:'Orbitron', sans-serif; font-weight:700; }
      .box   { fill:#0d0d1a; stroke:#05d9e8; stroke-width:1.5; }
      .jitbx { fill:#0d0d1a; stroke:#d300c5; stroke-width:1.5; }
      .aotbx { fill:#0d0d1a; stroke:#ff2a6d; stroke-width:1.5; }
      .optbx { fill:#0b140b; stroke:#39ff14; stroke-width:1.4; }
      .chip  { fill:#10102a; stroke:#1a1a3e; stroke-width:1; }
      .sub   { fill:#10102a; stroke:#2a1a4e; stroke-width:1; }
      .arrow { stroke:#05d9e8; stroke-width:1.6; fill:none; marker-end:url(#ah); }
      .dash  { stroke:#7a8ba8; stroke-width:1.1; stroke-dasharray:4 3; fill:none; marker-end:url(#ahm); }
    </style>
  </defs>

  <rect x="0" y="0" width="1000" height="640" fill="#0a0a14"/>
  <rect x="2" y="2" width="996" height="636" fill="none" stroke="#1a1a3e" stroke-width="1"/>

  <text x="24" y="34" class="title" fill="#05d9e8" font-size="19">ZEMACS &#8212; THE HELIX-FORK EDITOR (#120)</text>
  <text x="24" y="52" class="dim">a Helix fork; the modal core is inherited &#183; the additions below (#120a&#8211;120s) are zemacs's own work on top of that base</text>

  <!-- ===== LAYER 1: INHERITED (Helix base) ===== -->
  <rect x="20" y="70" width="955" height="66" rx="4" class="optbx"/>
  <text x="38" y="92" class="title" fill="#39ff14" font-size="13">INHERITED FROM HELIX &#8212; not claimed</text>
  <rect x="330" y="80" width="150" height="24" rx="4" class="chip"/>
  <text x="405" y="97" class="green" text-anchor="middle" font-size="11">modal selection engine</text>
  <rect x="492" y="80" width="150" height="24" rx="4" class="chip"/>
  <text x="567" y="97" class="green" text-anchor="middle" font-size="11">tree-sitter breadth</text>
  <rect x="654" y="80" width="150" height="24" rx="4" class="chip"/>
  <text x="729" y="97" class="green" text-anchor="middle" font-size="11">LSP / DAP</text>
  <rect x="816" y="80" width="150" height="24" rx="4" class="chip"/>
  <text x="891" y="97" class="green" text-anchor="middle" font-size="11">rainbow brackets</text>
  <text x="38" y="126" class="dim">selection-first noun&#8594;verb model &#183; indent queries &#183; language config &#8212; all Helix base, zemacs claims none of it</text>

  <path d="M497 136 L497 156" class="arrow"/>

  <!-- ===== LAYER 2: ZEMACS ADDITIONS ===== -->
  <rect x="20" y="158" width="955" height="292" rx="4" class="box"/>
  <text x="38" y="180" class="h">ZEMACS ADDITIONS &#8212; #120a&#8211;120s, built on the Helix base</text>

  <!-- row 1 -->
  <rect x="38" y="192" width="222" height="30" rx="4" class="sub"/>
  <text x="149" y="211" class="cyan" text-anchor="middle" font-size="11">vim operator grammar &#183; 120a</text>
  <rect x="270" y="192" width="222" height="30" rx="4" class="sub"/>
  <text x="381" y="211" class="cyan" text-anchor="middle" font-size="11">vim/emacs/helix keymaps &#183; 120b</text>
  <rect x="502" y="192" width="222" height="30" rx="4" class="sub"/>
  <text x="613" y="211" class="cyan" text-anchor="middle" font-size="11">coverage harness &#183; 120c</text>
  <rect x="734" y="192" width="222" height="30" rx="4" class="sub"/>
  <text x="845" y="211" class="cyan" text-anchor="middle" font-size="11">thread-local host ABI &#183; 120d</text>

  <!-- row 2 -->
  <rect x="38" y="228" width="222" height="30" rx="4" class="sub"/>
  <text x="149" y="247" class="cyan" text-anchor="middle" font-size="11">cross-lang REPL &#183; 120e</text>
  <rect x="270" y="228" width="222" height="30" rx="4" class="sub"/>
  <text x="381" y="247" class="cyan" text-anchor="middle" font-size="11">:awk in-place filter &#183; 120f</text>
  <rect x="502" y="228" width="222" height="30" rx="4" class="sub"/>
  <text x="613" y="247" class="cyan" text-anchor="middle" font-size="11">diff3 merge resolver &#183; 120g</text>
  <rect x="734" y="228" width="222" height="30" rx="4" class="sub"/>
  <text x="845" y="247" class="cyan" text-anchor="middle" font-size="11">magit git porcelain &#183; 120h</text>

  <!-- row 3 -->
  <rect x="38" y="264" width="222" height="30" rx="4" class="sub"/>
  <text x="149" y="283" class="cyan" text-anchor="middle" font-size="11">org-mode agenda &#183; 120i</text>
  <rect x="270" y="264" width="222" height="30" rx="4" class="sub"/>
  <text x="381" y="283" class="cyan" text-anchor="middle" font-size="11">hex editor &#183; 120j</text>
  <rect x="502" y="264" width="222" height="30" rx="4" class="sub"/>
  <text x="613" y="283" class="cyan" text-anchor="middle" font-size="11">PTY terminal mux &#183; 120k</text>
  <rect x="734" y="264" width="222" height="30" rx="4" class="sub"/>
  <text x="845" y="283" class="cyan" text-anchor="middle" font-size="11">IDE workbench overlay &#183; 120l</text>

  <!-- row 4 -->
  <rect x="38" y="300" width="222" height="30" rx="4" class="sub"/>
  <text x="149" y="319" class="cyan" text-anchor="middle" font-size="11">snippet TUI + emmet &#183; 120m</text>
  <rect x="270" y="300" width="222" height="30" rx="4" class="sub"/>
  <text x="381" y="319" class="cyan" text-anchor="middle" font-size="11">Spacemacs SPC tree &#183; 120n</text>
  <rect x="502" y="300" width="222" height="30" rx="4" class="sub"/>
  <text x="613" y="319" class="cyan" text-anchor="middle" font-size="11">reflective settings &#183; 120o</text>
  <rect x="734" y="300" width="222" height="30" rx="4" class="sub"/>
  <text x="845" y="319" class="cyan" text-anchor="middle" font-size="11">LLM assistant &#183; 120r</text>

  <!-- marquee 120s -->
  <rect x="38" y="342" width="918" height="94" rx="4" class="jitbx"/>
  <text x="56" y="364" class="title" fill="#d300c5" font-size="13">MARQUEE &#8212; #120s: real Vimscript engine AND real Emacs Lisp engine, sourced at init</text>
  <rect x="56" y="376" width="290" height="28" rx="4" class="chip"/>
  <text x="201" y="394" class="mag" text-anchor="middle" font-size="11">vimlrs &#8212; sources init.vim / ~/.vimrc</text>
  <rect x="358" y="376" width="290" height="28" rx="4" class="chip"/>
  <text x="503" y="394" class="mag" text-anchor="middle" font-size="11">elisprs &#8212; sources init.el / ~/.emacs.d</text>
  <rect x="660" y="376" width="278" height="28" rx="4" class="chip"/>
  <text x="799" y="394" class="cyan" text-anchor="middle" font-size="11">both on fusevm bytecode</text>
  <text x="56" y="424" class="dim">one load_init_scripts pass runs both real interpreters against the same live session &#8212; not config emulation, not a settings shim</text>

  <path d="M497 450 L497 470" class="arrow"/>

  <!-- ===== LAYER 3: HOST BRIDGE ===== -->
  <rect x="20" y="472" width="955" height="130" rx="4" class="aotbx"/>
  <text x="38" y="494" class="title" fill="#ff6b9d" font-size="13">HOST BRIDGE &#8212; zemacs-term auto-spawns `zwire-host serve` (commands/host.rs)</text>
  <rect x="38" y="506" width="270" height="76" rx="4" class="sub"/>
  <text x="173" y="528" class="pink" text-anchor="middle" font-size="12">zemacs-term</text>
  <text x="173" y="548" class="dim" text-anchor="middle">editor process</text>
  <text x="173" y="566" class="dim" text-anchor="middle">commands/host.rs</text>
  <rect x="392" y="506" width="270" height="76" rx="4" class="aotbx"/>
  <text x="527" y="528" class="pink title" text-anchor="middle" font-size="12">zwire-host serve</text>
  <text x="527" y="548" class="dim" text-anchor="middle">native agent &#183; NDJSON socket</text>
  <text x="527" y="566" class="dim" text-anchor="middle">fs crawl / exec / PTY / watch</text>
  <rect x="746" y="506" width="210" height="76" rx="4" class="sub"/>
  <text x="851" y="528" class="pink" text-anchor="middle" font-size="12">zwire browser HUD</text>
  <text x="851" y="548" class="dim" text-anchor="middle">same agent &#183; #166</text>
  <text x="851" y="566" class="dim" text-anchor="middle">shared verbatim</text>
  <path d="M308 544 L392 544" class="arrow"/>
  <path d="M746 544 L662 544" class="arrow"/>

  <text x="24" y="626" class="dim" font-size="10">a Helix fork with real Vimscript + Emacs Lisp engines, on the shared native host &#183; zemacs</text>
</svg>
