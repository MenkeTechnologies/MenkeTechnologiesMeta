<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 512" font-family="'Share Tech Mono', ui-monospace, monospace">
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L8 4.5 L0 9 Z" fill="#05d9e8"/>
    </marker>
    <marker id="ahm" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L8 4.5 L0 9 Z" fill="#7a8ba8"/>
    </marker>
    <style>
      .t     { fill:#e0f0ff; font-size:12px; }
      .dim   { fill:#7a8ba8; font-size:11px; }
      .cyan  { fill:#05d9e8; }
      .mag   { fill:#d300c5; }
      .pink  { fill:#ff6b9d; }
      .green { fill:#39ff14; }
      .title { font-family:'Orbitron', sans-serif; font-weight:700; }
      .h     { fill:#05d9e8; font-size:13px; font-family:'Orbitron', sans-serif; font-weight:700; }
      .box   { fill:#0d0d1a; stroke:#05d9e8; stroke-width:1.5; }
      .jitbx { fill:#0d0d1a; stroke:#d300c5; stroke-width:1.5; }
      .aotbx { fill:#0d0d1a; stroke:#ff2a6d; stroke-width:1.5; }
      .optbx { fill:#0b140b; stroke:#39ff14; stroke-width:1.4; }
      .chip  { fill:#10102a; stroke:#1a1a3e; stroke-width:1; }
      .sub   { fill:#10102a; stroke:#2a1a4e; stroke-width:1; }
      .arrow { stroke:#05d9e8; stroke-width:1.6; fill:none; marker-end:url(#ah); }
      .dash  { stroke:#7a8ba8; stroke-width:1.1; stroke-dasharray:4 3; fill:none; marker-end:url(#ahm); }
    </style>
  </defs>

  <rect x="0" y="0" width="1000" height="512" fill="#0a0a14"/>
  <rect x="2" y="2" width="996" height="508" fill="none" stroke="#1a1a3e" stroke-width="1"/>

  <text x="24" y="34" class="title" fill="#05d9e8" font-size="19">ZTRANSLATOR &#8212; PROTOCOL BRIDGES BEYOND BOME (#158)</text>
  <text x="24" y="52" class="dim">a faithful BOME port (ztranslator-core) made bidirectional &#8212; ~25 incoming trigger sources vs BOME&#8217;s outgoing-only matrix</text>

  <text x="20"  y="74" class="h">INPUTS</text>
  <text x="708" y="74" class="h">OUTPUTS</text>

  <!-- ===== INPUTS (left) ===== -->
  <rect x="20" y="82" width="252" height="42" rx="4" class="box"/>
  <text x="34" y="102" class="cyan title" font-size="12.5">MIDI IN</text>
  <text x="34" y="118" class="dim">notes &#183; CC &#183; sysex</text>

  <rect x="20" y="134" width="252" height="42" rx="4" class="box"/>
  <text x="34" y="154" class="cyan title" font-size="12.5">KEYS &#183; ~25 TRIGGERS</text>
  <text x="34" y="170" class="dim">keystrokes &#183; incoming matrix</text>

  <rect x="20" y="186" width="252" height="120" rx="4" class="optbx"/>
  <text x="34" y="206" class="green title" font-size="12.5">AUDIO &#8594; MIDI</text>
  <text x="34" y="223" class="dim">beyond BOME &#8212; live feature extraction</text>
  <text x="34" y="245" class="dim">&#8250; peak amplitude</text>
  <text x="34" y="263" class="dim">&#8250; adaptive-baseline onset</text>
  <text x="34" y="281" class="dim">&#8250; autocorrelation pitch &#8594; note number</text>
  <text x="34" y="299" class="green" font-size="10.5">cpal capture, macOS-only</text>

  <rect x="20" y="316" width="252" height="84" rx="4" class="optbx"/>
  <text x="34" y="336" class="green title" font-size="12.5">CV / GATE READ</text>
  <text x="34" y="353" class="dim">beyond BOME &#8212; eurorack in</text>
  <text x="34" y="371" class="dim">&#8250; per-channel DC levels</text>
  <text x="34" y="389" class="dim">&#8250; over a DC-coupled interface</text>

  <!-- ===== CORE (center) ===== -->
  <rect x="302" y="94" width="376" height="316" rx="4" class="box"/>
  <text x="490" y="120" class="cyan title" font-size="15" text-anchor="middle">ztranslator-core</text>
  <text x="490" y="139" class="dim" text-anchor="middle">faithful BOME port + extensions</text>

  <rect x="322" y="158" width="336" height="66" rx="3" class="sub"/>
  <text x="490" y="182" class="cyan title" font-size="12.5" text-anchor="middle">MAPPING MATRIX</text>
  <text x="490" y="200" class="dim" text-anchor="middle">src/engine/mod.rs</text>
  <text x="490" y="216" class="dim" text-anchor="middle">Incoming enum &#183; model.rs</text>

  <rect x="322" y="238" width="336" height="78" rx="3" class="optbx"/>
  <text x="490" y="261" class="green title" font-size="12.5" text-anchor="middle">BIDIRECTIONAL</text>
  <text x="490" y="280" class="dim" text-anchor="middle">any input &#8594; any output, either way</text>
  <text x="490" y="298" class="dim" text-anchor="middle">green paths are the beyond-BOME extensions</text>

  <text x="490" y="342" class="dim" text-anchor="middle">integer rules VM routes each trigger to</text>
  <text x="490" y="360" class="dim" text-anchor="middle">its mapped outgoing action &#183; &amp; back</text>
  <text x="490" y="386" class="green" font-size="10.5" text-anchor="middle">BOME-parity core, extended past MIDI</text>

  <!-- ===== OUTPUTS (right) ===== -->
  <rect x="708" y="82" width="267" height="42" rx="4" class="box"/>
  <text x="722" y="102" class="cyan title" font-size="12.5">MIDI OUT</text>
  <text x="722" y="118" class="dim">notes &#183; CC &#183; sysex</text>

  <rect x="708" y="134" width="267" height="96" rx="4" class="optbx"/>
  <text x="722" y="154" class="green title" font-size="12.5">CV / GATE WRITE</text>
  <text x="722" y="171" class="dim">beyond BOME &#8212; eurorack out</text>
  <text x="722" y="193" class="dim">&#8250; per-channel DC levels</text>
  <text x="722" y="211" class="dim">&#8250; gate thresholds</text>

  <rect x="708" y="240" width="267" height="160" rx="4" class="optbx"/>
  <text x="722" y="260" class="green title" font-size="12.5">CLOCK / TIMECODE GEN</text>
  <text x="722" y="277" class="dim">beyond BOME &#8212; generation hub</text>
  <text x="722" y="299" class="dim">&#8250; 24-PPQN MIDI clock</text>
  <text x="740" y="317" class="dim">slaved to Ableton Link</text>
  <text x="722" y="339" class="dim">&#8250; streaming MTC quarter-frame</text>
  <text x="740" y="357" class="dim">master</text>
  <text x="722" y="379" class="dim">&#8250; MMC</text>

  <!-- ===== bidirectional connectors ===== -->
  <path d="M272 103 L302 103" fill="none" stroke="#05d9e8" stroke-width="1.6" marker-start="url(#ah)" marker-end="url(#ah)"/>
  <path d="M272 155 L302 155" fill="none" stroke="#05d9e8" stroke-width="1.6" marker-start="url(#ah)" marker-end="url(#ah)"/>
  <path d="M272 246 L302 246" fill="none" stroke="#39ff14" stroke-width="1.7" marker-start="url(#ah)" marker-end="url(#ah)"/>
  <path d="M272 358 L302 358" fill="none" stroke="#39ff14" stroke-width="1.7" marker-start="url(#ah)" marker-end="url(#ah)"/>

  <path d="M678 103 L708 103" fill="none" stroke="#05d9e8" stroke-width="1.6" marker-start="url(#ah)" marker-end="url(#ah)"/>
  <path d="M678 182 L708 182" fill="none" stroke="#39ff14" stroke-width="1.7" marker-start="url(#ah)" marker-end="url(#ah)"/>
  <path d="M678 320 L708 320" fill="none" stroke="#39ff14" stroke-width="1.7" marker-start="url(#ah)" marker-end="url(#ah)"/>

  <text x="24" y="500" class="dim" font-size="10">audio &#183; CV/gate are macOS-only; CV correctness needs a genuinely DC-coupled interface &#183; ztranslator-core</text>
</svg>
