<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 650" font-family="'Share Tech Mono', ui-monospace, monospace">
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L8 4.5 L0 9 Z" fill="#05d9e8"/>
    </marker>
    <marker id="ahm" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L8 4.5 L0 9 Z" fill="#7a8ba8"/>
    </marker>
    <style>
      .t     { fill:#e0f0ff; font-size:12px; }
      .dim   { fill:#7a8ba8; font-size:11px; }
      .cyan  { fill:#05d9e8; }
      .mag   { fill:#d300c5; }
      .pink  { fill:#ff6b9d; }
      .green { fill:#39ff14; }
      .title { font-family:'Orbitron', sans-serif; font-weight:700; }
      .h     { fill:#05d9e8; font-size:13px; font-family:'Orbitron', sans-serif; font-weight:700; }
      .box   { fill:#0d0d1a; stroke:#05d9e8; stroke-width:1.5; }
      .jitbx { fill:#0d0d1a; stroke:#d300c5; stroke-width:1.5; }
      .aotbx { fill:#0d0d1a; stroke:#ff2a6d; stroke-width:1.5; }
      .optbx { fill:#0b140b; stroke:#39ff14; stroke-width:1.4; }
      .chip  { fill:#10102a; stroke:#1a1a3e; stroke-width:1; }
      .sub   { fill:#10102a; stroke:#2a1a4e; stroke-width:1; }
      .arrow { stroke:#05d9e8; stroke-width:1.6; fill:none; marker-end:url(#ah); }
      .dash  { stroke:#7a8ba8; stroke-width:1.1; stroke-dasharray:4 3; fill:none; marker-end:url(#ahm); }
    </style>
  </defs>

  <rect x="0" y="0" width="1000" height="650" fill="#0a0a14"/>
  <rect x="2" y="2" width="996" height="646" fill="none" stroke="#1a1a3e" stroke-width="1"/>

  <text x="24" y="34" class="title" fill="#05d9e8" font-size="19">EDITOR &amp; SHELL ECOSYSTEM</text>
  <text x="24" y="52" class="dim">a Helix-fork terminal editor (zemacs) and a corpus-scale zsh plugin world, both riding one shared native host agent</text>

  <!-- ===== ZEMACS HEADER ===== -->
  <rect x="20" y="70" width="960" height="30" rx="4" class="box"/>
  <text x="34" y="90" class="h">ZEMACS</text>
  <text x="120" y="90" class="t" font-size="12">Helix-fork terminal editor &#183; five embedded scripting langs, zero FFI (elisp &#183; vim &#183; awk &#183; zsh &#183; stryke) &#183; #120</text>

  <!-- ===== EDITOR CORE (INHERITED) ===== -->
  <rect x="20" y="108" width="220" height="232" rx="4" class="chip"/>
  <text x="34" y="130" class="t" font-size="12.5">editor core</text>
  <text x="34" y="147" class="dim">Helix base &#8212; inherited</text>
  <text x="34" y="174" class="dim" font-size="10.5">&#8250; modal selection engine</text>
  <text x="34" y="192" class="dim" font-size="10.5">&#8250; tree-sitter language breadth</text>
  <text x="34" y="210" class="dim" font-size="10.5">&#8250; rainbow brackets</text>
  <text x="34" y="228" class="dim" font-size="10.5">&#8250; indent queries</text>
  <text x="34" y="246" class="dim" font-size="10.5">&#8250; language configs</text>
  <text x="34" y="264" class="dim" font-size="10.5">&#8250; LSP / DAP core</text>
  <rect x="34" y="288" width="192" height="34" rx="3" class="sub"/>
  <text x="130" y="309" class="dim" font-size="10.5" text-anchor="middle">NOT claimed as firsts</text>

  <!-- ===== ZEMACS ADDITIONS ===== -->
  <rect x="252" y="108" width="486" height="232" rx="4" class="box"/>
  <text x="266" y="130" class="h" font-size="12.5">zemacs additions</text>
  <text x="470" y="130" class="dim">#120a&#8211;120s &#183; own work</text>
  <!-- left column -->
  <text x="266" y="152" class="dim" font-size="10.5">&#8250; vim operator grammar (120a)</text>
  <text x="266" y="170" class="dim" font-size="10.5">&#8250; keymaps: vim/emacs/helix (120b)</text>
  <text x="266" y="188" class="dim" font-size="10.5">&#8250; coverage harness (120c)</text>
  <text x="266" y="206" class="dim" font-size="10.5">&#8250; thread-local host ABI (120d)</text>
  <text x="266" y="224" class="dim" font-size="10.5">&#8250; cross-lang REPL (120e)</text>
  <text x="266" y="242" class="dim" font-size="10.5">&#8250; :awk in-place filter (120f)</text>
  <text x="266" y="260" class="dim" font-size="10.5">&#8250; diff3 merge resolver (120g)</text>
  <text x="266" y="278" class="dim" font-size="10.5">&#8250; magit git porcelain (120h)</text>
  <!-- right column -->
  <text x="506" y="152" class="dim" font-size="10.5">&#8250; org-mode agenda (120i)</text>
  <text x="506" y="170" class="dim" font-size="10.5">&#8250; hex editor auto-route (120j)</text>
  <text x="506" y="188" class="dim" font-size="10.5">&#8250; PTY terminal mux (120k)</text>
  <text x="506" y="206" class="dim" font-size="10.5">&#8250; IDE workbench overlay (120l)</text>
  <text x="506" y="224" class="dim" font-size="10.5">&#8250; snippet TUI + emmet (120m)</text>
  <text x="506" y="242" class="dim" font-size="10.5">&#8250; Spacemacs SPC tree (120n)</text>
  <text x="506" y="260" class="dim" font-size="10.5">&#8250; reflective settings (120o)</text>
  <text x="506" y="278" class="dim" font-size="10.5">&#8250; LLM assistant, built-in (120r)</text>
  <!-- marquee -->
  <rect x="266" y="294" width="458" height="34" rx="3" class="optbx"/>
  <text x="495" y="315" class="green" font-size="10.5" text-anchor="middle">#120s &#8212; a real Vimscript AND a real Emacs Lisp engine at init</text>

  <!-- ===== NATIVE-HOST BRIDGE ===== -->
  <rect x="750" y="108" width="230" height="232" rx="4" class="jitbx"/>
  <text x="764" y="130" class="title" fill="#d300c5" font-size="12.5">native-host bridge</text>
  <text x="764" y="147" class="dim">#166 &#183; commands/host.rs:1</text>
  <text x="764" y="174" class="dim" font-size="10.5">&#8250; auto-spawns</text>
  <text x="764" y="192" class="cyan" font-size="11">&#160;&#160;zwire-host serve</text>
  <text x="764" y="210" class="dim" font-size="10.5">&#8250; filesystem crawl (fs_walk)</text>
  <text x="764" y="228" class="dim" font-size="10.5">&#8250; subprocess exec, PTY</text>
  <text x="764" y="246" class="dim" font-size="10.5">&#8250; watch / tail files</text>
  <text x="764" y="264" class="dim" font-size="10.5">&#8250; the SAME agent binary</text>
  <text x="764" y="282" class="dim" font-size="10.5">&#160;&#160;the browser HUD uses</text>
  <text x="764" y="312" class="mag" font-size="10.5">one agent, three frontends</text>

  <path d="M865 340 L865 350" class="dash"/>

  <!-- ===== SHARED SUBSTRATE ===== -->
  <rect x="20" y="350" width="960" height="30" rx="4" class="box"/>
  <text x="34" y="370" class="h">shared substrate</text>
  <text x="220" y="370" class="dim">zwire-host native agent &#8212; auto-spawned by zemacs, reused by the browser HUD &#183; zsh runtime hosts the corpus</text>

  <path d="M500 380 L500 392" class="dash"/>

  <!-- ===== ZSH ECOSYSTEM HEADER ===== -->
  <rect x="20" y="392" width="960" height="28" rx="4" class="box"/>
  <text x="34" y="411" class="h">ZSH PLUGIN ECOSYSTEM</text>
  <text x="726" y="411" class="dim">corpus-scale completions &#183; framework</text>

  <!-- ===== ZSH ROW 1 ===== -->
  <rect x="20" y="430" width="306" height="86" rx="4" class="box"/>
  <text x="34" y="452" class="cyan title" font-size="12.5">zsh-more-completions</text>
  <text x="34" y="472" class="dim" font-size="10.5">largest curated zsh completion corpus</text>
  <text x="34" y="490" class="dim" font-size="10.5">47,346 _* files (verified) &#183; offline index</text>
  <text x="34" y="508" class="dim" font-size="10.5">#124</text>

  <rect x="340" y="430" width="306" height="86" rx="4" class="box"/>
  <text x="354" y="452" class="cyan title" font-size="12.5">zpwr</text>
  <text x="354" y="472" class="dim" font-size="10.5">terminal-OS verb dispatcher &#183; ~460 verbs</text>
  <text x="354" y="490" class="dim" font-size="10.5">14,100 completions &#183; 2,000 aliases &#183; 190k LOC</text>
  <text x="354" y="508" class="dim" font-size="10.5">#122 &#183; zpwr top HUD #123</text>

  <rect x="660" y="430" width="320" height="86" rx="4" class="box"/>
  <text x="674" y="452" class="cyan title" font-size="12.5">zshrs editor tooling</text>
  <text x="674" y="472" class="dim" font-size="10.5">reflection-generated grammars, drift-proof</text>
  <text x="674" y="490" class="dim" font-size="10.5">emacs mode / vim runtime / vscode + LSP+DAP</text>
  <text x="674" y="508" class="dim" font-size="10.5">#121</text>

  <!-- ===== ZSH ROW 2 ===== -->
  <rect x="20" y="526" width="182" height="72" rx="4" class="chip"/>
  <text x="34" y="547" class="t" font-size="11.5">Homebrew completion</text>
  <text x="34" y="565" class="dim" font-size="10">shipped to millions</text>
  <text x="34" y="580" class="dim" font-size="10">canonical upstream</text>
  <text x="34" y="594" class="dim" font-size="10">(ecosystem)</text>

  <rect x="216" y="526" width="182" height="72" rx="4" class="chip"/>
  <text x="230" y="547" class="t" font-size="11.5">zinit</text>
  <text x="230" y="565" class="dim" font-size="10">major contributor</text>
  <text x="230" y="580" class="dim" font-size="10">plugin manager</text>
  <text x="230" y="594" class="dim" font-size="10">(ecosystem)</text>

  <rect x="410" y="526" width="182" height="72" rx="4" class="box"/>
  <text x="424" y="547" class="cyan" font-size="11.5">remote-pkg compl.</text>
  <text x="424" y="565" class="dim" font-size="10">pip/cargo/gem/npm/...</text>
  <text x="424" y="580" class="dim" font-size="10">live versions + desc</text>
  <text x="424" y="594" class="dim" font-size="10">#125</text>

  <rect x="604" y="526" width="182" height="72" rx="4" class="box"/>
  <text x="618" y="547" class="cyan" font-size="11.5">zsh-expand</text>
  <text x="618" y="565" class="dim" font-size="10">spacebar live-expander</text>
  <text x="618" y="580" class="dim" font-size="10">fish-style ghost text</text>
  <text x="618" y="594" class="dim" font-size="10">#126</text>

  <rect x="798" y="526" width="182" height="72" rx="4" class="box"/>
  <text x="812" y="547" class="cyan" font-size="11.5">storageshower</text>
  <text x="812" y="565" class="dim" font-size="10">neon disk TUI</text>
  <text x="812" y="580" class="dim" font-size="10">SMART &#183; per-mount I/O</text>
  <text x="812" y="594" class="dim" font-size="10">#127</text>

  <text x="24" y="632" class="dim" font-size="10">one editor + the world's largest zsh completion corpus, on the shared zwire-host substrate &#183; ch.8</text>
</svg>
