<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 606" font-family="'Share Tech Mono', ui-monospace, monospace">
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L8 4.5 L0 9 Z" fill="#05d9e8"/>
    </marker>
    <marker id="ahm" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L8 4.5 L0 9 Z" fill="#7a8ba8"/>
    </marker>
    <style>
      .t     { fill:#e0f0ff; font-size:12px; }
      .dim   { fill:#7a8ba8; font-size:11px; }
      .cyan  { fill:#05d9e8; }
      .mag   { fill:#d300c5; }
      .pink  { fill:#ff6b9d; }
      .green { fill:#39ff14; }
      .title { font-family:'Orbitron', sans-serif; font-weight:700; }
      .h     { fill:#05d9e8; font-size:13px; font-family:'Orbitron', sans-serif; font-weight:700; }
      .box   { fill:#0d0d1a; stroke:#05d9e8; stroke-width:1.5; }
      .jitbx { fill:#0d0d1a; stroke:#d300c5; stroke-width:1.5; }
      .aotbx { fill:#0d0d1a; stroke:#ff2a6d; stroke-width:1.5; }
      .optbx { fill:#0b140b; stroke:#39ff14; stroke-width:1.4; }
      .chip  { fill:#10102a; stroke:#1a1a3e; stroke-width:1; }
      .sub   { fill:#10102a; stroke:#2a1a4e; stroke-width:1; }
      .arrow { stroke:#05d9e8; stroke-width:1.6; fill:none; marker-end:url(#ah); }
      .dash  { stroke:#7a8ba8; stroke-width:1.1; stroke-dasharray:4 3; fill:none; marker-end:url(#ahm); }
    </style>
  </defs>

  <rect x="0" y="0" width="1000" height="606" fill="#0a0a14"/>
  <rect x="2" y="2" width="996" height="602" fill="none" stroke="#1a1a3e" stroke-width="1"/>

  <text x="24" y="34" class="title" fill="#05d9e8" font-size="19">PHYSICAL-MODELLING NETWORKS (#73)</text>
  <text x="24" y="52" class="dim">real waveguide / modal instrument networks as first-class DSP blocks &#8212; the tone emerges from the physics, not from a sample</text>

  <!-- ===== SHARED TECHNIQUE ===== -->
  <rect x="20" y="70" width="960" height="118" rx="4" class="box"/>
  <text x="38" y="92" class="h">the shared physics &#8212; one signal chain reused by every instrument</text>

  <rect x="38"  y="110" width="196" height="54" rx="4" class="sub"/>
  <text x="136" y="132" class="cyan" text-anchor="middle" font-size="12">excitation</text>
  <text x="136" y="150" class="dim" text-anchor="middle">pluck &#183; bow &#183; strike</text>

  <rect x="254" y="110" width="300" height="54" rx="4" class="sub"/>
  <text x="404" y="132" class="cyan" text-anchor="middle" font-size="12">delay line + filter loop</text>
  <text x="404" y="150" class="dim" text-anchor="middle">tuned delay &#183; Thiran allpass &#183; loss &#183; dispersion</text>

  <rect x="574" y="110" width="250" height="54" rx="4" class="sub"/>
  <text x="699" y="132" class="cyan" text-anchor="middle" font-size="12">body / modal resonators</text>
  <text x="699" y="150" class="dim" text-anchor="middle">membrane &#183; plate &#183; bar &#183; bell modes</text>

  <rect x="844" y="110" width="118" height="54" rx="4" class="sub"/>
  <text x="903" y="141" class="cyan" text-anchor="middle" font-size="12">out</text>

  <path d="M234 137 L254 137" class="arrow"/>
  <path d="M554 137 L574 137" class="arrow"/>
  <path d="M824 137 L844 137" class="arrow"/>

  <path d="M544 110 C544 100 264 100 264 110" class="arrow"/>
  <text x="404" y="105" class="green" text-anchor="middle" font-size="9.5">string feedback loop</text>

  <path d="M574 174 L280 174" class="dash"/>
  <text x="430" y="185" class="dim" text-anchor="middle" font-size="9.5">bidirectional string&#8594;body &amp; body&#8594;string coupling &#8212; sympathetic resonance emerges</text>

  <!-- ===== WAVEGUIDE STRINGS ===== -->
  <rect x="20" y="200" width="960" height="224" rx="4" class="box"/>
  <text x="38" y="222" class="h">WAVEGUIDE STRINGS</text>
  <text x="962" y="222" class="dim" text-anchor="end">Extended Karplus-Strong strings + STK bowed strings, coupled to body / modal banks</text>

  <rect x="38"  y="232" width="222" height="42" rx="4" class="chip"/>
  <text x="149" y="249" class="cyan" text-anchor="middle" font-size="12">Banjo</text>
  <text x="149" y="266" class="dim" text-anchor="middle">5 WG strings + Bessel head</text>
  <rect x="272" y="232" width="222" height="42" rx="4" class="chip"/>
  <text x="383" y="249" class="cyan" text-anchor="middle" font-size="12">AcousticGuitar</text>
  <text x="383" y="266" class="dim" text-anchor="middle">6 WG strings + body modes</text>
  <rect x="506" y="232" width="222" height="42" rx="4" class="chip"/>
  <text x="617" y="249" class="cyan" text-anchor="middle" font-size="12">Harp</text>
  <text x="617" y="266" class="dim" text-anchor="middle">7 WG strings + sympathy</text>
  <rect x="740" y="232" width="222" height="42" rx="4" class="chip"/>
  <text x="851" y="249" class="cyan" text-anchor="middle" font-size="12">GrandPiano</text>
  <text x="851" y="266" class="dim" text-anchor="middle">modal inharmonic + hammer comb</text>

  <rect x="38"  y="278" width="222" height="42" rx="4" class="chip"/>
  <text x="149" y="295" class="cyan" text-anchor="middle" font-size="12">Violin</text>
  <text x="149" y="312" class="dim" text-anchor="middle">STK bowed + body modes</text>
  <rect x="272" y="278" width="222" height="42" rx="4" class="chip"/>
  <text x="383" y="295" class="cyan" text-anchor="middle" font-size="12">Cello</text>
  <text x="383" y="312" class="dim" text-anchor="middle">STK bowed + body modes</text>
  <rect x="506" y="278" width="222" height="42" rx="4" class="chip"/>
  <text x="617" y="295" class="cyan" text-anchor="middle" font-size="12">Viola</text>
  <text x="617" y="312" class="dim" text-anchor="middle">STK bowed + body modes</text>
  <rect x="740" y="278" width="222" height="42" rx="4" class="chip"/>
  <text x="851" y="295" class="cyan" text-anchor="middle" font-size="12">DoubleBass</text>
  <text x="851" y="312" class="dim" text-anchor="middle">STK bowed + body modes</text>

  <rect x="38"  y="324" width="222" height="42" rx="4" class="chip"/>
  <text x="149" y="341" class="cyan" text-anchor="middle" font-size="12">ViolaDaGamba</text>
  <text x="149" y="358" class="dim" text-anchor="middle">STK bowed viol + modes</text>
  <rect x="272" y="324" width="222" height="42" rx="4" class="chip"/>
  <text x="383" y="341" class="cyan" text-anchor="middle" font-size="12">Nyckelharpa</text>
  <text x="383" y="358" class="dim" text-anchor="middle">bowed + 12 sympathetic</text>
  <rect x="506" y="324" width="222" height="42" rx="4" class="chip"/>
  <text x="617" y="341" class="cyan" text-anchor="middle" font-size="12">HurdyGurdy</text>
  <text x="617" y="358" class="dim" text-anchor="middle">wheel-bowed + 2 drones</text>
  <rect x="740" y="324" width="222" height="42" rx="4" class="chip"/>
  <text x="851" y="341" class="cyan" text-anchor="middle" font-size="12">Clavichord</text>
  <text x="851" y="358" class="dim" text-anchor="middle">tangent-struck + Bebung</text>

  <rect x="38"  y="370" width="222" height="42" rx="4" class="chip"/>
  <text x="149" y="387" class="cyan" text-anchor="middle" font-size="12">Dulcimer</text>
  <text x="149" y="404" class="dim" text-anchor="middle">melody + 2 drones</text>
  <rect x="272" y="370" width="222" height="42" rx="4" class="chip"/>
  <text x="383" y="387" class="cyan" text-anchor="middle" font-size="12">Kantele</text>
  <text x="383" y="404" class="dim" text-anchor="middle">bright box zither</text>

  <!-- ===== MODAL / STRUCK-BAR & BELL ===== -->
  <rect x="20" y="434" width="960" height="132" rx="4" class="jitbx"/>
  <text x="38" y="456" class="title" fill="#d300c5" font-size="13">MODAL / STRUCK-BAR &amp; BELL</text>
  <text x="962" y="456" class="dim" text-anchor="end">no delay line &#8212; partials placed directly as struck 2nd-order resonators</text>

  <rect x="38"  y="466" width="222" height="42" rx="4" class="chip"/>
  <text x="149" y="483" class="mag" text-anchor="middle" font-size="12">TubularBells</text>
  <text x="149" y="500" class="dim" text-anchor="middle">2:3:4 tuned chimes</text>
  <rect x="272" y="466" width="222" height="42" rx="4" class="chip"/>
  <text x="383" y="483" class="mag" text-anchor="middle" font-size="12">ChurchBell</text>
  <text x="383" y="500" class="dim" text-anchor="middle">true-harmonic cast bell</text>
  <rect x="506" y="466" width="222" height="42" rx="4" class="chip"/>
  <text x="617" y="483" class="mag" text-anchor="middle" font-size="12">TuningFork</text>
  <text x="617" y="500" class="dim" text-anchor="middle">clamped-free bar</text>
  <rect x="740" y="466" width="222" height="42" rx="4" class="chip"/>
  <text x="851" y="483" class="mag" text-anchor="middle" font-size="12">Celesta</text>
  <text x="851" y="500" class="dim" text-anchor="middle">felt-hammered steel bars</text>

  <rect x="38"  y="512" width="222" height="42" rx="4" class="chip"/>
  <text x="149" y="529" class="mag" text-anchor="middle" font-size="12">SingingBowl</text>
  <text x="149" y="546" class="dim" text-anchor="middle">split-mode beating</text>
  <rect x="272" y="512" width="222" height="42" rx="4" class="chip"/>
  <text x="383" y="529" class="mag" text-anchor="middle" font-size="12">SteelTongue</text>
  <text x="383" y="546" class="dim" text-anchor="middle">octave-tuned tongues</text>

  <text x="24" y="586" class="dim" font-size="10">real physical models (waveguide + modal), not samples &#183; part of the ~4,238-block DSP library</text>
</svg>
