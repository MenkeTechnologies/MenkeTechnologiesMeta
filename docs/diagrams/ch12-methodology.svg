<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 620" font-family="'Share Tech Mono', ui-monospace, monospace">
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L8 4.5 L0 9 Z" fill="#05d9e8"/>
    </marker>
    <marker id="ahm" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L8 4.5 L0 9 Z" fill="#7a8ba8"/>
    </marker>
    <style>
      .t     { fill:#e0f0ff; font-size:12px; }
      .dim   { fill:#7a8ba8; font-size:11px; }
      .cyan  { fill:#05d9e8; }
      .mag   { fill:#d300c5; }
      .pink  { fill:#ff6b9d; }
      .green { fill:#39ff14; }
      .title { font-family:'Orbitron', sans-serif; font-weight:700; }
      .h     { fill:#05d9e8; font-size:13px; font-family:'Orbitron', sans-serif; font-weight:700; }
      .box   { fill:#0d0d1a; stroke:#05d9e8; stroke-width:1.5; }
      .jitbx { fill:#0d0d1a; stroke:#d300c5; stroke-width:1.5; }
      .aotbx { fill:#0d0d1a; stroke:#ff2a6d; stroke-width:1.5; }
      .optbx { fill:#0b140b; stroke:#39ff14; stroke-width:1.4; }
      .chip  { fill:#10102a; stroke:#1a1a3e; stroke-width:1; }
      .sub   { fill:#10102a; stroke:#2a1a4e; stroke-width:1; }
      .arrow { stroke:#05d9e8; stroke-width:1.6; fill:none; marker-end:url(#ah); }
      .dash  { stroke:#7a8ba8; stroke-width:1.1; stroke-dasharray:4 3; fill:none; marker-end:url(#ahm); }
    </style>
  </defs>

  <rect x="0" y="0" width="1000" height="620" fill="#0a0a14"/>
  <rect x="2" y="2" width="996" height="616" fill="none" stroke="#1a1a3e" stroke-width="1"/>

  <text x="24" y="34" class="title" fill="#05d9e8" font-size="19">HOW TO CLAIM A FIRST HONESTLY</text>
  <text x="24" y="52" class="dim">the ledger&#8217;s own method &#8212; from candidate capability to a falsifiable, non-exhaustive &quot;none found&quot; entry, owned not proven</text>

  <!-- ===== ROW 1 : STEPS 1-4 ===== -->
  <rect x="20" y="74" width="228" height="122" rx="4" class="box"/>
  <text x="36" y="98"  class="cyan title" font-size="12.5">1 &#183; CANDIDATE</text>
  <text x="36" y="122" class="dim">a capability drawn from</text>
  <text x="36" y="140" class="dim">source &amp; architecture,</text>
  <text x="36" y="158" class="dim">not marketing copy</text>
  <text x="36" y="176" class="dim">(often never documented)</text>

  <rect x="262" y="74" width="228" height="122" rx="4" class="box"/>
  <text x="278" y="98"  class="cyan title" font-size="12.5">2 &#183; RESEARCH FAN-OUT</text>
  <text x="278" y="122" class="dim">parallel agents sweep</text>
  <text x="278" y="140" class="dim">the prior-art space &#8212;</text>
  <text x="278" y="158" class="dim">many web searches</text>
  <text x="278" y="176" class="dim">fired at once</text>

  <rect x="504" y="74" width="228" height="122" rx="4" class="box"/>
  <text x="520" y="98"  class="cyan title" font-size="12.5">3 &#183; FETCH + READ</text>
  <text x="520" y="122" class="dim">pull the actual</text>
  <text x="520" y="140" class="dim">near-miss sources</text>
  <text x="520" y="158" class="dim">read the code,</text>
  <text x="520" y="176" class="dim">not the pitch</text>

  <rect x="746" y="74" width="228" height="122" rx="4" class="box"/>
  <text x="762" y="98"  class="cyan title" font-size="12.5">4 &#183; ADVERSARIAL</text>
  <text x="762" y="122" class="dim">try to REFUTE the claim</text>
  <text x="762" y="140" class="dim">find nearest near-miss,</text>
  <text x="762" y="158" class="dim">say why it does or</text>
  <text x="762" y="176" class="dim">does not dup</text>

  <path d="M248 135 L262 135" class="arrow"/>
  <path d="M490 135 L504 135" class="arrow"/>
  <path d="M732 135 L746 135" class="arrow"/>
  <path d="M860 196 L860 210 L174 210 L174 224" class="arrow"/>

  <!-- ===== ROW 2 : STEPS 5-7 ===== -->
  <rect x="20" y="224" width="308" height="122" rx="4" class="box"/>
  <text x="36" y="248" class="cyan title" font-size="12.5">5 &#183; CONFIDENCE TAG</text>
  <rect x="36"  y="258" width="84" height="26" rx="3" class="chip"/>
  <text x="78"  y="276" class="green" text-anchor="middle" font-size="11">high</text>
  <rect x="124" y="258" width="84" height="26" rx="3" class="chip"/>
  <text x="166" y="276" class="cyan"  text-anchor="middle" font-size="11">med</text>
  <rect x="212" y="258" width="84" height="26" rx="3" class="chip"/>
  <text x="254" y="276" class="pink"  text-anchor="middle" font-size="11">low</text>
  <text x="36" y="306" class="dim" font-size="10.5">high &#8212; strong impl + basis</text>
  <text x="36" y="322" class="dim" font-size="10.5">med &#8212; partial / soft first</text>
  <text x="36" y="338" class="dim" font-size="10.5">low &#8212; WIP / packaging / known-cat</text>

  <rect x="343" y="224" width="308" height="122" rx="4" class="box"/>
  <text x="359" y="248" class="cyan title" font-size="12.5">6 &#183; RECORD ENTRY</text>
  <text x="359" y="272" class="green" font-size="11.5">&quot;None found, not proven&quot;</text>
  <text x="359" y="292" class="dim">NOT &quot;none exists&quot;</text>
  <text x="359" y="310" class="dim">a non-exhaustive search,</text>
  <text x="359" y="328" class="dim">owned by MenkeTechnologies</text>

  <rect x="666" y="224" width="308" height="122" rx="4" class="box"/>
  <text x="682" y="248" class="cyan title" font-size="12.5">7 &#183; INVITE TO REFUTE</text>
  <text x="682" y="272" class="dim">open the cited file, confirm;</text>
  <text x="682" y="290" class="dim">find the missed near-miss;</text>
  <text x="682" y="308" class="dim">meets EVERY criterion?</text>
  <text x="682" y="326" class="dim">if yes &#8594; downgrade / strike</text>

  <path d="M328 285 L343 285" class="arrow"/>
  <path d="M651 285 L666 285" class="arrow"/>
  <path d="M174 346 L174 372" class="arrow"/>
  <path d="M497 346 L497 372" class="arrow"/>
  <path d="M820 346 L820 372" class="arrow"/>

  <!-- ===== HONESTY GUARDRAILS ===== -->
  <rect x="20" y="372" width="954" height="176" rx="4" class="optbx"/>
  <text x="38" y="398" class="title" fill="#39ff14" font-size="13">HONESTY GUARDRAILS</text>
  <line x1="497" y1="384" x2="497" y2="536" stroke="#1a3a1a" stroke-width="1"/>

  <text x="38" y="424" class="green" font-size="11.5">&quot;none found&quot; &#8800; &quot;none exists&quot;</text>
  <text x="38" y="446" class="dim">a search cannot prove a negative &#8212; it can never</text>
  <text x="38" y="464" class="dim">see private, internal, defunct, or unpublished work.</text>
  <text x="38" y="486" class="dim">so the fixed phrasing is &quot;none found,&quot; and every</text>
  <text x="38" y="504" class="dim">claim is owned by MenkeTechnologies, never</text>
  <text x="38" y="522" class="dim">stamped an absolute categorical first.</text>

  <text x="515" y="424" class="green" font-size="11.5">an invitation to refute</text>
  <text x="515" y="446" class="dim">open the cited file: is the capability there? does a</text>
  <text x="515" y="464" class="dim">near-miss meet EVERY criterion, not just one?</text>
  <text x="515" y="486" class="dim">if a near-miss holds, downgrade or strike the entry;</text>
  <text x="515" y="504" class="dim">if the impl does not hold, a high becomes a med.</text>
  <text x="515" y="522" class="dim">the claims are falsifiable on purpose.</text>

  <text x="24" y="600" class="dim" font-size="10">every world&#8217;s first here rests on non-exhaustive prior-art absence, not proof &#183; owned, not proven</text>
</svg>
