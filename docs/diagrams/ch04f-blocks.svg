<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 570" font-family="'Share Tech Mono', ui-monospace, monospace">
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L8 4.5 L0 9 Z" fill="#05d9e8"/>
    </marker>
    <marker id="ahm" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L8 4.5 L0 9 Z" fill="#7a8ba8"/>
    </marker>
    <style>
      .t     { fill:#e0f0ff; font-size:12px; }
      .dim   { fill:#7a8ba8; font-size:11px; }
      .cyan  { fill:#05d9e8; }
      .mag   { fill:#d300c5; }
      .pink  { fill:#ff6b9d; }
      .green { fill:#39ff14; }
      .title { font-family:'Orbitron', sans-serif; font-weight:700; }
      .h     { fill:#05d9e8; font-size:13px; font-family:'Orbitron', sans-serif; font-weight:700; }
      .box   { fill:#0d0d1a; stroke:#05d9e8; stroke-width:1.5; }
      .jitbx { fill:#0d0d1a; stroke:#d300c5; stroke-width:1.5; }
      .aotbx { fill:#0d0d1a; stroke:#ff2a6d; stroke-width:1.5; }
      .optbx { fill:#0b140b; stroke:#39ff14; stroke-width:1.4; }
      .chip  { fill:#10102a; stroke:#1a1a3e; stroke-width:1; }
      .sub   { fill:#10102a; stroke:#2a1a4e; stroke-width:1; }
      .arrow { stroke:#05d9e8; stroke-width:1.6; fill:none; marker-end:url(#ah); }
      .dash  { stroke:#7a8ba8; stroke-width:1.1; stroke-dasharray:4 3; fill:none; marker-end:url(#ahm); }
    </style>
  </defs>

  <rect x="0" y="0" width="1000" height="570" fill="#0a0a14"/>
  <rect x="2" y="2" width="996" height="566" fill="none" stroke="#1a1a3e" stroke-width="1"/>

  <text x="24" y="34" class="title" fill="#05d9e8" font-size="19">THE UNIFIED DSP BLOCK LIBRARY (#71)</text>
  <text x="24" y="52" class="dim">one shared, deduplicated catalog &#8212; ~4,238 blocks (3,366 audio &#183; 309 synth &#183; 563 MIDI), every name globally unique, drawn on by all three plugins &amp; the DAW</text>

  <!-- ===== DASHED SPOKES (hub &#8596; category clusters) ===== -->
  <path d="M500 214 L500 192" class="dash"/>
  <path d="M500 364 L500 386" class="dash"/>
  <path d="M352 289 L320 289" class="dash"/>
  <path d="M648 289 L680 289" class="dash"/>
  <path d="M356 218 L322 186" class="dash"/>
  <path d="M644 218 L678 186" class="dash"/>
  <path d="M356 360 L322 392" class="dash"/>
  <path d="M644 360 L678 392" class="dash"/>

  <!-- ===== ROW 1 ===== -->
  <rect x="20" y="88" width="300" height="104" rx="4" class="box"/>
  <text x="36" y="110" class="cyan title" font-size="12.5">Filters</text>
  <text x="36" y="131" class="dim">ZDF ladder &#183; SVF &#183; state-variable</text>
  <text x="36" y="148" class="dim">Moog / diode ladder morphs</text>
  <text x="36" y="165" class="dim">comb &#183; allpass &#183; formant</text>
  <text x="36" y="182" class="dim">shelving &#183; peaking &#183; parametric EQ</text>

  <rect x="352" y="88" width="296" height="104" rx="4" class="box"/>
  <text x="368" y="110" class="cyan title" font-size="12.5">Oscillators</text>
  <text x="368" y="131" class="dim">analog VCO &#183; super-saw &#183; sync</text>
  <text x="368" y="148" class="dim">wavetable &#183; FM operator banks</text>
  <text x="368" y="165" class="dim">additive &#183; granular sources</text>
  <text x="368" y="182" class="dim">noise &#183; sub &#183; LFO generators</text>

  <rect x="680" y="88" width="295" height="104" rx="4" class="box"/>
  <text x="696" y="110" class="cyan title" font-size="12.5">Effects</text>
  <text x="696" y="131" class="dim">reverb &#183; delay &#183; chorus &#183; flanger</text>
  <text x="696" y="148" class="dim">Eventide algorithm ports</text>
  <text x="696" y="165" class="dim">Traktor FX ports</text>
  <text x="696" y="182" class="dim">pitch-shift &#183; freeze &#183; spectral</text>

  <!-- ===== ROW 2: sides + hub ===== -->
  <rect x="20" y="214" width="300" height="150" rx="4" class="box"/>
  <text x="36" y="236" class="cyan title" font-size="12.5">Dynamics</text>
  <text x="36" y="257" class="dim">compressor &#183; limiter &#183; expander</text>
  <text x="36" y="274" class="dim">gate &#183; transient shaper</text>
  <text x="36" y="291" class="dim">sidechain &#183; bus glue</text>
  <text x="36" y="308" class="dim">saturation &#183; tape / tube stages</text>
  <text x="36" y="340" class="green" font-size="10.5">194 nodal/Newton circuit solves (#72)</text>
  <text x="36" y="356" class="dim" font-size="10">one shared ckt:: device-solver</text>

  <rect x="680" y="214" width="295" height="150" rx="4" class="box"/>
  <text x="696" y="236" class="cyan title" font-size="12.5">Physical models (#73)</text>
  <text x="696" y="257" class="dim">Ext. Karplus-Strong strings</text>
  <text x="696" y="274" class="dim">modal resonator / bell banks</text>
  <text x="696" y="291" class="dim">string &#8596; body coupling (bidir.)</text>
  <text x="696" y="308" class="dim">Banjo &#183; Violin &#183; GrandPiano &#183; bells</text>
  <text x="696" y="340" class="green" font-size="10.5">21 coupled instrument networks</text>
  <text x="696" y="356" class="dim" font-size="10">physics, not samples &#183; drop-in blocks</text>

  <!-- ===== HUB ===== -->
  <rect x="352" y="214" width="296" height="150" rx="4" class="jitbx"/>
  <text x="500" y="238" class="title" fill="#d300c5" font-size="13" text-anchor="middle">ONE DEDUPLICATED CATALOG</text>
  <text x="500" y="262" class="cyan" font-size="15" text-anchor="middle">~4,238 blocks</text>
  <text x="500" y="282" class="t" text-anchor="middle" font-size="11.5">every name GLOBALLY UNIQUE</text>
  <text x="500" y="302" class="dim" text-anchor="middle">3,366 audio &#183; 309 synth &#183; 563 MIDI</text>
  <rect x="372" y="313" width="256" height="24" rx="3" class="sub"/>
  <text x="500" y="329" class="pink" text-anchor="middle" font-size="11">1 catalog &#8594; 3 plugins + the DAW</text>
  <text x="500" y="356" class="dim" text-anchor="middle" font-size="10">BLOCKS.md &#183; gen_blocks.py from registration sites</text>

  <!-- ===== ROW 3 ===== -->
  <rect x="20" y="386" width="300" height="122" rx="4" class="box"/>
  <text x="36" y="408" class="cyan title" font-size="12.5">Math-driven (#74)</text>
  <text x="36" y="429" class="dim">Collatz &#183; Fibonacci &#183; primes</text>
  <text x="36" y="446" class="dim">Harshad &#183; abundant / Achilles gates</text>
  <text x="36" y="463" class="dim">Abelian sandpile generators</text>
  <text x="36" y="486" class="green" font-size="10.5">a first as a synth block</text>
  <text x="36" y="502" class="dim" font-size="10">number-theory driven audio + MIDI</text>

  <rect x="352" y="386" width="296" height="122" rx="4" class="box"/>
  <text x="368" y="408" class="cyan title" font-size="12.5">Chaos / cellular automata</text>
  <text x="368" y="429" class="dim">Game-of-Life &#183; Langton's Ant</text>
  <text x="368" y="446" class="dim">Brian's Brain CA sequencers</text>
  <text x="368" y="463" class="dim">strange attractors</text>
  <text x="368" y="480" class="dim">chaotic neuron maps</text>
  <text x="368" y="502" class="green" font-size="10.5">CA note-stream MIDI + audio blocks</text>

  <rect x="680" y="386" width="295" height="122" rx="4" class="box"/>
  <text x="696" y="408" class="cyan title" font-size="12.5">Novel-design blocks</text>
  <text x="696" y="429" class="dim">NovelBlocks.h &#183; AudioModules.h</text>
  <text x="696" y="446" class="dim">365 &quot;a first as a synth block&quot;</text>
  <text x="696" y="463" class="dim">first-class audio &amp; MIDI citizens</text>
  <text x="696" y="486" class="mag" font-size="10.5">systematic registry = the claim</text>
  <text x="696" y="502" class="dim" font-size="10">scattered math-music mappings pre-exist</text>

  <text x="24" y="546" class="dim" font-size="10">one deduplicated block catalog across audio/synth/MIDI &#183; every block name globally unique</text>
</svg>
