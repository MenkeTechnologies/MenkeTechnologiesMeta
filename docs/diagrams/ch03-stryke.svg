<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 620" font-family="'Share Tech Mono', ui-monospace, monospace">
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L8 4.5 L0 9 Z" fill="#05d9e8"/>
    </marker>
    <marker id="ahm" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L8 4.5 L0 9 Z" fill="#7a8ba8"/>
    </marker>
    <style>
      .t     { fill:#e0f0ff; font-size:12px; }
      .dim   { fill:#7a8ba8; font-size:11px; }
      .cyan  { fill:#05d9e8; }
      .mag   { fill:#d300c5; }
      .pink  { fill:#ff6b9d; }
      .green { fill:#39ff14; }
      .title { font-family:'Orbitron', sans-serif; font-weight:700; }
      .h     { fill:#05d9e8; font-size:13px; font-family:'Orbitron', sans-serif; font-weight:700; }
      .box   { fill:#0d0d1a; stroke:#05d9e8; stroke-width:1.5; }
      .jitbx { fill:#0d0d1a; stroke:#d300c5; stroke-width:1.5; }
      .aotbx { fill:#0d0d1a; stroke:#ff2a6d; stroke-width:1.5; }
      .optbx { fill:#0b140b; stroke:#39ff14; stroke-width:1.4; }
      .chip  { fill:#10102a; stroke:#1a1a3e; stroke-width:1; }
      .sub   { fill:#10102a; stroke:#2a1a4e; stroke-width:1; }
      .arrow { stroke:#05d9e8; stroke-width:1.6; fill:none; marker-end:url(#ah); }
      .dash  { stroke:#7a8ba8; stroke-width:1.1; stroke-dasharray:4 3; fill:none; marker-end:url(#ahm); }
    </style>
  </defs>

  <rect x="0" y="0" width="1000" height="620" fill="#0a0a14"/>
  <rect x="2" y="2" width="996" height="616" fill="none" stroke="#1a1a3e" stroke-width="1"/>

  <text x="24" y="34" class="title" fill="#05d9e8" font-size="19">STRYKELANG &#8212; SYNTHESIS OF FIVE TRADITIONS</text>
  <text x="24" y="52" class="dim">five syntax lineages fused into one original language &#8212; not a Perl rewrite, but a superset with a Perl-5 --compat mode</text>

  <!-- ===== FIVE TRADITIONS ===== -->
  <rect x="20"  y="72" width="184" height="76" rx="4" class="box"/>
  <text x="112" y="98"  class="cyan title" font-size="12.5" text-anchor="middle">Clojure</text>
  <text x="112" y="122" class="t"   text-anchor="middle">-&gt;&gt; thread-last</text>
  <text x="112" y="139" class="dim" text-anchor="middle">thread-last macro</text>

  <rect x="216" y="72" width="184" height="76" rx="4" class="box"/>
  <text x="308" y="98"  class="cyan title" font-size="12.5" text-anchor="middle">Racket</text>
  <text x="308" y="122" class="t"   text-anchor="middle">~&gt; arrows</text>
  <text x="308" y="139" class="dim" text-anchor="middle">threading arrows</text>

  <rect x="412" y="72" width="176" height="76" rx="4" class="box"/>
  <text x="500" y="98"  class="cyan title" font-size="12.5" text-anchor="middle">Scala</text>
  <text x="500" y="122" class="t"   text-anchor="middle">_ underscore</text>
  <text x="500" y="139" class="dim" text-anchor="middle">placeholder arg</text>

  <rect x="600" y="72" width="184" height="76" rx="4" class="box"/>
  <text x="692" y="98"  class="cyan title" font-size="12.5" text-anchor="middle">Perl</text>
  <text x="692" y="122" class="t"   text-anchor="middle">sigils &#183; $_</text>
  <text x="692" y="139" class="dim" text-anchor="middle">topic + sigils</text>

  <rect x="796" y="72" width="184" height="76" rx="4" class="box"/>
  <text x="888" y="98"  class="cyan title" font-size="12.5" text-anchor="middle">Ruby</text>
  <text x="888" y="122" class="t"   text-anchor="middle">p &#183; #{} &#183; |param|</text>
  <text x="888" y="139" class="dim" text-anchor="middle">print &#183; interp &#183; block</text>

  <path d="M112 148 L112 176" class="arrow"/>
  <path d="M308 148 L308 176" class="arrow"/>
  <path d="M500 148 L500 176" class="arrow"/>
  <path d="M692 148 L692 176" class="arrow"/>
  <path d="M888 148 L888 176" class="arrow"/>

  <!-- ===== STRYKE SYNTAX ===== -->
  <rect x="20" y="178" width="960" height="50" rx="4" class="box"/>
  <text x="38" y="203" class="h">stryke syntax</text>
  <text x="200" y="199" class="dim">its own original synthesis &#8212; <tspan class="cyan">not a Perl rewrite</tspan> &#183; a superset with a Perl-5 <tspan class="cyan">--compat</tspan> mode</text>
  <text x="200" y="217" class="dim">absorbs each borrowed construct into one coherent grammar, then lowers to shared bytecode</text>
  <path d="M500 228 L500 258" class="arrow"/>

  <!-- ===== PIPELINE ===== -->
  <rect x="20" y="260" width="116" height="44" rx="4" class="sub"/>
  <text x="78"  y="286" class="cyan" text-anchor="middle" font-size="12">lex</text>
  <rect x="150" y="260" width="116" height="44" rx="4" class="sub"/>
  <text x="208" y="286" class="cyan" text-anchor="middle" font-size="12">parse</text>
  <rect x="280" y="260" width="104" height="44" rx="4" class="sub"/>
  <text x="332" y="286" class="cyan" text-anchor="middle" font-size="12">AST</text>
  <rect x="398" y="260" width="236" height="44" rx="4" class="box"/>
  <text x="516" y="286" class="cyan" text-anchor="middle" font-size="12">fusevm bytecode</text>
  <rect x="648" y="260" width="332" height="44" rx="4" class="jitbx"/>
  <text x="814" y="280" class="cyan" text-anchor="middle" font-size="12">JIT / interpreter</text>
  <text x="814" y="296" class="dim" text-anchor="middle" font-size="10">shared fusevm engine &#8212; same VM as zshrs</text>

  <path d="M136 282 L150 282" class="arrow"/>
  <path d="M266 282 L280 282" class="arrow"/>
  <path d="M384 282 L398 282" class="arrow"/>
  <path d="M634 282 L648 282" class="arrow"/>

  <!-- ===== BRANCH TO USE-CONTEXT ===== -->
  <path d="M500 304 L500 322" class="arrow" marker-end="none"/>
  <path d="M255 322 L745 322" class="arrow" marker-end="none"/>
  <path d="M255 322 L255 350" class="arrow"/>
  <path d="M745 322 L745 350" class="arrow"/>

  <!-- ===== LEFT: EMBEDDED IN ZSHRS ===== -->
  <rect x="20" y="352" width="470" height="196" rx="4" class="box"/>
  <text x="38" y="376" class="h">EMBEDDED INSIDE zshrs</text>
  <text x="38" y="394" class="dim">shell-embedded scripting language</text>
  <rect x="38" y="406" width="434" height="34" rx="3" class="sub"/>
  <text x="255" y="428" class="cyan" text-anchor="middle" font-size="12">@-prefix dispatch &#8212; @&#8230; routes a line to stryke</text>
  <text x="38" y="464" class="dim">&#8250; runs in-process on the zshrs runtime</text>
  <text x="38" y="482" class="dim">&#8250; @-prefix hands the line to the stryke frontend</text>
  <text x="38" y="500" class="dim">&#8250; scripting power without leaving the shell</text>
  <text x="38" y="532" class="green" font-size="10.5">first shell-embedded scripting language via @-dispatch</text>

  <!-- ===== RIGHT: ABSORBS AWK ===== -->
  <rect x="510" y="352" width="470" height="196" rx="4" class="box"/>
  <text x="528" y="376" class="h">ABSORBS awk's ONE-LINER ROLE</text>
  <text x="528" y="394" class="dim">text processing on the command line</text>
  <rect x="528" y="406" width="434" height="34" rx="3" class="sub"/>
  <text x="745" y="428" class="cyan" text-anchor="middle" font-size="12">field extraction &#183; line-by-line transforms</text>
  <text x="528" y="464" class="dim">&#8250; per-line record / field model</text>
  <text x="528" y="482" class="dim">&#8250; covers what awk one-liners did</text>
  <text x="528" y="500" class="dim">&#8250; awk-the-tool becomes redundant in the stack</text>
  <text x="528" y="532" class="pink" font-size="10.5">awk one-liners rewritten in stryke syntax</text>

  <text x="24" y="600" class="dim" font-size="10">first syntactic synthesis of these five traditions &#183; first shell-embedded scripting via @-dispatch</text>
</svg>
