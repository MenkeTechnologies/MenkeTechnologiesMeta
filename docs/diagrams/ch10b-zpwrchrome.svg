<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 560" font-family="'Share Tech Mono', ui-monospace, monospace">
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L8 4.5 L0 9 Z" fill="#05d9e8"/>
    </marker>
    <marker id="ahm" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L8 4.5 L0 9 Z" fill="#7a8ba8"/>
    </marker>
    <style>
      .t     { fill:#e0f0ff; font-size:12px; }
      .dim   { fill:#7a8ba8; font-size:11px; }
      .cyan  { fill:#05d9e8; }
      .mag   { fill:#d300c5; }
      .pink  { fill:#ff6b9d; }
      .green { fill:#39ff14; }
      .title { font-family:'Orbitron', sans-serif; font-weight:700; }
      .h     { fill:#05d9e8; font-size:13px; font-family:'Orbitron', sans-serif; font-weight:700; }
      .box   { fill:#0d0d1a; stroke:#05d9e8; stroke-width:1.5; }
      .jitbx { fill:#0d0d1a; stroke:#d300c5; stroke-width:1.5; }
      .aotbx { fill:#0d0d1a; stroke:#ff2a6d; stroke-width:1.5; }
      .optbx { fill:#0b140b; stroke:#39ff14; stroke-width:1.4; }
      .chip  { fill:#10102a; stroke:#1a1a3e; stroke-width:1; }
      .sub   { fill:#10102a; stroke:#2a1a4e; stroke-width:1; }
      .arrow { stroke:#05d9e8; stroke-width:1.6; fill:none; marker-end:url(#ah); }
      .dash  { stroke:#7a8ba8; stroke-width:1.1; stroke-dasharray:4 3; fill:none; marker-end:url(#ahm); }
    </style>
  </defs>

  <rect x="0" y="0" width="1000" height="560" fill="#0a0a14"/>
  <rect x="2" y="2" width="996" height="556" fill="none" stroke="#1a1a3e" stroke-width="1"/>

  <text x="24" y="34" class="title" fill="#05d9e8" font-size="19">ZPWRCHROME &#8212; SIX TOOL FAMILIES ON ONE NATIVE HOST (#141)</text>
  <text x="24" y="52" class="dim">one Rust native-messaging host multiplexes six tool families over the byte-compatible browserpass wire envelope</text>

  <!-- ===== MV3 EXTENSION ===== -->
  <rect x="20" y="80" width="205" height="328" rx="4" class="box"/>
  <text x="122" y="102" class="cyan title" font-size="12.5" text-anchor="middle">MV3 browser extension</text>
  <text x="32" y="128" class="dim">Chrome MV3 &#8212; zpwrchrome</text>
  <text x="32" y="146" class="dim">popup &#183; background SW</text>
  <text x="32" y="164" class="dim">full-page pass manager UI</text>
  <text x="32" y="182" class="dim">native-messaging port</text>
  <text x="32" y="212" class="dim">speaks the browserpass</text>
  <text x="32" y="228" class="dim">wire to the host below</text>
  <text x="32" y="392" class="green" font-size="10.5">one extension, one host</text>

  <path d="M225 244 L248 244" class="arrow"/>

  <!-- ===== HOST (MULTIPLEXER) ===== -->
  <rect x="250" y="80" width="252" height="328" rx="4" class="jitbx"/>
  <text x="262" y="104" class="title" fill="#d300c5" font-size="13">zpwrchrome-host</text>
  <text x="262" y="124" class="dim">port of browserpass-native</text>
  <text x="262" y="139" class="dim">v3.1.2 &#183; single static Rust host</text>
  <rect x="262" y="150" width="228" height="26" rx="3" class="sub"/>
  <text x="376" y="168" class="green" text-anchor="middle" font-size="11.5">MULTIPLEXER</text>
  <text x="262" y="192" class="dim">dispatches ADDITIVE action</text>
  <text x="262" y="207" class="dim">names BEFORE delegating to the</text>
  <text x="262" y="222" class="cyan" font-size="11">upstream browserpass handler</text>
  <text x="262" y="245" class="dim">upstream protocol stays</text>
  <text x="262" y="260" class="dim">byte-compatible &#8212; it serves</text>
  <text x="262" y="275" class="dim">tools browserpass never imagined</text>
  <text x="262" y="360" class="cyan" font-size="10.5">ureq (rustls) HTTP transport</text>
  <text x="262" y="378" class="mag" font-size="10.5">additive verbs on one wire</text>

  <!-- fan-out from host -->
  <path d="M502 244 L523 104" class="arrow"/>
  <path d="M502 244 L523 160" class="arrow"/>
  <path d="M502 244 L523 216" class="arrow"/>
  <path d="M502 244 L523 272" class="arrow"/>
  <path d="M502 244 L523 328" class="arrow"/>
  <path d="M502 244 L523 384" class="arrow"/>

  <!-- ===== SIX FAMILIES ===== -->
  <rect x="525" y="80" width="450" height="48" rx="4" class="box"/>
  <text x="537" y="100" class="cyan title" font-size="12">1 &#183; pass / vault</text>
  <text x="537" y="118" class="dim">browserpass-compatible password + credit-card + identity store</text>

  <rect x="525" y="136" width="450" height="48" rx="4" class="box"/>
  <text x="537" y="156" class="cyan title" font-size="12">2 &#183; otp</text>
  <text x="537" y="174" class="dim">TOTP codes computed and served over the same wire (RFC 6238)</text>

  <rect x="525" y="192" width="450" height="48" rx="4" class="box"/>
  <text x="537" y="212" class="cyan title" font-size="12">3 &#183; search</text>
  <text x="537" y="230" class="dim">package / registry search</text>

  <rect x="525" y="248" width="450" height="48" rx="4" class="box"/>
  <text x="537" y="268" class="cyan title" font-size="12">4 &#183; downloads</text>
  <text x="537" y="286" class="dim">dl.* segmented download accelerator &#8212; owns Chrome's default</text>

  <rect x="525" y="304" width="450" height="48" rx="4" class="box"/>
  <text x="537" y="324" class="cyan title" font-size="12">5 &#183; host.crawl / host.exec</text>
  <text x="537" y="342" class="dim">filesystem crawl + exec via zwire_host::api</text>

  <rect x="525" y="360" width="450" height="48" rx="4" class="box"/>
  <text x="537" y="380" class="cyan title" font-size="12">6 &#183; identity fill</text>
  <text x="537" y="398" class="dim">form autofill beyond browserpass login-only</text>

  <!-- ===== TRANSPORT ===== -->
  <rect x="20" y="428" width="955" height="66" rx="4" class="box"/>
  <text x="38" y="452" class="h">transport</text>
  <text x="150" y="452" class="dim">ureq (rustls) for HTTP &#183; native-messaging wire, one envelope for every family</text>
  <text x="38" y="478" class="dim">verbs: pass.list / fetch / save / delete&#160;&#160;+&#160;&#160;additive: dl.* &#183; otp &#183; search &#183; host.crawl &#183; host.exec</text>

  <text x="24" y="524" class="dim" font-size="10">first host to multiplex six tool families over the browserpass envelope; &quot;none found,&quot; not proven</text>
</svg>
