<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" font-family="'Share Tech Mono', ui-monospace, monospace">
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L8 4.5 L0 9 Z" fill="#05d9e8"/>
    </marker>
    <marker id="ahm" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L8 4.5 L0 9 Z" fill="#7a8ba8"/>
    </marker>
    <style>
      .t     { fill:#e0f0ff; font-size:12px; }
      .dim   { fill:#7a8ba8; font-size:11px; }
      .cyan  { fill:#05d9e8; }
      .mag   { fill:#d300c5; }
      .pink  { fill:#ff6b9d; }
      .green { fill:#39ff14; }
      .title { font-family:'Orbitron', sans-serif; font-weight:700; }
      .h     { fill:#05d9e8; font-size:13px; font-family:'Orbitron', sans-serif; font-weight:700; }
      .box   { fill:#0d0d1a; stroke:#05d9e8; stroke-width:1.5; }
      .jitbx { fill:#0d0d1a; stroke:#d300c5; stroke-width:1.5; }
      .aotbx { fill:#0d0d1a; stroke:#ff2a6d; stroke-width:1.5; }
      .optbx { fill:#0b140b; stroke:#39ff14; stroke-width:1.4; }
      .chip  { fill:#10102a; stroke:#1a1a3e; stroke-width:1; }
      .sub   { fill:#10102a; stroke:#2a1a4e; stroke-width:1; }
      .arrow { stroke:#05d9e8; stroke-width:1.6; fill:none; marker-end:url(#ah); }
      .dash  { stroke:#7a8ba8; stroke-width:1.1; stroke-dasharray:4 3; fill:none; marker-end:url(#ahm); }
    </style>
  </defs>

  <rect x="0" y="0" width="1000" height="600" fill="#0a0a14"/>
  <rect x="2" y="2" width="996" height="596" fill="none" stroke="#1a1a3e" stroke-width="1"/>

  <text x="24" y="34" class="title" fill="#05d9e8" font-size="19">FUSEVM AOT &#8212; WHOLE-PROGRAM NATIVE COMPILE (#2, #4)</text>
  <text x="24" y="52" class="dim">whole-program AOT lowers each bytecode op to a native basic block that calls back into the same VM::exec_op the interpreter uses</text>

  <!-- ===== PIPELINE: Chunk -> AOT compiler -> .o ===== -->
  <rect x="20" y="72" width="286" height="74" rx="4" class="box"/>
  <text x="163" y="100" class="cyan title" font-size="12.5" text-anchor="middle">fusevm bytecode Chunk</text>
  <text x="163" y="118" class="dim" text-anchor="middle">fusevm::Chunk / Op</text>
  <text x="163" y="134" class="dim" text-anchor="middle">one shared instruction set</text>

  <rect x="356" y="72" width="286" height="74" rx="4" class="box"/>
  <text x="499" y="98"  class="pink title" font-size="12.5" text-anchor="middle">AOT COMPILER</text>
  <text x="499" y="116" class="pink" text-anchor="middle" font-size="11">cranelift_object &#8594; compile_object</text>
  <text x="499" y="134" class="dim" text-anchor="middle">whole-program native lowering</text>

  <rect x="692" y="72" width="283" height="74" rx="4" class="box"/>
  <text x="833" y="98"  class="cyan title" font-size="12.5" text-anchor="middle">relocatable .o</text>
  <text x="833" y="116" class="dim" text-anchor="middle">exports fusevm_aot_entry</text>
  <text x="833" y="134" class="dim" text-anchor="middle">+ serialized chunk &#183; staticlib link</text>

  <path d="M306 109 L356 109" class="arrow"/>
  <path d="M642 109 L692 109" class="arrow"/>
  <path d="M499 146 L499 166" class="arrow"/>

  <!-- ===== SINGLE SOURCE OF TRUTH (magenta) ===== -->
  <rect x="20" y="166" width="955" height="175" rx="4" class="jitbx"/>
  <text x="38" y="189" class="title" fill="#d300c5" font-size="13">SINGLE SOURCE OF TRUTH &#8212; AOT REUSES THE INTERPRETER'S PER-OP STEP</text>

  <rect x="40"  y="205" width="170" height="32" rx="3" class="chip"/>
  <text x="125" y="225" class="cyan" text-anchor="middle" font-size="11">AOT op basic block</text>
  <rect x="232" y="205" width="232" height="32" rx="3" class="chip"/>
  <text x="348" y="225" class="cyan" text-anchor="middle" font-size="11">fusevm_aot_exec_op</text>
  <rect x="486" y="205" width="180" height="32" rx="3" class="chip"/>
  <text x="576" y="225" class="cyan" text-anchor="middle" font-size="11">VM::aot_exec_op</text>
  <path d="M210 221 L232 221" class="arrow"/>
  <path d="M464 221 L486 221" class="arrow"/>
  <text x="348" y="252" class="dim" text-anchor="middle" font-size="10">extern &quot;C&quot; shim</text>

  <rect x="720" y="205" width="235" height="32" rx="3" class="chip"/>
  <text x="837" y="225" class="cyan" text-anchor="middle" font-size="11">INTERPRETER dispatch loop</text>

  <rect x="360" y="275" width="280" height="42" rx="4" fill="#1a0a24" stroke="#d300c5" stroke-width="2"/>
  <text x="500" y="301" class="mag" text-anchor="middle" font-size="13">VM::exec_op &#183; single per-op step</text>

  <path d="M576 237 L576 273" class="arrow"/>
  <path d="M837 237 L837 258 L600 258 L600 273" class="arrow"/>

  <text x="500" y="334" class="mag" text-anchor="middle" font-size="10.5">AOT &amp; interpreter can never diverge &#8212; semantics defined once, here</text>

  <!-- ===== DISK CACHE ACROSS ALL THREE TIERS (#4) ===== -->
  <rect x="20" y="352" width="955" height="175" rx="4" class="box"/>
  <text x="38" y="375" class="h">BEHAVIOR-TRANSPARENT NATIVE-CODE DISK CACHE &#8212; ALL THREE TIERS (#4)</text>
  <text x="38" y="393" class="dim">persists compiled native code across restarts &#183; keyed by chunk op-hash &#183; a changed function invalidates cleanly</text>

  <rect x="55"  y="406" width="270" height="34" rx="3" class="sub"/>
  <text x="190" y="427" class="cyan" text-anchor="middle" font-size="11">INTERPRETER</text>
  <rect x="365" y="406" width="270" height="34" rx="3" class="sub"/>
  <text x="500" y="427" class="cyan" text-anchor="middle" font-size="11">JIT &#183; linear / block / tracing</text>
  <rect x="675" y="406" width="245" height="34" rx="3" class="sub"/>
  <text x="797" y="427" class="cyan" text-anchor="middle" font-size="11">AOT</text>

  <path d="M190 440 L190 460" class="arrow"/>
  <path d="M500 440 L500 460" class="arrow"/>
  <path d="M797 440 L797 460" class="arrow"/>

  <rect x="55" y="460" width="865" height="36" rx="3" class="chip"/>
  <text x="487" y="482" class="green" text-anchor="middle" font-size="11">native-code disk cache &#183; SCHEMA_VERSION &#183; FNV reloc IDs &#183; atomic temp+rename</text>

  <text x="38" y="515" class="dim" font-size="10.5">conservative relocation loader &#8594; falls back to in-memory JIT on any unknown relocation &#183; only removes codegen time, never a result</text>

  <text x="24" y="560" class="dim" font-size="10">whole-program AOT that can't diverge from the interpreter it reuses &#183; fusevm</text>
</svg>
