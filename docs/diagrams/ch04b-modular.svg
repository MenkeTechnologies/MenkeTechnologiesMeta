<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 618" font-family="'Share Tech Mono', ui-monospace, monospace">
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L8 4.5 L0 9 Z" fill="#05d9e8"/>
    </marker>
    <marker id="ahm" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L8 4.5 L0 9 Z" fill="#7a8ba8"/>
    </marker>
    <style>
      .t     { fill:#e0f0ff; font-size:12px; }
      .dim   { fill:#7a8ba8; font-size:11px; }
      .cyan  { fill:#05d9e8; }
      .mag   { fill:#d300c5; }
      .pink  { fill:#ff6b9d; }
      .green { fill:#39ff14; }
      .title { font-family:'Orbitron', sans-serif; font-weight:700; }
      .h     { fill:#05d9e8; font-size:13px; font-family:'Orbitron', sans-serif; font-weight:700; }
      .box   { fill:#0d0d1a; stroke:#05d9e8; stroke-width:1.5; }
      .jitbx { fill:#0d0d1a; stroke:#d300c5; stroke-width:1.5; }
      .aotbx { fill:#0d0d1a; stroke:#ff2a6d; stroke-width:1.5; }
      .optbx { fill:#0b140b; stroke:#39ff14; stroke-width:1.4; }
      .chip  { fill:#10102a; stroke:#1a1a3e; stroke-width:1; }
      .sub   { fill:#10102a; stroke:#2a1a4e; stroke-width:1; }
      .arrow { stroke:#05d9e8; stroke-width:1.6; fill:none; marker-end:url(#ah); }
      .dash  { stroke:#7a8ba8; stroke-width:1.1; stroke-dasharray:4 3; fill:none; marker-end:url(#ahm); }
    </style>
  </defs>

  <rect x="0" y="0" width="1000" height="618" fill="#0a0a14"/>
  <rect x="2" y="2" width="996" height="614" fill="none" stroke="#1a1a3e" stroke-width="1"/>

  <text x="24" y="34" class="title" fill="#05d9e8" font-size="19">THE FULLY-MODULAR DAW (#65)</text>
  <text x="24" y="52" class="dim">a general-purpose DAW where every track / layer / bus is a user-patchable graph &#8212; and every block param is a modulatable node param</text>

  <!-- ===== DAW PROJECT: tracks/layers/buses as patch graphs ===== -->
  <rect x="20" y="70" width="955" height="170" rx="4" class="box"/>
  <text x="38" y="90" class="h">DAW PROJECT &#8212; every track / layer / bus is a user-patchable patch graph</text>
  <text x="38" y="107" class="dim">every track auto-owns a layer &#183; each layer / bus is a stereo patch graph of blocks &#183; <tspan class="mag">&#9679;</tspan> = an exposed node param</text>

  <!-- Tile 1: Track 1 -->
  <rect x="38" y="118" width="286" height="112" rx="4" class="sub"/>
  <text x="48" y="138" class="dim">TRACK 1 &#8594; <tspan class="cyan">layer graph</tspan></text>
  <rect x="48"  y="148" width="52" height="22" rx="4" class="chip"/>
  <text x="74"  y="163" class="cyan" text-anchor="middle" font-size="10.5">OSC</text>
  <rect x="118" y="148" width="52" height="22" rx="4" class="chip"/>
  <text x="144" y="163" class="cyan" text-anchor="middle" font-size="10.5">FILT</text>
  <rect x="188" y="148" width="52" height="22" rx="4" class="chip"/>
  <text x="214" y="163" class="cyan" text-anchor="middle" font-size="10.5">VST3</text>
  <rect x="118" y="196" width="52" height="22" rx="4" class="chip"/>
  <text x="144" y="211" class="cyan" text-anchor="middle" font-size="10.5">OUT</text>
  <path d="M100 159 L118 159" class="arrow"/>
  <path d="M170 159 L188 159" class="arrow"/>
  <path d="M200 170 L156 196" class="arrow"/>
  <circle cx="100" cy="150" r="2.6" fill="#d300c5"/>
  <circle cx="170" cy="150" r="2.6" fill="#d300c5"/>
  <circle cx="240" cy="150" r="2.6" fill="#d300c5"/>
  <circle cx="170" cy="196" r="2.6" fill="#d300c5"/>

  <!-- Tile 2: Track 2 -->
  <rect x="350" y="118" width="286" height="112" rx="4" class="sub"/>
  <text x="360" y="138" class="dim">TRACK 2 &#8594; <tspan class="cyan">layer graph</tspan></text>
  <rect x="360" y="148" width="52" height="22" rx="4" class="chip"/>
  <text x="386" y="163" class="cyan" text-anchor="middle" font-size="10.5">SMPL</text>
  <rect x="430" y="148" width="52" height="22" rx="4" class="chip"/>
  <text x="456" y="163" class="cyan" text-anchor="middle" font-size="10.5">FX</text>
  <rect x="500" y="148" width="52" height="22" rx="4" class="chip"/>
  <text x="526" y="163" class="cyan" text-anchor="middle" font-size="10.5">VST3</text>
  <rect x="430" y="196" width="52" height="22" rx="4" class="chip"/>
  <text x="456" y="211" class="cyan" text-anchor="middle" font-size="10.5">OUT</text>
  <path d="M412 159 L430 159" class="arrow"/>
  <path d="M482 159 L500 159" class="arrow"/>
  <path d="M512 170 L468 196" class="arrow"/>
  <circle cx="412" cy="150" r="2.6" fill="#d300c5"/>
  <circle cx="482" cy="150" r="2.6" fill="#d300c5"/>
  <circle cx="552" cy="150" r="2.6" fill="#d300c5"/>
  <circle cx="482" cy="196" r="2.6" fill="#d300c5"/>

  <!-- Tile 3: Master / Aux bus -->
  <rect x="662" y="118" width="290" height="112" rx="4" class="sub"/>
  <text x="672" y="138" class="dim">MASTER / AUX bus &#8594; <tspan class="cyan">graph</tspan></text>
  <rect x="672" y="148" width="52" height="22" rx="4" class="chip"/>
  <text x="698" y="163" class="cyan" text-anchor="middle" font-size="10.5">SUM</text>
  <rect x="742" y="148" width="52" height="22" rx="4" class="chip"/>
  <text x="768" y="163" class="cyan" text-anchor="middle" font-size="10.5">EQ</text>
  <rect x="812" y="148" width="52" height="22" rx="4" class="chip"/>
  <text x="838" y="163" class="cyan" text-anchor="middle" font-size="10.5">LIM</text>
  <rect x="742" y="196" width="52" height="22" rx="4" class="chip"/>
  <text x="768" y="211" class="cyan" text-anchor="middle" font-size="10.5">OUT</text>
  <path d="M724 159 L742 159" class="arrow"/>
  <path d="M794 159 L812 159" class="arrow"/>
  <path d="M824 170 L780 196" class="arrow"/>
  <circle cx="724" cy="150" r="2.6" fill="#d300c5"/>
  <circle cx="794" cy="150" r="2.6" fill="#d300c5"/>
  <circle cx="864" cy="150" r="2.6" fill="#d300c5"/>
  <circle cx="794" cy="196" r="2.6" fill="#d300c5"/>

  <path d="M497 240 L497 258" class="arrow"/>

  <!-- ===== MOD MATRIX ===== -->
  <rect x="20" y="260" width="955" height="94" rx="4" class="jitbx"/>
  <text x="38" y="280" class="title" fill="#d300c5" font-size="13">MOD MATRIX</text>
  <text x="160" y="280" class="dim">any node output &#8594; any param &#183; <tspan class="mag">every param is a node param &#8212; no un-modulatable params</tspan></text>

  <text x="40" y="308" class="cyan" font-size="10.5">osc.out</text>
  <text x="40" y="326" class="cyan" font-size="10.5">lfo.out</text>
  <text x="40" y="344" class="cyan" font-size="10.5">any node.out</text>
  <circle cx="150" cy="304" r="3" fill="#05d9e8"/>
  <circle cx="150" cy="322" r="3" fill="#05d9e8"/>
  <circle cx="150" cy="340" r="3" fill="#05d9e8"/>

  <circle cx="820" cy="304" r="3" fill="#ff6b9d"/>
  <circle cx="820" cy="322" r="3" fill="#ff6b9d"/>
  <circle cx="820" cy="340" r="3" fill="#ff6b9d"/>
  <text x="832" y="308" class="pink" font-size="10.5">filt.cutoff</text>
  <text x="832" y="326" class="pink" font-size="10.5">vst3.param</text>
  <text x="832" y="344" class="pink" font-size="10.5">any block.param</text>

  <path d="M150 304 L820 322" stroke="#d300c5" stroke-width="1.2" fill="none"/>
  <path d="M150 322 L820 304" stroke="#d300c5" stroke-width="1.2" fill="none"/>
  <path d="M150 322 L820 340" stroke="#d300c5" stroke-width="1.2" fill="none"/>
  <path d="M150 340 L820 322" stroke="#d300c5" stroke-width="1.2" fill="none"/>
  <path d="M150 304 L820 340" stroke="#d300c5" stroke-width="1.2" fill="none"/>

  <!-- ===== CONTRAST PANEL ===== -->
  <rect x="20" y="368" width="465" height="150" rx="4" class="optbx"/>
  <text x="38" y="388" class="green title" font-size="12.5">vs REASON &#8212; rack-modular</text>
  <text x="38" y="410" class="dim">&#8250; full DAW + a modular rack (CV / audio cables)</text>
  <text x="38" y="430" class="dim">&#8250; but devices are fixed-architecture units</text>
  <text x="38" y="450" class="dim">&#8250; signal path / mixer is not a free graph</text>
  <text x="38" y="470" class="dim">&#8250; many params have <tspan class="pink">no CV input</tspan></text>
  <text x="38" y="500" class="green" font-size="10.5">rack-modular, not graph-modular</text>

  <rect x="510" y="368" width="465" height="150" rx="4" class="optbx"/>
  <text x="528" y="388" class="green title" font-size="12.5">vs BITWIG / REAKTOR / VCV</text>
  <text x="528" y="410" class="dim">&#8250; Bitwig Grid: modular device INSIDE a fixed DAW</text>
  <text x="528" y="430" class="dim">&#8250; Reaktor / Max / VCV: modular instrument, not a DAW</text>
  <text x="528" y="450" class="dim">&#8250; no general-purpose arranger + mixer + project model</text>
  <text x="528" y="470" class="dim">&#8250; Usine Hollyhock: closest, but a modular perf host</text>
  <text x="528" y="500" class="green" font-size="10.5">modular inside a device, not end to end</text>

  <!-- ===== MARQUEE ===== -->
  <rect x="20" y="528" width="955" height="42" rx="4" class="jitbx"/>
  <text x="38" y="554" class="title" fill="#d300c5" font-size="13">GRAPH-MODULAR END TO END</text>
  <text x="330" y="554" class="mag" font-size="12">every track / layer / bus a graph &#183; every block param modulatable from the mod matrix</text>

  <text x="24" y="598" class="dim" font-size="10">&#8216;none found,&#8217; not proven &#183; modular audio render still being wired (per the ledger caveat)</text>
</svg>
