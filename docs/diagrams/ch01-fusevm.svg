<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 620" font-family="'Share Tech Mono', ui-monospace, monospace">
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L8 4.5 L0 9 Z" fill="#05d9e8"/>
    </marker>
    <marker id="ahm" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L8 4.5 L0 9 Z" fill="#7a8ba8"/>
    </marker>
    <style>
      .t     { fill:#e0f0ff; font-size:12px; }
      .dim   { fill:#7a8ba8; font-size:11px; }
      .cyan  { fill:#05d9e8; }
      .mag   { fill:#d300c5; }
      .pink  { fill:#ff6b9d; }
      .green { fill:#39ff14; }
      .title { font-family:'Orbitron', sans-serif; font-weight:700; }
      .h     { fill:#05d9e8; font-size:13px; font-family:'Orbitron', sans-serif; font-weight:700; }
      .box   { fill:#0d0d1a; stroke:#05d9e8; stroke-width:1.5; }
      .jitbx { fill:#0d0d1a; stroke:#d300c5; stroke-width:1.5; }
      .aotbx { fill:#0d0d1a; stroke:#ff2a6d; stroke-width:1.5; }
      .optbx { fill:#0b140b; stroke:#39ff14; stroke-width:1.4; }
      .chip  { fill:#10102a; stroke:#1a1a3e; stroke-width:1; }
      .sub   { fill:#10102a; stroke:#2a1a4e; stroke-width:1; }
      .arrow { stroke:#05d9e8; stroke-width:1.6; fill:none; marker-end:url(#ah); }
      .dash  { stroke:#7a8ba8; stroke-width:1.1; stroke-dasharray:4 3; fill:none; marker-end:url(#ahm); }
    </style>
  </defs>

  <rect x="0" y="0" width="1000" height="620" fill="#0a0a14"/>
  <rect x="2" y="2" width="996" height="616" fill="none" stroke="#1a1a3e" stroke-width="1"/>

  <text x="24" y="34" class="title" fill="#05d9e8" font-size="19">FUSEVM &#8212; ONE VM, FOURTEEN TONGUES, THREE EXECUTION TIERS</text>
  <text x="24" y="52" class="dim">fourteen language frontends lower their own lex &#8594; parse &#8594; AST onto one shared bytecode; the VM interprets, JITs, or AOT-compiles it</text>

  <!-- ===== FRONTENDS (fourteen, one row) ===== -->
  <rect x="20" y="70" width="64" height="66" rx="4" class="box"/>
  <text x="52" y="95"  class="cyan title" font-size="9.5" text-anchor="middle">strykelang</text>
  <text x="52" y="112" class="dim" font-size="8" text-anchor="middle">Perl 5</text>
  <rect x="90" y="70" width="64" height="66" rx="4" class="box"/>
  <text x="122" y="95"  class="cyan title" font-size="9.5" text-anchor="middle">zshrs</text>
  <text x="122" y="112" class="dim" font-size="8" text-anchor="middle">zsh</text>
  <rect x="160" y="70" width="64" height="66" rx="4" class="box"/>
  <text x="192" y="95"  class="cyan title" font-size="9.5" text-anchor="middle">awkrs</text>
  <text x="192" y="112" class="dim" font-size="8" text-anchor="middle">AWK</text>
  <rect x="230" y="70" width="64" height="66" rx="4" class="box"/>
  <text x="262" y="95"  class="cyan title" font-size="9.5" text-anchor="middle">vimlrs</text>
  <text x="262" y="112" class="dim" font-size="8" text-anchor="middle">VimL</text>
  <rect x="300" y="70" width="64" height="66" rx="4" class="box"/>
  <text x="332" y="95"  class="cyan title" font-size="9.5" text-anchor="middle">elisprs</text>
  <text x="332" y="112" class="dim" font-size="8" text-anchor="middle">Emacs Lisp</text>
  <rect x="370" y="70" width="64" height="66" rx="4" class="box"/>
  <text x="402" y="95"  class="cyan title" font-size="9.5" text-anchor="middle">rubylang</text>
  <text x="402" y="112" class="dim" font-size="8" text-anchor="middle">Ruby</text>
  <rect x="440" y="70" width="64" height="66" rx="4" class="box"/>
  <text x="472" y="95"  class="cyan title" font-size="9.5" text-anchor="middle">arb</text>
  <text x="472" y="112" class="dim" font-size="8" text-anchor="middle">pipeline DSL</text>
  <rect x="510" y="70" width="64" height="66" rx="4" class="box"/>
  <text x="542" y="95"  class="cyan title" font-size="9.5" text-anchor="middle">pythonrs</text>
  <text x="542" y="112" class="dim" font-size="8" text-anchor="middle">Python</text>
  <rect x="580" y="70" width="64" height="66" rx="4" class="box"/>
  <text x="612" y="95"  class="cyan title" font-size="9.5" text-anchor="middle">phplang</text>
  <text x="612" y="112" class="dim" font-size="8" text-anchor="middle">PHP</text>
  <rect x="650" y="70" width="64" height="66" rx="4" class="box"/>
  <text x="682" y="95"  class="cyan title" font-size="9.5" text-anchor="middle">node-js</text>
  <text x="682" y="112" class="dim" font-size="8" text-anchor="middle">JavaScript</text>
  <rect x="720" y="70" width="64" height="66" rx="4" class="box"/>
  <text x="752" y="95"  class="cyan title" font-size="9.5" text-anchor="middle">javars</text>
  <text x="752" y="112" class="dim" font-size="8" text-anchor="middle">Java</text>
  <rect x="790" y="70" width="64" height="66" rx="4" class="box"/>
  <text x="822" y="95"  class="cyan title" font-size="9.5" text-anchor="middle">kotlinrs</text>
  <text x="822" y="112" class="dim" font-size="8" text-anchor="middle">Kotlin</text>
  <rect x="860" y="70" width="64" height="66" rx="4" class="box"/>
  <text x="892" y="95"  class="cyan title" font-size="9.5" text-anchor="middle">scalars</text>
  <text x="892" y="112" class="dim" font-size="8" text-anchor="middle">Scala</text>
  <rect x="930" y="70" width="64" height="66" rx="4" class="box"/>
  <text x="962" y="95"  class="cyan title" font-size="9.5" text-anchor="middle">groovyrs</text>
  <text x="962" y="112" class="dim" font-size="8" text-anchor="middle">Groovy</text>

  <path d="M52 136 L52 158 L500 158" class="arrow" marker-end="none"/>
  <path d="M122 136 L122 158 L500 158" class="arrow" marker-end="none"/>
  <path d="M192 136 L192 158 L500 158" class="arrow" marker-end="none"/>
  <path d="M262 136 L262 158 L500 158" class="arrow" marker-end="none"/>
  <path d="M332 136 L332 158 L500 158" class="arrow" marker-end="none"/>
  <path d="M402 136 L402 158 L500 158" class="arrow" marker-end="none"/>
  <path d="M472 136 L472 158 L500 158" class="arrow" marker-end="none"/>
  <path d="M542 136 L542 158 L500 158" class="arrow" marker-end="none"/>
  <path d="M612 136 L612 158 L500 158" class="arrow" marker-end="none"/>
  <path d="M682 136 L682 158 L500 158" class="arrow" marker-end="none"/>
  <path d="M752 136 L752 158 L500 158" class="arrow" marker-end="none"/>
  <path d="M822 136 L822 158 L500 158" class="arrow" marker-end="none"/>
  <path d="M892 136 L892 158 L500 158" class="arrow" marker-end="none"/>
  <path d="M962 136 L962 158 L500 158" class="arrow" marker-end="none"/>
  <path d="M500 158 L500 176" class="arrow"/>

  <!-- ===== BYTECODE ===== -->
  <rect x="20" y="178" width="960" height="40" rx="4" class="box"/>
  <text x="38" y="203" class="h">fusevm bytecode</text>
  <text x="210" y="203" class="dim">one shared instruction set &#183; fusevm::Chunk / Op &#183; ~224 opcodes &#183; host-trait injection seam (host.rs / awk_host.rs)</text>
  <path d="M500 218 L500 244" class="arrow"/>

  <!-- ===== VM CORE ===== -->
  <rect x="20" y="246" width="960" height="58" rx="4" class="box"/>
  <text x="38" y="270" class="h">FUSEVM &#8212; bytecode virtual machine</text>
  <text x="38" y="290" class="dim">register/stack ops &#183; one <tspan class="cyan">VM::exec_op</tspan> per-op step = the single source of truth reused by every tier below</text>

  <path d="M170 304 L170 344" class="arrow"/>
  <path d="M500 304 L500 344" class="arrow"/>
  <path d="M830 304 L830 344" class="arrow"/>

  <!-- ===== TIER 1: INTERPRETER ===== -->
  <rect x="20" y="346" width="300" height="196" rx="4" class="box"/>
  <text x="38" y="368" class="h">INTERPRETER</text>
  <text x="38" y="385" class="dim">default &#183; always available</text>
  <rect x="38" y="398" width="264" height="34" rx="3" class="sub"/>
  <text x="170" y="419" class="cyan" text-anchor="middle" font-size="12">VM::exec_op dispatch loop</text>
  <text x="38" y="454" class="dim">&#8250; portable, no codegen</text>
  <text x="38" y="472" class="dim">&#8250; the fallback when JIT is off</text>
  <text x="38" y="490" class="dim">&#8250; deopt target for the tracer</text>
  <text x="38" y="522" class="green" font-size="10.5">semantics defined once, here</text>

  <!-- ===== TIER 2: JIT (marquee) ===== -->
  <rect x="345" y="346" width="310" height="196" rx="4" class="jitbx"/>
  <text x="363" y="368" class="title" fill="#d300c5" font-size="13">JIT &#8212; Cranelift, 3 tiers</text>
  <text x="363" y="385" class="dim">hot code &#8594; native machine code</text>
  <rect x="363" y="396" width="86" height="30" rx="3" class="chip"/>
  <text x="406" y="415" class="cyan" text-anchor="middle" font-size="11">linear</text>
  <rect x="455" y="396" width="86" height="30" rx="3" class="chip"/>
  <text x="498" y="415" class="cyan" text-anchor="middle" font-size="11">block</text>
  <rect x="547" y="396" width="90" height="30" rx="3" class="chip"/>
  <text x="592" y="415" class="cyan" text-anchor="middle" font-size="11">tracing</text>
  <path d="M449 411 L455 411" class="arrow"/>
  <path d="M541 411 L547 411" class="arrow"/>
  <text x="363" y="448" class="dim">&#8250; inlines calls, stitches side traces</text>
  <text x="363" y="466" class="dim">&#8250; deopt rebuilds interpreter state</text>
  <text x="363" y="484" class="dim">&#8250; mmap + PROT_EXEC disk cache</text>
  <text x="363" y="522" class="mag" font-size="10.5">machine-code JIT, from scratch, solo</text>

  <!-- ===== TIER 3: AOT ===== -->
  <rect x="680" y="346" width="300" height="196" rx="4" class="aotbx"/>
  <text x="698" y="368" class="title" fill="#ff6b9d" font-size="13">AOT COMPILER</text>
  <text x="698" y="385" class="dim">whole-program &#8594; object file</text>
  <rect x="698" y="398" width="264" height="34" rx="3" class="sub"/>
  <text x="830" y="419" class="pink" text-anchor="middle" font-size="12">cranelift_object &#8594; .o</text>
  <text x="698" y="454" class="dim">&#8250; relocatable, staticlib link</text>
  <text x="698" y="472" class="dim">&#8250; calls back into VM::exec_op</text>
  <text x="698" y="490" class="dim">&#160;&#160;via an extern &quot;C&quot; shim</text>
  <text x="698" y="522" class="pink" font-size="10.5">AOT + interpreter can't diverge</text>

  <text x="24" y="600" class="dim" font-size="10">signal flows top &#8594; bottom (cyan); the interpreter defines semantics once, and the Cranelift JIT and AOT tiers reuse it &#183; fusevm</text>
</svg>
