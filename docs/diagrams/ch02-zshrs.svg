<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 610" font-family="'Share Tech Mono', ui-monospace, monospace">
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L8 4.5 L0 9 Z" fill="#05d9e8"/>
    </marker>
    <marker id="ahm" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L8 4.5 L0 9 Z" fill="#7a8ba8"/>
    </marker>
    <style>
      .t     { fill:#e0f0ff; font-size:12px; }
      .dim   { fill:#7a8ba8; font-size:11px; }
      .cyan  { fill:#05d9e8; }
      .mag   { fill:#d300c5; }
      .pink  { fill:#ff6b9d; }
      .green { fill:#39ff14; }
      .title { font-family:'Orbitron', sans-serif; font-weight:700; }
      .h     { fill:#05d9e8; font-size:13px; font-family:'Orbitron', sans-serif; font-weight:700; }
      .box   { fill:#0d0d1a; stroke:#05d9e8; stroke-width:1.5; }
      .jitbx { fill:#0d0d1a; stroke:#d300c5; stroke-width:1.5; }
      .aotbx { fill:#0d0d1a; stroke:#ff2a6d; stroke-width:1.5; }
      .optbx { fill:#0b140b; stroke:#39ff14; stroke-width:1.4; }
      .chip  { fill:#10102a; stroke:#1a1a3e; stroke-width:1; }
      .sub   { fill:#10102a; stroke:#2a1a4e; stroke-width:1; }
      .arrow { stroke:#05d9e8; stroke-width:1.6; fill:none; marker-end:url(#ah); }
      .dash  { stroke:#7a8ba8; stroke-width:1.1; stroke-dasharray:4 3; fill:none; marker-end:url(#ahm); }
    </style>
  </defs>

  <rect x="0" y="0" width="1000" height="610" fill="#0a0a14"/>
  <rect x="2" y="2" width="996" height="606" fill="none" stroke="#1a1a3e" stroke-width="1"/>

  <text x="24" y="34" class="title" fill="#05d9e8" font-size="19">ZSHRS &#8212; THE COMPILED SHELL</text>
  <text x="24" y="52" class="dim">a zsh-compatible shell that compiles every construct to fusevm bytecode and JITs to native &#8212; no AST tree-walker</text>

  <!-- ===== INPUT ===== -->
  <rect x="20" y="70" width="620" height="44" rx="4" class="box"/>
  <text x="38" y="97" class="h">.zshrc</text>
  <text x="118" y="97" class="dim">/ interactive command line &#8212; the source the shell must run</text>
  <path d="M330 114 L330 130" class="arrow"/>

  <!-- ===== FRONT END ===== -->
  <rect x="20" y="130" width="620" height="54" rx="4" class="box"/>
  <text x="38" y="152" class="h">FRONT END</text>
  <text x="150" y="152" class="dim">the shell's own lexer &#183; parser &#183; AST</text>
  <text x="38" y="172" class="cyan" font-size="12.5">Lexer &#8594; Parser &#8594; AST</text>
  <path d="M330 184 L330 200" class="arrow"/>

  <!-- ===== BYTECODE ===== -->
  <rect x="20" y="200" width="620" height="44" rx="4" class="box"/>
  <text x="38" y="227" class="h">fusevm bytecode</text>
  <text x="210" y="227" class="dim">~129 register ops &#183; the AST tree-walker is physically removed, not kept as a fallback</text>
  <path d="M330 244 L330 260" class="arrow"/>

  <!-- ===== FUSEVM ENGINE ===== -->
  <rect x="20" y="260" width="620" height="88" rx="4" class="box"/>
  <text x="38" y="284" class="h">FUSEVM ENGINE</text>
  <text x="196" y="284" class="dim">the shared runtime &#8212; same VM as <tspan class="mag">strykelang</tspan></text>
  <rect x="38" y="296" width="200" height="30" rx="3" class="sub"/>
  <text x="138" y="315" class="cyan" text-anchor="middle" font-size="11.5">interpreter</text>
  <rect x="246" y="296" width="240" height="30" rx="3" class="jitbx"/>
  <text x="366" y="315" class="mag" text-anchor="middle" font-size="11.5">Cranelift JIT &#8594; native code</text>
  <text x="38" y="342" class="dim">tiered linear / block &#183; native x86-64 &amp; aarch64 &#183; on-disk code cache &#183; AOT &#8594; .o via zbuild</text>

  <!-- ===== CACHES PANEL ===== -->
  <rect x="660" y="70" width="320" height="170" rx="4" class="box"/>
  <text x="678" y="92" class="h">CACHES</text>
  <text x="770" y="92" class="dim">&#8212; authoritative store</text>
  <text x="678" y="116" class="cyan" font-size="11.5">rkyv-mmap bytecode + completion</text>
  <text x="678" y="134" class="dim">caches &#183; zero-copy reads (~150 ns)</text>
  <text x="678" y="152" class="dim">warm starts skip lex/parse/compile</text>
  <text x="678" y="182" class="cyan" font-size="11.5">SQLite3 read-only FTS mirror</text>
  <text x="678" y="200" class="dim">&#8594; queries / dbview (inspect-only)</text>
  <text x="678" y="228" class="green" font-size="10.5">versioned &#183; migration-safe</text>

  <!-- ===== WORKER POOL PANEL ===== -->
  <rect x="660" y="256" width="320" height="92" rx="4" class="box"/>
  <text x="678" y="278" class="h">WORKER POOL + ANTI-FORK</text>
  <text x="678" y="300" class="dim">persistent warm pool &#183; [2,18] threads</text>
  <text x="678" y="318" class="cyan" font-size="11.5">async/await/pmap/peach/barrier</text>
  <text x="678" y="336" class="dim">no fork(2), no address-space copy</text>

  <!-- ===== SIDE CONNECTORS ===== -->
  <path d="M640 300 L650 300 L650 150 L660 150" class="dash"/>
  <path d="M640 306 L660 306" class="dash"/>

  <path d="M330 348 L330 364" class="arrow"/>

  <!-- ===== COMPAT FLOOR ===== -->
  <rect x="20" y="364" width="960" height="100" rx="4" class="box"/>
  <text x="38" y="386" class="h">COMPAT FLOOR</text>
  <text x="180" y="386" class="dim">&#8212; sacred: all of this must keep working, unchanged, as zshrs evolves</text>
  <rect x="38" y="398" width="222" height="52" rx="3" class="chip"/>
  <text x="149" y="420" class="cyan" text-anchor="middle" font-size="11">zpwr</text>
  <text x="149" y="438" class="dim" text-anchor="middle" font-size="10">172k LOC &#183; 506+ subcommands</text>
  <rect x="272" y="398" width="222" height="52" rx="3" class="chip"/>
  <text x="383" y="420" class="cyan" text-anchor="middle" font-size="11">zsh-more-completions</text>
  <text x="383" y="438" class="dim" text-anchor="middle" font-size="10">16,806 files</text>
  <rect x="506" y="398" width="222" height="52" rx="3" class="chip"/>
  <text x="617" y="420" class="cyan" text-anchor="middle" font-size="11">the user's .zshrc</text>
  <text x="617" y="438" class="dim" text-anchor="middle" font-size="10">every option, every hook</text>
  <rect x="740" y="398" width="222" height="52" rx="3" class="chip"/>
  <text x="851" y="420" class="cyan" text-anchor="middle" font-size="11">zinit plugins</text>
  <text x="851" y="438" class="dim" text-anchor="middle" font-size="10">load &amp; run as before</text>
  <path d="M330 464 L330 480" class="arrow"/>

  <!-- ===== OUTPUT ===== -->
  <rect x="20" y="480" width="960" height="72" rx="4" class="optbx"/>
  <text x="38" y="504" class="green title" font-size="13">ZSH-COMPATIBLE BEHAVIOR &#8212; ZERO STARTUP TRICKS</text>
  <text x="38" y="526" class="dim">no instant-prompt fakery &#183; no lazy-load deferral &#183; no eventual-feature-loading &#8212; the full feature set is loaded up front</text>
  <text x="38" y="544" class="green" font-size="11">first paint = full functionality, fully responsive</text>

  <text x="24" y="588" class="dim" font-size="10">first compiled Unix shell &#8212; every shell since 1970 has been a tree-walking interpreter &#183; zshrs</text>
</svg>
