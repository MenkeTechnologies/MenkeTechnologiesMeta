<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 592" font-family="'Share Tech Mono', ui-monospace, monospace">
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L8 4.5 L0 9 Z" fill="#05d9e8"/>
    </marker>
    <marker id="ahm" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L8 4.5 L0 9 Z" fill="#7a8ba8"/>
    </marker>
    <style>
      .t     { fill:#e0f0ff; font-size:12px; }
      .dim   { fill:#7a8ba8; font-size:11px; }
      .cyan  { fill:#05d9e8; }
      .mag   { fill:#d300c5; }
      .pink  { fill:#ff6b9d; }
      .green { fill:#39ff14; }
      .title { font-family:'Orbitron', sans-serif; font-weight:700; }
      .h     { fill:#05d9e8; font-size:13px; font-family:'Orbitron', sans-serif; font-weight:700; }
      .box   { fill:#0d0d1a; stroke:#05d9e8; stroke-width:1.5; }
      .jitbx { fill:#0d0d1a; stroke:#d300c5; stroke-width:1.5; }
      .aotbx { fill:#0d0d1a; stroke:#ff2a6d; stroke-width:1.5; }
      .optbx { fill:#0b140b; stroke:#39ff14; stroke-width:1.4; }
      .chip  { fill:#10102a; stroke:#1a1a3e; stroke-width:1; }
      .sub   { fill:#10102a; stroke:#2a1a4e; stroke-width:1; }
      .arrow { stroke:#05d9e8; stroke-width:1.6; fill:none; marker-end:url(#ah); }
      .dash  { stroke:#7a8ba8; stroke-width:1.1; stroke-dasharray:4 3; fill:none; marker-end:url(#ahm); }
    </style>
  </defs>

  <rect x="0" y="0" width="1000" height="592" fill="#0a0a14"/>
  <rect x="2" y="2" width="996" height="588" fill="none" stroke="#1a1a3e" stroke-width="1"/>

  <text x="24" y="34" class="title" fill="#05d9e8" font-size="19">TRADERVIEW &#8212; INSTITUTIONAL QUANT IN A RETAIL JOURNAL</text>
  <text x="24" y="54" class="dim">a trade-journal front-end over a ~297k-LOC pure-Rust quant core &#183; two binaries from one workspace (#96)</text>

  <!-- ===== FRONT-END / JOURNAL SHELL ===== -->
  <rect x="20" y="72" width="955" height="48" rx="4" class="box"/>
  <text x="36" y="94" class="h" font-size="12">TRADE JOURNAL UI &#183; #96</text>
  <text x="36" y="112" class="dim">Tauri desktop &#8212; embedded PostgreSQL (~/.theseus, auto-login, offline) &#183; axum web &#8212; external PG (argon2 &#183; JWT) &#183; shared crates + schema</text>

  <path d="M172 120 L172 136" class="arrow"/>
  <path d="M497 120 L497 136" class="arrow"/>
  <path d="M822 120 L822 136" class="arrow"/>

  <!-- ===== FEEDERS ===== -->
  <rect x="20" y="136" width="305" height="104" rx="4" class="box"/>
  <text x="36" y="158" class="h" font-size="12">DATA INGESTION MESH</text>
  <text x="36" y="177" class="dim" font-size="10.5">#137 &#183; market_data &#183; yahoo_auth &#183; darkpool</text>
  <text x="36" y="193" class="dim" font-size="10.5">disclosures &#183; 13F &#183; halts &#183; sentiment</text>
  <text x="36" y="212" class="cyan" font-size="10.5">&#8594; live derived scanners:</text>
  <text x="36" y="228" class="dim" font-size="10.5">UOA &#183; gamma-squeeze &#183; HTB &#183; RVOL &#183; breadth</text>

  <rect x="345" y="136" width="305" height="104" rx="4" class="box"/>
  <text x="361" y="158" class="h" font-size="12">EXECUTION</text>
  <text x="361" y="177" class="dim" font-size="10.5">#134 paper sim &#183; paper_*.rs &#183; TWAP/VWAP/POV</text>
  <text x="361" y="193" class="dim" font-size="10.5">bracket/OCO &#183; DRIP &#183; margin &#183; auto-liq</text>
  <text x="361" y="212" class="cyan" font-size="10.5">#135 live brokers (6):</text>
  <text x="361" y="228" class="dim" font-size="10.5">broker_dispatcher &#183; *_pump &#8594; roll-up</text>

  <rect x="670" y="136" width="305" height="104" rx="4" class="box"/>
  <text x="686" y="158" class="h" font-size="12">TAX &amp; FIRE</text>
  <text x="686" y="177" class="dim" font-size="10.5">#97 OCR &#8594; traderview-ocr (no cloud / no LLM)</text>
  <text x="686" y="193" class="dim" font-size="10.5">#140 traderview-tax &#183; brackets &#183; qbi &#183; amt</text>
  <text x="686" y="212" class="dim" font-size="10.5">niit &#183; se_tax &#183; ~48 FIRE planners</text>
  <text x="686" y="228" class="green" font-size="10.5">Rev. Proc. 2024-40 &#183; ~218 tests</text>

  <path d="M172 240 L172 256" class="arrow"/>
  <path d="M497 240 L497 256" class="arrow"/>
  <path d="M822 240 L822 256" class="arrow"/>

  <!-- ===== QUANT CORE ===== -->
  <rect x="20" y="256" width="955" height="170" rx="4" class="box"/>
  <text x="36" y="280" class="h">QUANT CORE &#8212; traderview-core</text>
  <text x="330" y="280" class="dim">~297k LOC &#183; ~1,600 modules &#183; pure-Rust, dependency-light (#136)</text>

  <rect x="38" y="296" width="295" height="48" rx="3" class="sub"/>
  <text x="185" y="316" class="cyan" text-anchor="middle" font-size="11.5">tax-lot roll-up (#130)</text>
  <text x="185" y="334" class="dim" text-anchor="middle" font-size="10">FIFO/LIFO/HIFO/Lifoust &#183; rollup</text>

  <rect x="345" y="296" width="295" height="48" rx="3" class="jitbx"/>
  <text x="492" y="316" class="mag" text-anchor="middle" font-size="11.5">cross-broker wash-sale (#130)</text>
  <text x="492" y="334" class="dim" text-anchor="middle" font-size="10">&#167;1091 taxpayer-level &#183; losses no 1099-B sees</text>

  <rect x="652" y="296" width="295" height="48" rx="3" class="sub"/>
  <text x="799" y="316" class="cyan" text-anchor="middle" font-size="11.5">multi-asset P&amp;L kernel (#131)</text>
  <text x="799" y="334" class="dim" text-anchor="middle" font-size="10">pnl &#183; forex_calc &#183; crypto_liquidation</text>

  <rect x="38" y="356" width="295" height="48" rx="3" class="sub"/>
  <text x="185" y="376" class="cyan" text-anchor="middle" font-size="11.5">quant stats + Monte Carlo (#132)</text>
  <text x="185" y="394" class="dim" text-anchor="middle" font-size="10">sqn &#183; deflated_sharpe &#183; kelly &#183; ruin</text>

  <rect x="345" y="356" width="295" height="48" rx="3" class="sub"/>
  <text x="492" y="376" class="cyan" text-anchor="middle" font-size="11.5">backtest validation (#133)</text>
  <text x="492" y="394" class="dim" text-anchor="middle" font-size="10">algo_tournament &#183; walk_forward (OOS/IS)</text>

  <rect x="652" y="356" width="295" height="48" rx="3" class="sub"/>
  <text x="799" y="376" class="cyan" text-anchor="middle" font-size="11.5">pricers &#183; Greeks &#183; TCA (#136/#139)</text>
  <text x="799" y="394" class="dim" text-anchor="middle" font-size="10">heston &#183; lsmc &#183; vpin &#183; impl_shortfall</text>

  <path d="M252 426 L252 442" class="arrow"/>
  <path d="M742 426 L742 442" class="arrow"/>

  <!-- ===== ENGINE + PERSISTENCE ===== -->
  <rect x="20" y="442" width="465" height="100" rx="4" class="box"/>
  <text x="36" y="464" class="h" font-size="12">stryke-JIT backtest engine (#98)</text>
  <text x="36" y="483" class="dim" font-size="10.5">traderview-stryke host bridge &#183; sandboxed lifecycle hooks</text>
  <text x="36" y="500" class="dim" font-size="10.5">JIT backtests &#183; walk-forward sweeper &#183; custom-indicator AST</text>
  <text x="36" y="517" class="dim" font-size="10.5">strategy alerts &#8594; webhook payload templating</text>
  <text x="36" y="534" class="dim" font-size="10">caveat: today the backtest is interpreted over hardcoded indicators</text>

  <rect x="510" y="442" width="465" height="100" rx="4" class="box"/>
  <text x="526" y="464" class="h" font-size="12">embedded-PG lifecycle (#138)</text>
  <text x="526" y="483" class="dim" font-size="10.5">embedded.rs &#183; downloaded portable Postgres, restart-safe</text>
  <text x="526" y="500" class="dim" font-size="10.5">persisted password (0o600) &#183; stale-PID reaper libc::kill(pid,0)</text>
  <text x="526" y="517" class="dim" font-size="10.5">orphan reaper &#183; start-race recovery</text>
  <text x="526" y="534" class="dim" font-size="10">backs the FIFO roll-up &#183; #96 dual-target embedded/external DB</text>

  <text x="24" y="570" class="dim" font-size="10">breadth over depth &#8212; many quant modules are one-shot calculators, not wired into the journal &#183; traderview</text>
</svg>
