<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 620" font-family="'Share Tech Mono', ui-monospace, monospace">
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L8 4.5 L0 9 Z" fill="#05d9e8"/>
    </marker>
    <marker id="ahm" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L8 4.5 L0 9 Z" fill="#7a8ba8"/>
    </marker>
    <style>
      .t     { fill:#e0f0ff; font-size:12px; }
      .dim   { fill:#7a8ba8; font-size:11px; }
      .cyan  { fill:#05d9e8; }
      .mag   { fill:#d300c5; }
      .pink  { fill:#ff6b9d; }
      .green { fill:#39ff14; }
      .title { font-family:'Orbitron', sans-serif; font-weight:700; }
      .h     { fill:#05d9e8; font-size:13px; font-family:'Orbitron', sans-serif; font-weight:700; }
      .box   { fill:#0d0d1a; stroke:#05d9e8; stroke-width:1.5; }
      .jitbx { fill:#0d0d1a; stroke:#d300c5; stroke-width:1.5; }
      .aotbx { fill:#0d0d1a; stroke:#ff2a6d; stroke-width:1.5; }
      .optbx { fill:#0b140b; stroke:#39ff14; stroke-width:1.4; }
      .chip  { fill:#10102a; stroke:#1a1a3e; stroke-width:1; }
      .sub   { fill:#10102a; stroke:#2a1a4e; stroke-width:1; }
      .arrow { stroke:#05d9e8; stroke-width:1.6; fill:none; marker-end:url(#ah); }
      .dash  { stroke:#7a8ba8; stroke-width:1.1; stroke-dasharray:4 3; fill:none; marker-end:url(#ahm); }
    </style>
  </defs>

  <rect x="0" y="0" width="1000" height="620" fill="#0a0a14"/>
  <rect x="2" y="2" width="996" height="616" fill="none" stroke="#1a1a3e" stroke-width="1"/>

  <text x="24" y="34" class="title" fill="#05d9e8" font-size="19">ZSHRS &#8212; CACHE &amp; PARALLELISM SUBSTRATE</text>
  <text x="24" y="52" class="dim">a compiled shell that stays instant with the full feature set loaded &#8212; zero-copy caches (left) and a warm worker pool (right)</text>

  <!-- ===== COLUMN HEADERS ===== -->
  <text x="20"  y="86" class="h">CACHE &#8212; PERSISTENCE LAYER</text>
  <text x="510" y="86" class="h">PARALLELISM LAYER</text>

  <!-- ===== LEFT: rkyv authoritative store ===== -->
  <rect x="20" y="96" width="470" height="140" rx="4" class="box"/>
  <text x="38" y="120" class="cyan title" font-size="13">rkyv bytecode + completion cache</text>
  <rect x="360" y="106" width="118" height="22" rx="3" class="chip"/>
  <text x="419" y="121" class="green" text-anchor="middle" font-size="10.5">AUTHORITATIVE</text>
  <text x="38" y="146" class="dim">mmap &#183; zero-copy reads ~150 ns &#183; no deserialization</text>
  <rect x="38" y="158" width="182" height="24" rx="3" class="sub"/>
  <text x="129" y="174" class="cyan" text-anchor="middle" font-size="11">versioned &#183; migration-safe</text>
  <text x="38" y="202" class="dim">&#8250; old caches upgrade or silently rebuild</text>
  <text x="38" y="222" class="green" font-size="10.5">&#8250; never break a .zshrc that worked yesterday</text>

  <!-- derives arrow -->
  <path d="M255 236 L255 288" class="dash"/>
  <text x="264" y="266" class="dim" font-size="10.5">derives</text>

  <!-- ===== LEFT: SQLite FTS mirror (derived) ===== -->
  <rect x="20" y="290" width="470" height="120" rx="4" class="sub"/>
  <text x="38" y="314" class="title" fill="#7a8ba8" font-size="13">SQLite3 FTS mirror</text>
  <rect x="376" y="300" width="102" height="22" rx="3" class="chip"/>
  <text x="427" y="315" class="dim" text-anchor="middle" font-size="10.5">READ-ONLY</text>
  <text x="38" y="340" class="dim">derived index &#8212; not the source of truth</text>
  <text x="38" y="364" class="t">queries &#183; dbview &#183; introspection</text>
  <text x="38" y="388" class="dim">&#8250; inspection-only; never affects execution or cache</text>

  <!-- ===== RIGHT: persistent worker pool ===== -->
  <rect x="510" y="96" width="465" height="140" rx="4" class="box"/>
  <text x="528" y="120" class="cyan title" font-size="13">persistent worker pool</text>
  <rect x="846" y="106" width="110" height="22" rx="3" class="chip"/>
  <text x="901" y="121" class="cyan" text-anchor="middle" font-size="10.5">[2,18] THREADS</text>
  <text x="528" y="146" class="dim">warm, always live &#183; no per-command fork/exec</text>
  <text x="528" y="168" class="dim">crossbeam dispatch &#183; 4&#215;N backpressure</text>
  <text x="528" y="200" class="t">replaces fork(2)-per-subtask &#8212; no address-space copy</text>
  <text x="528" y="222" class="green" font-size="10.5">completion runs &#183; command/process substitution, fork-free</text>

  <!-- ===== RIGHT: anti-fork parallel primitives ===== -->
  <rect x="510" y="290" width="465" height="120" rx="4" class="box"/>
  <text x="528" y="314" class="cyan title" font-size="13">anti-fork parallel primitives</text>
  <rect x="528" y="330" width="78" height="28" rx="3" class="chip"/>
  <text x="567" y="349" class="cyan" text-anchor="middle" font-size="11">async</text>
  <rect x="614" y="330" width="78" height="28" rx="3" class="chip"/>
  <text x="653" y="349" class="cyan" text-anchor="middle" font-size="11">await</text>
  <rect x="700" y="330" width="78" height="28" rx="3" class="chip"/>
  <text x="739" y="349" class="cyan" text-anchor="middle" font-size="11">pmap</text>
  <rect x="786" y="330" width="80" height="28" rx="3" class="chip"/>
  <text x="826" y="349" class="cyan" text-anchor="middle" font-size="11">peach</text>
  <rect x="874" y="330" width="84" height="28" rx="3" class="chip"/>
  <text x="916" y="349" class="cyan" text-anchor="middle" font-size="11">barrier</text>
  <text x="528" y="388" class="dim">native shell ops &#8212; not &amp; + wait + subshell</text>

  <!-- ===== BOTTOM: the payoff ===== -->
  <rect x="20" y="430" width="955" height="140" rx="4" class="optbx"/>
  <text x="38" y="456" class="green title" font-size="14">THE PAYOFF &#8212; first paint = full functionality</text>
  <text x="38" y="480" class="t">ZERO startup tricks: no instant-prompt fakery &#183; no lazy autoload deferral &#183; no eventual-feature-loading</text>
  <text x="38" y="504" class="dim">caches load zero-copy and the pool is already warm, so the full feature set is live on the very first prompt</text>
  <text x="38" y="530" class="green" font-size="12">removes the NEED for zinit-turbo / p10k-instant-prompt &#8212; it does not reimplement them</text>
  <text x="38" y="552" class="dim">the meta-argument: an optimization layer you no longer need is the proof the architecture is right</text>

  <text x="24" y="600" class="dim" font-size="10">caches are versioned &#183; migration-safe &#8212; the shell that needs no startup tricks &#183; zshrs</text>
</svg>
