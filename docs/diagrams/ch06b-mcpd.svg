<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 615" font-family="'Share Tech Mono', ui-monospace, monospace">
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L8 4.5 L0 9 Z" fill="#05d9e8"/>
    </marker>
    <marker id="ahm" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L8 4.5 L0 9 Z" fill="#7a8ba8"/>
    </marker>
    <style>
      .t     { fill:#e0f0ff; font-size:12px; }
      .dim   { fill:#7a8ba8; font-size:11px; }
      .cyan  { fill:#05d9e8; }
      .mag   { fill:#d300c5; }
      .pink  { fill:#ff6b9d; }
      .green { fill:#39ff14; }
      .title { font-family:'Orbitron', sans-serif; font-weight:700; }
      .h     { fill:#05d9e8; font-size:13px; font-family:'Orbitron', sans-serif; font-weight:700; }
      .box   { fill:#0d0d1a; stroke:#05d9e8; stroke-width:1.5; }
      .jitbx { fill:#0d0d1a; stroke:#d300c5; stroke-width:1.5; }
      .aotbx { fill:#0d0d1a; stroke:#ff2a6d; stroke-width:1.5; }
      .optbx { fill:#0b140b; stroke:#39ff14; stroke-width:1.4; }
      .chip  { fill:#10102a; stroke:#1a1a3e; stroke-width:1; }
      .sub   { fill:#10102a; stroke:#2a1a4e; stroke-width:1; }
      .arrow { stroke:#05d9e8; stroke-width:1.6; fill:none; marker-end:url(#ah); }
      .dash  { stroke:#7a8ba8; stroke-width:1.1; stroke-dasharray:4 3; fill:none; marker-end:url(#ahm); }
    </style>
  </defs>

  <rect x="0" y="0" width="1000" height="615" fill="#0a0a14"/>
  <rect x="2" y="2" width="996" height="611" fill="none" stroke="#1a1a3e" stroke-width="1"/>

  <text x="24" y="34" class="title" fill="#05d9e8" font-size="19">STRYKE-MCPD &#8212; THE AGENT / AUTOMATION BRIDGE</text>
  <text x="24" y="52" class="dim">an AI agent speaks MCP to a stryke-authored server; stryke tools &amp; the connector mesh become MCP-addressable</text>

  <!-- ===== AI AGENT / MCP CLIENT ===== -->
  <rect x="330" y="70" width="340" height="52" rx="4" class="box"/>
  <text x="500" y="92"  class="cyan title" font-size="12.5" text-anchor="middle">AI AGENT / MCP CLIENT</text>
  <text x="500" y="112" class="dim" text-anchor="middle">any MCP host &#183; JSON-RPC over stdio</text>

  <path d="M500 122 L500 148" class="arrow"/>
  <text x="512" y="140" class="dim" font-size="10">MCP</text>

  <!-- ===== STRYKE-MCPD BRIDGE (invention) ===== -->
  <rect x="250" y="150" width="500" height="84" rx="4" class="jitbx"/>
  <text x="270" y="173" class="title" fill="#d300c5" font-size="13.5">stryke-mcpd &#8212; MCP server, no runtime</text>
  <text x="270" y="192" class="dim">policy layer: Mcpd::Schema / Server / Tools / Client (rust=0, stk=11)</text>
  <text x="270" y="209" class="dim">over core mcp_server_start &#183; JSON-RPC serve, stdout-purity enforced</text>
  <text x="270" y="226" class="mag" font-size="10.5">the server compiles to one static native binary &#8212; no Node, no venv</text>

  <path d="M500 234 L500 258" class="arrow"/>

  <!-- ===== STRYKELANG (tool host) ===== -->
  <rect x="250" y="260" width="500" height="66" rx="4" class="box"/>
  <text x="500" y="283" class="cyan title" font-size="13" text-anchor="middle">strykelang</text>
  <text x="500" y="302" class="dim" text-anchor="middle">the tool host &#183; stryke data + connectors exposed as MCP tool fns</text>
  <text x="500" y="318" class="dim" text-anchor="middle">tool fn / mcp_server desugar &#183; every package reachable by an agent</text>

  <path d="M380 326 L380 340 L250 340 L250 350" class="arrow"/>
  <path d="M620 326 L620 340 L747 340 L747 350" class="arrow"/>

  <!-- ===== AGENT / AUTOMATION CONNECTORS ===== -->
  <rect x="20" y="350" width="460" height="214" rx="4" class="box"/>
  <text x="38" y="372" class="h">AGENT / AUTOMATION CONNECTORS</text>
  <text x="38" y="388" class="dim">browser, crawl, search, gRPC &#8212; surfaced as agent tools</text>

  <rect x="38" y="398" width="424" height="34" rx="3" class="chip"/>
  <text x="48" y="419" class="cyan" font-size="11.5">stryke-search</text>
  <text x="180" y="419" class="dim">Elasticsearch / OpenSearch &#183; CRUD/bulk/DSL</text>

  <rect x="38" y="438" width="424" height="34" rx="3" class="chip"/>
  <text x="48" y="459" class="cyan" font-size="11.5">stryke-scrape</text>
  <text x="180" y="459" class="dim">web crawler (spider-rs) &#183; fetch + extract</text>

  <rect x="38" y="478" width="424" height="34" rx="3" class="chip"/>
  <text x="48" y="499" class="cyan" font-size="11.5">stryke-selenium</text>
  <text x="180" y="499" class="dim">browser/GUI automation &#183; WebDriver/DOM/JS</text>

  <rect x="38" y="518" width="424" height="34" rx="3" class="chip"/>
  <text x="48" y="539" class="cyan" font-size="11.5">stryke-grpc</text>
  <text x="180" y="539" class="dim">gRPC client &#183; tonic + prost</text>

  <!-- ===== DATA CONNECTOR MESH ===== -->
  <rect x="520" y="350" width="455" height="214" rx="4" class="box"/>
  <text x="538" y="372" class="h">DATA CONNECTOR MESH &#8212; 31 stryke-* pkgs</text>
  <text x="538" y="388" class="dim">the whole data ecosystem, now MCP-addressable</text>

  <rect x="538" y="398" width="419" height="28" rx="3" class="chip"/>
  <text x="548" y="416" class="cyan" font-size="11">Databases</text>
  <text x="640" y="416" class="dim">Postgres &#183; Redis &#183; Mongo &#183; Neo4j &#183; ClickHouse</text>

  <rect x="538" y="430" width="419" height="28" rx="3" class="chip"/>
  <text x="548" y="448" class="cyan" font-size="11">Cloud / orch</text>
  <text x="648" y="448" class="dim">AWS &#183; GCP &#183; Azure &#183; Docker &#183; k8s</text>

  <rect x="538" y="462" width="419" height="28" rx="3" class="chip"/>
  <text x="548" y="480" class="cyan" font-size="11">Messaging</text>
  <text x="640" y="480" class="dim">Kafka &#183; ZeroMQ</text>

  <rect x="538" y="494" width="419" height="28" rx="3" class="chip"/>
  <text x="548" y="512" class="cyan" font-size="11">Columnar</text>
  <text x="640" y="512" class="dim">Arrow &#183; Parquet &#183; Polars &#183; Spark</text>

  <rect x="538" y="526" width="419" height="28" rx="3" class="chip"/>
  <text x="548" y="544" class="cyan" font-size="11">Office I/O</text>
  <text x="640" y="544" class="dim">xlsx &#183; docx &#183; pptx &#183; pdf</text>

  <text x="24" y="594" class="dim" font-size="10">stryke connectors reachable by AI agents over MCP; stryke-mcpd = policy layer on mcp_server_start</text>
</svg>
