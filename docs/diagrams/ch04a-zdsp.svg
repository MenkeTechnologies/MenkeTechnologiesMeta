<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 620" font-family="'Share Tech Mono', ui-monospace, monospace">
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L8 4.5 L0 9 Z" fill="#05d9e8"/>
    </marker>
    <marker id="ahm" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L8 4.5 L0 9 Z" fill="#7a8ba8"/>
    </marker>
    <style>
      .t     { fill:#e0f0ff; font-size:12px; }
      .dim   { fill:#7a8ba8; font-size:11px; }
      .cyan  { fill:#05d9e8; }
      .mag   { fill:#d300c5; }
      .pink  { fill:#ff6b9d; }
      .green { fill:#39ff14; }
      .title { font-family:'Orbitron', sans-serif; font-weight:700; }
      .h     { fill:#05d9e8; font-size:13px; font-family:'Orbitron', sans-serif; font-weight:700; }
      .box   { fill:#0d0d1a; stroke:#05d9e8; stroke-width:1.5; }
      .jitbx { fill:#0d0d1a; stroke:#d300c5; stroke-width:1.5; }
      .aotbx { fill:#0d0d1a; stroke:#ff2a6d; stroke-width:1.5; }
      .optbx { fill:#0b140b; stroke:#39ff14; stroke-width:1.4; }
      .chip  { fill:#10102a; stroke:#1a1a3e; stroke-width:1; }
      .sub   { fill:#10102a; stroke:#2a1a4e; stroke-width:1; }
      .arrow { stroke:#05d9e8; stroke-width:1.6; fill:none; marker-end:url(#ah); }
      .dash  { stroke:#7a8ba8; stroke-width:1.1; stroke-dasharray:4 3; fill:none; marker-end:url(#ahm); }
    </style>
  </defs>

  <rect x="0" y="0" width="1000" height="620" fill="#0a0a14"/>
  <rect x="2" y="2" width="996" height="616" fill="none" stroke="#1a1a3e" stroke-width="1"/>

  <text x="24" y="34" class="title" fill="#05d9e8" font-size="19">ZDSP-CORE &#8212; THE SHARED DSP LIBRARY</text>
  <text x="24" y="52" class="dim">the audio-engine analog of zgui-core &#183; one header-only JUCE library of core DSP units, vendored by every audio app</text>

  <!-- ===== CENTER: THE LIBRARY ===== -->
  <rect x="20" y="72" width="955" height="52" rx="4" class="box"/>
  <text x="38" y="96" class="h">zdsp-core &#183; zdsp::*</text>
  <text x="270" y="96" class="dim">header-only &#183; JUCE-based (juce_audio_basics + juce_core) &#183; link zdsp::core</text>
  <text x="38" y="114" class="dim">one implementation of the core DSP units &#8212; the audio-engine analog of zgui-core, vendored not re-derived</text>

  <path d="M498 124 L498 140" class="arrow" marker-end="none"/>
  <path d="M175 140 L820 140" class="arrow" marker-end="none"/>
  <path d="M175 140 L175 154" class="arrow"/>
  <path d="M498 140 L498 154" class="arrow"/>
  <path d="M820 140 L820 154" class="arrow"/>

  <!-- ===== UNITS ROW 1 ===== -->
  <rect x="20" y="154" width="310" height="84" rx="4" class="box"/>
  <text x="175" y="178" class="cyan title" font-size="12.5" text-anchor="middle">OlaTimeStretch</text>
  <text x="175" y="196" class="dim" text-anchor="middle">ola_time_stretch.h</text>
  <text x="175" y="216" class="dim" text-anchor="middle">pitch-preserving OLA time-stretch</text>
  <text x="175" y="232" class="dim" text-anchor="middle">change speed, keep pitch</text>

  <rect x="343" y="154" width="310" height="84" rx="4" class="box"/>
  <text x="498" y="178" class="cyan title" font-size="12.5" text-anchor="middle">channel_strip</text>
  <text x="498" y="196" class="dim" text-anchor="middle">DspAtomics + applyDspFrame</text>
  <text x="498" y="216" class="dim" text-anchor="middle">lock-free 3-band EQ + gain</text>
  <text x="498" y="232" class="dim" text-anchor="middle">+ pan + mono fold</text>

  <rect x="665" y="154" width="310" height="84" rx="4" class="box"/>
  <text x="820" y="178" class="cyan title" font-size="12.5" text-anchor="middle">ToneAudioSource</text>
  <text x="820" y="196" class="dim" text-anchor="middle">tone_audio_source.h</text>
  <text x="820" y="216" class="dim" text-anchor="middle">sine test-tone generator</text>
  <text x="820" y="232" class="dim" text-anchor="middle">juce::AudioSource</text>

  <!-- ===== UNITS ROW 2 ===== -->
  <rect x="20" y="252" width="310" height="84" rx="4" class="box"/>
  <text x="175" y="276" class="cyan title" font-size="12.5" text-anchor="middle">InputPeakCallback</text>
  <text x="175" y="294" class="dim" text-anchor="middle">input_peak_callback.h</text>
  <text x="175" y="314" class="dim" text-anchor="middle">input peak meter</text>
  <text x="175" y="330" class="dim" text-anchor="middle">abs-max per block + exp release</text>

  <rect x="343" y="252" width="310" height="84" rx="4" class="box"/>
  <text x="498" y="276" class="cyan title" font-size="12.5" text-anchor="middle">computeSpectrogramGrid</text>
  <text x="498" y="294" class="dim" text-anchor="middle">spectrogram_analysis.h</text>
  <text x="498" y="314" class="dim" text-anchor="middle">offline spectrogram analysis</text>
  <text x="498" y="330" class="dim" text-anchor="middle">Hann STFT &#8594; dBFS grid</text>

  <rect x="665" y="252" width="310" height="84" rx="4" class="aotbx"/>
  <text x="820" y="276" class="pink title" font-size="12.5" text-anchor="middle">LockFreeStreamSource</text>
  <text x="820" y="294" class="dim" text-anchor="middle">lock_free_stream_source.h &#183; #160</text>
  <text x="820" y="314" class="dim" text-anchor="middle">RT-safe streaming + stream&#8594;RAM</text>
  <text x="820" y="330" class="dim" text-anchor="middle">glitch-free reader hot-swap</text>

  <path d="M175 336 L175 364" class="arrow"/>
  <path d="M498 336 L498 364" class="arrow"/>
  <path d="M820 336 L820 364" class="arrow"/>

  <!-- ===== ORCHESTRATOR ===== -->
  <rect x="20" y="364" width="955" height="66" rx="4" class="jitbx"/>
  <text x="38" y="390" class="title" fill="#d300c5" font-size="13">DspStereoFileSource (+ InsertChain)</text>
  <text x="470" y="390" class="dim">dsp_stereo_file_source.h</text>
  <text x="38" y="412" class="dim">the playback orchestrator &#8212; a transport-ready stereo file source composing all of the above units into one pipeline</text>

  <path d="M498 430 L498 452" class="dash" marker-end="none"/>
  <path d="M95 452 L900 452" class="dash" marker-end="none"/>
  <path d="M95 452 L95 468" class="dash"/>
  <path d="M256 452 L256 468" class="dash"/>
  <path d="M417 452 L417 468" class="dash"/>
  <path d="M578 452 L578 468" class="dash"/>
  <path d="M739 452 L739 468" class="dash"/>
  <path d="M900 452 L900 468" class="dash"/>

  <!-- ===== CONSUMERS ===== -->
  <text x="24" y="462" class="green" font-size="11">CONSUMERS &#8212; every audio app links zdsp::core instead of re-deriving its own DSP</text>

  <rect x="20" y="468" width="150" height="60" rx="4" class="chip"/>
  <text x="95" y="492" class="cyan" text-anchor="middle" font-size="12">Audio-Haxor</text>
  <text x="95" y="510" class="dim" text-anchor="middle">engine origin</text>

  <rect x="181" y="468" width="150" height="60" rx="4" class="chip"/>
  <text x="256" y="492" class="cyan" text-anchor="middle" font-size="12">zpwr-patch-core</text>
  <text x="256" y="510" class="dim" text-anchor="middle">patch host</text>

  <rect x="342" y="468" width="150" height="60" rx="4" class="chip"/>
  <text x="417" y="492" class="cyan" text-anchor="middle" font-size="12">zpwr-daw</text>
  <text x="417" y="510" class="dim" text-anchor="middle">plugin app</text>

  <rect x="503" y="468" width="150" height="60" rx="4" class="chip"/>
  <text x="578" y="492" class="cyan" text-anchor="middle" font-size="12">zpwr-synth</text>
  <text x="578" y="510" class="dim" text-anchor="middle">plugin app</text>

  <rect x="664" y="468" width="150" height="60" rx="4" class="chip"/>
  <text x="739" y="492" class="cyan" text-anchor="middle" font-size="12">zpwr-fx</text>
  <text x="739" y="510" class="dim" text-anchor="middle">plugin app</text>

  <rect x="825" y="468" width="150" height="60" rx="4" class="chip"/>
  <text x="900" y="492" class="cyan" text-anchor="middle" font-size="12">zpwr-midi-fx</text>
  <text x="900" y="510" class="dim" text-anchor="middle">plugin app</text>

  <text x="24" y="600" class="dim" font-size="10">one shared DSP library, header-only, vendored by every audio app &#183; zdsp-core</text>
</svg>
