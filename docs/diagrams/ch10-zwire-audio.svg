<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 650" font-family="'Share Tech Mono', ui-monospace, monospace">
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L8 4.5 L0 9 Z" fill="#05d9e8"/>
    </marker>
    <marker id="ahm" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L8 4.5 L0 9 Z" fill="#7a8ba8"/>
    </marker>
    <marker id="ahp" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L8 4.5 L0 9 Z" fill="#ff2a6d"/>
    </marker>
    <marker id="ahg" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L8 4.5 L0 9 Z" fill="#39ff14"/>
    </marker>
    <style>
      .t     { fill:#e0f0ff; font-size:12px; }
      .dim   { fill:#7a8ba8; font-size:11px; }
      .cyan  { fill:#05d9e8; }
      .mag   { fill:#d300c5; }
      .pink  { fill:#ff6b9d; }
      .green { fill:#39ff14; }
      .title { font-family:'Orbitron', sans-serif; font-weight:700; }
      .h     { fill:#05d9e8; font-size:13px; font-family:'Orbitron', sans-serif; font-weight:700; }
      .box   { fill:#0d0d1a; stroke:#05d9e8; stroke-width:1.5; }
      .jitbx { fill:#0d0d1a; stroke:#d300c5; stroke-width:1.5; }
      .aotbx { fill:#0d0d1a; stroke:#ff2a6d; stroke-width:1.5; }
      .optbx { fill:#0b140b; stroke:#39ff14; stroke-width:1.4; }
      .chip  { fill:#10102a; stroke:#1a1a3e; stroke-width:1; }
      .sub   { fill:#10102a; stroke:#2a1a4e; stroke-width:1; }
      .arrow { stroke:#05d9e8; stroke-width:1.6; fill:none; marker-end:url(#ah); }
      .dash  { stroke:#7a8ba8; stroke-width:1.1; stroke-dasharray:4 3; fill:none; marker-end:url(#ahm); }

      .card        { fill:#0d0d1a; stroke:#1a1a3e; stroke-width:1.4; }
      .card-broker { fill:#12122a; stroke:#05d9e8; stroke-width:2; }
      .card-sandbox{ fill:none; stroke:#ff2a6d; stroke-width:1.6; stroke-dasharray:6 5; opacity:0.9; }
      .card-disk   { fill:#0e1410; stroke:#39ff14; stroke-width:1.4; stroke-dasharray:4 4; }
      .t-title { font-family:'Orbitron', sans-serif; font-weight:700; font-size:12.5px; letter-spacing:1px; }
      .t-cyan  { fill:#05d9e8; } .t-green { fill:#39ff14; } .t-accent { fill:#ff2a6d; }
      .t-sub   { font-size:9.5px; fill:#3d4f6a; }
      .t-body  { font-size:10px; fill:#7a8ba8; }
      .t-mut   { font-size:9.5px; fill:#3d4f6a; }
      .pill    { font-family:'Orbitron', sans-serif; font-weight:700; font-size:8px; letter-spacing:1px; }
      .edge-cfg   { fill:none; stroke:#05d9e8; stroke-width:2; }
      .edge-meter { fill:none; stroke:#ff2a6d; stroke-width:2; }
      .edge-seed  { fill:none; stroke:#39ff14; stroke-width:1.6; stroke-dasharray:5 4; }
      .edge-none  { fill:none; stroke:#3d4f6a; stroke-width:1.4; stroke-dasharray:3 5; opacity:0.75; }
      .lane-lbl { font-size:9.5px; letter-spacing:.5px; }
      .num   { font-family:'Orbitron', sans-serif; font-weight:700; font-size:10px; }
      .num-c { fill:#0a0a14; }
      .chip-cyan { fill:#05d9e8; } .chip-accent { fill:#ff2a6d; }
    </style>
  </defs>

  <rect x="0" y="0" width="1000" height="650" fill="#0a0a14"/>
  <rect x="2" y="2" width="996" height="646" fill="none" stroke="#1a1a3e" stroke-width="1"/>

  <text x="24" y="30" class="title" fill="#05d9e8" font-size="19">ZWIRE &#8212; BROWSER-WIDE AUDIO ENGINE IPC</text>
  <text x="24" y="48" class="dim">renderer, zwire-host, $STATE files, browser broker, and the sandboxed audio service move config down and meters back &#8212; the file is the rendezvous</text>

  <!-- ===== launch seed arc (green): $STATE -> audio service ===== -->
  <path class="edge-seed" marker-end="url(#ahg)" d="M 486 222 C 486 130, 868 130, 868 222"/>
  <text x="677" y="120" text-anchor="middle" class="lane-lbl t-green">&#9678; launch seed &#183; bin/zwire &#8594; --zwire-audio-eq (reads audio-eq at start)</text>

  <!-- ===== lane labels ===== -->
  <text x="24" y="176" class="lane-lbl t-cyan">&#9654; CONFIG&#160;&#160;UI &#8594; engine</text>

  <!-- ===== config edges (cyan, top, ->) ===== -->
  <path class="edge-cfg" marker-end="url(#ah)" d="M 210 203 L 225 203"/>
  <path class="edge-cfg" marker-end="url(#ah)" d="M 397 203 L 412 203"/>
  <path class="edge-cfg" marker-end="url(#ah)" d="M 560 203 L 575 203"/>
  <path class="edge-cfg" marker-end="url(#ah)" d="M 747 203 L 756 203"/>
  <circle cx="217" cy="188" r="9" class="chip-cyan"/><text x="217" y="191.5" text-anchor="middle" class="num num-c">1</text>
  <circle cx="404" cy="188" r="9" class="chip-cyan"/><text x="404" y="191.5" text-anchor="middle" class="num num-c">2</text>
  <circle cx="567" cy="188" r="9" class="chip-cyan"/><text x="567" y="191.5" text-anchor="middle" class="num num-c">3</text>
  <circle cx="751" cy="188" r="9" class="chip-cyan"/><text x="751" y="191.5" text-anchor="middle" class="num num-c">4</text>

  <!-- ===== cards ===== -->
  <!-- c1 Renderer (sandboxed) -->
  <rect x="26" y="228" width="178" height="212" rx="4" class="card"/>
  <rect x="20" y="222" width="190" height="224" rx="7" class="card-sandbox"/>
  <rect x="67" y="218" width="96" height="16" rx="8" fill="rgba(255,42,109,0.4)"/>
  <text x="115" y="229.5" text-anchor="middle" class="pill t-accent">&#8856; SANDBOXED</text>
  <text x="42" y="256" class="t-title t-cyan">RENDERER</text>
  <text x="42" y="271" class="t-sub">sandboxed page</text>
  <text x="42" y="296" class="t-body">audio.js &#8212; HUD Audio</text>
  <text x="42" y="313" class="t-body">buildSpec() / parseSpec()</text>
  <text x="42" y="330" class="t-body">live meter charts</text>
  <text x="42" y="354" class="t-mut">&#8212; no FS, no mojom &#8212;</text>

  <!-- c2 zwire-host -->
  <rect x="225" y="228" width="172" height="212" rx="4" class="card"/>
  <rect x="268" y="218" width="86" height="16" rx="8" fill="rgba(5,217,232,0.15)"/>
  <text x="311" y="229.5" text-anchor="middle" class="pill t-cyan">USER PRIV</text>
  <text x="241" y="256" class="t-title t-cyan">zwire-host</text>
  <text x="241" y="271" class="t-sub">native binary</text>
  <text x="241" y="296" class="t-body">Native Messaging (stdio)</text>
  <text x="241" y="313" class="t-body">fs_write &#183; fs_watch</text>
  <text x="241" y="330" class="t-body">meter_stream</text>
  <text x="241" y="347" class="t-body">pub/sub bus + peers</text>
  <text x="241" y="371" class="t-mut">&#8212; no Chromium IPC &#8212;</text>

  <!-- c3 $STATE (disk) -->
  <rect x="412" y="243" width="148" height="182" rx="4" class="card-disk"/>
  <rect x="456" y="235" width="60" height="16" rx="8" fill="rgba(57,255,20,0.08)"/>
  <text x="486" y="246.5" text-anchor="middle" class="pill t-green">DISK</text>
  <text x="428" y="272" class="t-title t-green">$STATE</text>
  <text x="428" y="300" class="t-body t-cyan">audio-eq</text>
  <text x="428" y="316" class="t-body">&#160;&#160;config &#183; durable</text>
  <text x="428" y="338" class="t-body t-accent">meters</text>
  <text x="428" y="354" class="t-body">&#160;&#160;frames &#183; ephemeral</text>
  <text x="428" y="390" class="t-mut">user-owned files</text>

  <!-- c4 Browser process (broker) -->
  <rect x="575" y="228" width="172" height="212" rx="4" class="card-broker"/>
  <rect x="608" y="218" width="106" height="16" rx="8" fill="rgba(5,217,232,0.15)"/>
  <text x="661" y="229.5" text-anchor="middle" class="pill t-cyan">&#9733; TRUSTED BROKER</text>
  <text x="591" y="256" class="t-title t-cyan">BROWSER PROCESS</text>
  <text x="591" y="271" class="t-sub">unsandboxed</text>
  <text x="591" y="296" class="t-body">full user FS authority</text>
  <text x="591" y="313" class="t-body">RepeatingTimer poll</text>
  <text x="591" y="330" class="t-body">&#160;&#160;25ms cfg &#183; 33ms meters</text>
  <text x="591" y="347" class="t-body">holds the mojom pipe</text>
  <text x="591" y="371" class="t-mut">&#8212; the only bridge &#8212;</text>

  <!-- c5 Audio service (sandboxed) -->
  <rect x="762" y="228" width="212" height="212" rx="4" class="card"/>
  <rect x="756" y="222" width="224" height="224" rx="7" class="card-sandbox"/>
  <rect x="820" y="218" width="96" height="16" rx="8" fill="rgba(255,42,109,0.4)"/>
  <text x="868" y="229.5" text-anchor="middle" class="pill t-accent">&#8856; SANDBOXED</text>
  <text x="778" y="256" class="t-title t-cyan">AUDIO SERVICE</text>
  <text x="778" y="271" class="t-sub">sandboxed utility</text>
  <text x="778" y="296" class="t-body t-cyan">ZwireAudioEq &#183; OnMoreData()</text>
  <text x="778" y="313" class="t-body">per-stream DSP chain</text>
  <text x="778" y="330" class="t-body">Goertzel meter frame</text>
  <text x="778" y="354" class="t-mut">&#8212; can't read files / sockets &#8212;</text>

  <!-- ===== meter edges (pink, bottom, <-) ===== -->
  <path class="edge-meter" marker-end="url(#ahp)" d="M 756 463 L 747 463"/>
  <path class="edge-meter" marker-end="url(#ahp)" d="M 575 463 L 560 463"/>
  <path class="edge-meter" marker-end="url(#ahp)" d="M 412 463 L 397 463"/>
  <path class="edge-meter" marker-end="url(#ahp)" d="M 225 463 L 210 463"/>
  <circle cx="751" cy="478" r="9" class="chip-accent"/><text x="751" y="481.5" text-anchor="middle" class="num num-c">5</text>
  <circle cx="567" cy="478" r="9" class="chip-accent"/><text x="567" y="481.5" text-anchor="middle" class="num num-c">6</text>
  <circle cx="404" cy="478" r="9" class="chip-accent"/><text x="404" y="481.5" text-anchor="middle" class="num num-c">7</text>
  <circle cx="217" cy="478" r="9" class="chip-accent"/><text x="217" y="481.5" text-anchor="middle" class="num num-c">8</text>

  <text x="24" y="508" class="lane-lbl t-accent">&#9664; METERS&#160;&#160;engine &#8594; UI</text>

  <!-- ===== NO direct link (muted, bottom arc) ===== -->
  <path class="edge-none" d="M 311 448 C 311 542, 868 542, 868 448"/>
  <circle cx="589" cy="535" r="9" fill="#0a0a14" stroke="#3d4f6a" stroke-width="1.2"/>
  <text x="589" y="539" text-anchor="middle" class="num" fill="#ff2a6d">&#10005;</text>
  <text x="589" y="562" text-anchor="middle" class="lane-lbl" fill="#3d4f6a">&#10005; no direct channel &#8212; zwire-host and the audio service share no endpoint</text>

  <!-- ===== DSP chain strip ===== -->
  <rect x="20" y="580" width="960" height="30" rx="4" fill="#0a0a14" stroke="#1a1a3e" stroke-width="1"/>
  <text x="32" y="599" class="lane-lbl t-cyan">ZwireAudioEq chain (per output stream):</text>
  <text x="272" y="599" class="t-body">preamp &#9656; EQ cascade &#9656; gain &#9656; drive &#9656; compressor &#9656; delay &#9656; reverb &#9656; M/S width &#9656; pan / mono &#9656; brickwall limiter</text>

  <text x="24" y="632" class="dim" font-size="10">the file is the rendezvous; the browser is the only party on both sides (filesystem + mojom) &#183; zwire</text>
</svg>
