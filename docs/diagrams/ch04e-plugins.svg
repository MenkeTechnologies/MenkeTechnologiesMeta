<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 520" font-family="'Share Tech Mono', ui-monospace, monospace">
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L8 4.5 L0 9 Z" fill="#05d9e8"/>
    </marker>
    <marker id="ahm" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L8 4.5 L0 9 Z" fill="#7a8ba8"/>
    </marker>
    <style>
      .t     { fill:#e0f0ff; font-size:12px; }
      .dim   { fill:#7a8ba8; font-size:11px; }
      .cyan  { fill:#05d9e8; }
      .mag   { fill:#d300c5; }
      .pink  { fill:#ff6b9d; }
      .green { fill:#39ff14; }
      .title { font-family:'Orbitron', sans-serif; font-weight:700; }
      .h     { fill:#05d9e8; font-size:13px; font-family:'Orbitron', sans-serif; font-weight:700; }
      .box   { fill:#0d0d1a; stroke:#05d9e8; stroke-width:1.5; }
      .jitbx { fill:#0d0d1a; stroke:#d300c5; stroke-width:1.5; }
      .aotbx { fill:#0d0d1a; stroke:#ff2a6d; stroke-width:1.5; }
      .optbx { fill:#0b140b; stroke:#39ff14; stroke-width:1.4; }
      .chip  { fill:#10102a; stroke:#1a1a3e; stroke-width:1; }
      .sub   { fill:#10102a; stroke:#2a1a4e; stroke-width:1; }
      .arrow { stroke:#05d9e8; stroke-width:1.6; fill:none; marker-end:url(#ah); }
      .dash  { stroke:#7a8ba8; stroke-width:1.1; stroke-dasharray:4 3; fill:none; marker-end:url(#ahm); }
    </style>
  </defs>

  <rect x="0" y="0" width="1000" height="520" fill="#0a0a14"/>
  <rect x="2" y="2" width="996" height="516" fill="none" stroke="#1a1a3e" stroke-width="1"/>

  <text x="24" y="34" class="title" fill="#05d9e8" font-size="19">THREE JUCE PLUGINS ON ONE SHARED CORE</text>
  <text x="24" y="52" class="dim">zpwr-synth / zpwr-fx / zpwr-midi-fx are thin app shells over the same engine; zpwr-daw is the arranger that hosts them</text>

  <!-- ===== DAW (host / arranger) ===== -->
  <rect x="20" y="70" width="955" height="50" rx="4" class="jitbx"/>
  <text x="38" y="92" class="title" fill="#d300c5" font-size="13">zpwr-daw</text>
  <text x="150" y="92" class="dim">arranger &#183; hosts the three plugins as VST3 / AU / CLAP instruments and effects on its tracks</text>
  <text x="38" y="110" class="mag" font-size="10.5">the DAW is graph-modular end to end &#8212; every track / bus is itself a patch-core graph</text>

  <!-- host links: DAW down into each plugin -->
  <path d="M172 120 L172 152" class="dash"/>
  <path d="M498 120 L498 152" class="dash"/>
  <path d="M822 120 L822 152" class="dash"/>
  <text x="510" y="140" class="dim" font-size="10">hosts</text>

  <!-- ===== THREE PLUGINS (thin app shells) ===== -->
  <rect x="20" y="152" width="305" height="118" rx="4" class="box"/>
  <text x="172" y="174" class="cyan title" font-size="13" text-anchor="middle">zpwr-synth</text>
  <text x="172" y="191" class="dim" text-anchor="middle">modular polyphonic synthesizer</text>
  <rect x="38" y="202" width="269" height="30" rx="3" class="sub"/>
  <text x="172" y="221" class="cyan" text-anchor="middle" font-size="11.5">PluginProcessor::processBlock</text>
  <text x="172" y="252" class="dim" text-anchor="middle">format wiring &#183; parameters &#183; UI shell</text>

  <rect x="345" y="152" width="305" height="118" rx="4" class="box"/>
  <text x="498" y="174" class="cyan title" font-size="13" text-anchor="middle">zpwr-fx</text>
  <text x="498" y="191" class="dim" text-anchor="middle">modular audio effect (VST3/AU/CLAP)</text>
  <rect x="363" y="202" width="269" height="30" rx="3" class="sub"/>
  <text x="498" y="221" class="cyan" text-anchor="middle" font-size="11.5">PluginProcessor::processBlock</text>
  <text x="498" y="252" class="dim" text-anchor="middle">format wiring &#183; parameters &#183; UI shell</text>

  <rect x="670" y="152" width="305" height="118" rx="4" class="box"/>
  <text x="822" y="174" class="cyan title" font-size="13" text-anchor="middle">zpwr-midi-fx</text>
  <text x="822" y="191" class="dim" text-anchor="middle">modular MIDI / note-event effect</text>
  <rect x="688" y="202" width="269" height="30" rx="3" class="sub"/>
  <text x="822" y="221" class="cyan" text-anchor="middle" font-size="11.5">PluginProcessor::processBlock</text>
  <text x="822" y="252" class="dim" text-anchor="middle">format wiring &#183; parameters &#183; UI shell</text>

  <!-- each plugin sits on the same shared engine -->
  <path d="M172 270 L172 296" class="arrow"/>
  <path d="M498 270 L498 296" class="arrow"/>
  <path d="M822 270 L822 296" class="arrow"/>

  <!-- ===== SHARED LIB 1: patch-core ===== -->
  <rect x="20" y="298" width="955" height="56" rx="4" class="box"/>
  <text x="38" y="322" class="h">zpwr-patch-core</text>
  <text x="240" y="322" class="dim">the modular signal + control engine &#183; one cable-routing / evaluation graph, templated on the signal it carries</text>
  <text x="240" y="342" class="dim">graph templated on <tspan class="cyan">SignalTraits&lt;S&gt;</tspan> &#8212; float audio, stereo L/R pair, or note-event stream &#183; auto mod-matrix per node</text>

  <path d="M498 354 L498 380" class="arrow"/>

  <!-- ===== SHARED LIB 2: zdsp-core ===== -->
  <rect x="20" y="382" width="955" height="56" rx="4" class="box"/>
  <text x="38" y="406" class="h">zdsp-core</text>
  <text x="240" y="406" class="dim">the shared header-only DSP units &#183; ~4,238 globally-unique blocks (audio &#183; synth &#183; MIDI) drawn on by every product</text>
  <text x="240" y="426" class="dim">OLA time-stretch &#183; lock-free channel strip &#183; analog-circuit &amp; physical-model blocks &#183; spectrogram &#183; vendored, not forked</text>

  <text x="24" y="466" class="green" font-size="10.5">one engine, N products &#8212; the same patch-core graph + zdsp-core blocks power the FX, the synth, the MIDI-fx, and the DAW unchanged; the plugins add only format glue and UI</text>

  <text x="24" y="500" class="dim" font-size="10">three plugins plus a DAW &#183; one shared patch-core (signal-agnostic graph) over zdsp-core DSP units</text>
</svg>
