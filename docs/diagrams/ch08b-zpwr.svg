<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 580" font-family="'Share Tech Mono', ui-monospace, monospace">
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L8 4.5 L0 9 Z" fill="#05d9e8"/>
    </marker>
    <marker id="ahm" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L8 4.5 L0 9 Z" fill="#7a8ba8"/>
    </marker>
    <style>
      .t     { fill:#e0f0ff; font-size:12px; }
      .dim   { fill:#7a8ba8; font-size:11px; }
      .cyan  { fill:#05d9e8; }
      .mag   { fill:#d300c5; }
      .pink  { fill:#ff6b9d; }
      .green { fill:#39ff14; }
      .title { font-family:'Orbitron', sans-serif; font-weight:700; }
      .h     { fill:#05d9e8; font-size:13px; font-family:'Orbitron', sans-serif; font-weight:700; }
      .box   { fill:#0d0d1a; stroke:#05d9e8; stroke-width:1.5; }
      .jitbx { fill:#0d0d1a; stroke:#d300c5; stroke-width:1.5; }
      .aotbx { fill:#0d0d1a; stroke:#ff2a6d; stroke-width:1.5; }
      .optbx { fill:#0b140b; stroke:#39ff14; stroke-width:1.4; }
      .chip  { fill:#10102a; stroke:#1a1a3e; stroke-width:1; }
      .sub   { fill:#10102a; stroke:#2a1a4e; stroke-width:1; }
      .arrow { stroke:#05d9e8; stroke-width:1.6; fill:none; marker-end:url(#ah); }
      .dash  { stroke:#7a8ba8; stroke-width:1.1; stroke-dasharray:4 3; fill:none; marker-end:url(#ahm); }
    </style>
  </defs>

  <rect x="0" y="0" width="1000" height="580" fill="#0a0a14"/>
  <rect x="2" y="2" width="996" height="576" fill="none" stroke="#1a1a3e" stroke-width="1"/>

  <text x="24" y="34" class="title" fill="#05d9e8" font-size="19">ZPWR &#8212; THE TERMINAL ENVIRONMENT</text>
  <text x="24" y="52" class="dim">the single-author CLI powerhouse that sits on top of the shell &#8212; one verb dispatcher routing hundreds of subcommands over the whole terminal</text>

  <!-- ===== TOP ROW ===== -->
  <rect x="20" y="72" width="300" height="100" rx="4" class="box"/>
  <text x="38" y="94"  class="h">VERB DISPATCHER</text>
  <text x="38" y="112" class="dim">one command routes every verb</text>
  <text x="38" y="134" class="cyan" font-size="12">zpwr &lt;verb&gt; &#8594; 460 subcommands</text>
  <text x="38" y="152" class="dim">autoload router &#183; env-var control plane</text>

  <rect x="350" y="72" width="300" height="100" rx="4" class="box"/>
  <text x="368" y="94"  class="h">POWERLINE / STATUS HUD</text>
  <text x="368" y="112" class="dim">live shell-introspection</text>
  <text x="368" y="134" class="cyan" font-size="12">zpwr top &#8594; RSS/vmem, widgets, hooks</text>
  <text x="368" y="152" class="dim">startup sparklines vs 100 ms threshold</text>

  <rect x="680" y="72" width="295" height="100" rx="4" class="box"/>
  <text x="698" y="94"  class="h">COMPLETIONS ENGINE</text>
  <text x="698" y="112" class="dim">corpus-scale menu</text>
  <text x="698" y="134" class="cyan" font-size="12">14,100 completions</text>
  <text x="698" y="152" class="dim">#compdef &#183; _arguments</text>

  <path d="M170 172 L170 182 L430 182 L430 190" class="arrow"/>
  <path d="M500 172 L500 190" class="arrow"/>
  <path d="M827 172 L827 182 L570 182 L570 190" class="arrow"/>

  <!-- ===== MIDDLE ROW ===== -->
  <rect x="20" y="192" width="300" height="128" rx="4" class="box"/>
  <text x="38" y="214" class="h">INTERACTIVE TUIs</text>
  <text x="38" y="232" class="dim">profile the shell itself</text>
  <text x="38" y="256" class="cyan" font-size="12">top &#183; flame &#183; trace &#183; matrix</text>
  <text x="38" y="276" class="cyan" font-size="12">aliasrank &#183; funcrank</text>
  <text x="38" y="298" class="dim">delta tracking &#183; 30-day commit velocity</text>

  <!-- ===== CENTER HUB ===== -->
  <rect x="350" y="192" width="300" height="128" rx="4" class="jitbx"/>
  <text x="500" y="216" class="title" fill="#d300c5" font-size="16" text-anchor="middle">zpwr</text>
  <text x="500" y="234" class="dim" text-anchor="middle">single-author zsh framework</text>
  <text x="500" y="258" class="cyan" font-size="12.5" text-anchor="middle">190,000 LOC &#183; 460 verbs</text>
  <text x="500" y="278" class="cyan" font-size="12.5" text-anchor="middle">2,000 aliases &#183; 14,100 completions</text>
  <text x="500" y="304" class="green" font-size="11" text-anchor="middle">corpus-scale &quot;terminal OS&quot;</text>

  <rect x="680" y="192" width="295" height="128" rx="4" class="box"/>
  <text x="698" y="214" class="h">ALIASES</text>
  <text x="698" y="232" class="dim">muscle-memory layer</text>
  <text x="698" y="256" class="cyan" font-size="12">2,000 aliases</text>
  <text x="698" y="276" class="dim">regular &#183; global &#183; suffix</text>
  <text x="698" y="298" class="dim">zsh + tmux + vim/neovim + fzf cockpit</text>

  <path d="M320 256 L350 256" class="arrow"/>
  <path d="M680 256 L650 256" class="arrow"/>
  <path d="M500 320 L500 340" class="arrow"/>

  <!-- ===== SHELL SUBSTRATE ===== -->
  <rect x="20" y="340" width="955" height="62" rx="4" class="box"/>
  <text x="38" y="364" class="h">SHELL SUBSTRATE</text>
  <text x="38" y="388" class="dim">zsh today <tspan class="cyan">&#8594;</tspan> zshrs (compiled shell) as the next-level host &#8212; built to run zpwr, the completion corpus &amp; the whole CLI stack</text>

  <!-- ===== EXTERNAL VETTING ===== -->
  <rect x="20" y="418" width="955" height="62" rx="4" class="optbx"/>
  <text x="38" y="442" class="h" fill="#39ff14">EXTERNAL VETTING</text>
  <text x="38" y="466" class="green" font-size="11">among the most powerful CLI setups ever assembled &#183; zshrs is designed to be its next-level host</text>

  <text x="24" y="558" class="dim" font-size="10">the CLI environment on top of the shell; zshrs is built to host it &#183; zpwr</text>
</svg>
