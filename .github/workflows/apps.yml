name: Apps (Tauri)

# Builds the private Tauri apps (traderview / Audio-Haxor) from this PUBLIC
# meta repo, so their core CI runs on free public-repo Actions minutes instead
# of the apps' own (private, billed) Actions.
#
# This replicates each app's *core Linux build + tests* — the expensive, billed
# part — not their full multi-OS release-bundle jobs or repo-local doc gates.
# Private-repo access uses the SUBMODULE_PAT secret.

on:
  workflow_dispatch:
  schedule:
    - cron: '30 6 * * 1'   # weekly, Monday 06:30 UTC, against each app's main
  push:
    branches: [main]
    paths:
      - '.github/workflows/apps.yml'

jobs:
  traderview:
    name: traderview (Linux core)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CARGO_TERM_COLOR: always
    steps:
      - name: Clone traderview (private)
        env:
          GH_PAT: ${{ secrets.SUBMODULE_PAT }}
        run: git clone "https://x-access-token:${GH_PAT}@github.com/MenkeTechnologies/traderview.git" app

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: app

      # src-tauri (traderview-desktop) needs GTK/Webkit + has no lib tests, so
      # it is excluded from the Linux workspace build, mirroring the app's CI.
      - name: cargo check
        working-directory: app
        run: cargo check --workspace --all-targets --locked --exclude traderview-desktop

      - name: cargo test (lib)
        working-directory: app
        run: cargo test --workspace --locked --no-fail-fast --lib --exclude traderview-desktop

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Frontend JS tests
        working-directory: app
        run: node --test frontend/tests/*.test.mjs

  audio-haxor:
    name: Audio-Haxor (Linux core)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Clone Audio-Haxor (private)
        env:
          GH_PAT: ${{ secrets.SUBMODULE_PAT }}
        run: git clone "https://x-access-token:${GH_PAT}@github.com/MenkeTechnologies/Audio-Haxor.git" app

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: app

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf \
            libgtk-3-dev cmake ninja-build libasound2-dev libfreetype6-dev \
            libx11-dev libxinerama-dev libxrandr-dev libxcursor-dev libgl1-mesa-dev xvfb

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml

      - name: pnpm install
        working-directory: app
        run: pnpm install --frozen-lockfile
      - name: Check i18n JSON key order
        working-directory: app
        run: pnpm run i18n:sort:check
      - name: Run JS tests
        working-directory: app
        run: node scripts/run-js-tests.mjs
      - name: Prepare audio-engine for Tauri externalBin
        working-directory: app
        env:
          AUDIO_ENGINE_TAURI_BIN_PROFILE: debug
        run: node scripts/prepare-audio-engine-audioengine.mjs
      - name: AudioEngine IPC tests (xvfb)
        working-directory: app
        run: xvfb-run -a node scripts/run-audio-engine-tests.mjs
      - name: Rust tests (library + integration)
        working-directory: app
        run: cargo test --manifest-path src-tauri/Cargo.toml
