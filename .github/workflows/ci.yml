        # regression floor.
        run: bash tests/cargo-repository-matches-path.sh
      - name: Meta self-audit — tests/*.sh has shebang+pipefail+execbit+canonical root
        # Recursive audit-tool check: the audit gates themselves
        # must satisfy the hygiene baseline they enforce. Without
        # `set -u`/`pipefail` a gate can silently pass on typo'd
        # variables; without a bash shebang it dispatches to the
        # user's login shell and breaks on bashisms; without
        # +x bit it can't run as `./tests/foo.sh`.
        # The CLAUDE.md audit-tool tampering rule applies
        # recursively — this gate must itself satisfy what it
        # enforces. 61/61 audit gates green at iter-65 add —
        # pure regression floor (the gate that protects all
        # other gates).
        run: bash tests/meta-self-audit.sh
      - name: No `git = "..."` dependencies in publishable Cargo.toml
        # crates.io's publish API REJECTS git deps at publish time
        # with "all dependencies must have a version specified".
        # Same publish-time blocker class as iter-62's wildcard
        # gate, same fix (catch at lint time). Git deps sneak in
        # from tutorials pinning to an upstream main branch for
        # an unreleased feature, or from copy-paste of internal
        # workspace patterns into publishable crates.
        # publish=false crates SKIPPED — they never go to crates.io
        # and sometimes legitimately need git deps for unreleased
        # upstream fixes.
        # 0/11 publishable crates with git deps at iter-66 add
        # (16 publish=false skipped) — pure regression floor.
        run: bash tests/cargo-no-git-deps.sh
      - name: No deprecated GitHub-hosted runners in workflows
        # GitHub retires hosted runner images on a published
        # schedule (ubuntu-20.04 retired 2025-04-15, windows-2019
        # retired 2025-06-30, macos-11 retired 2024-06-28). Once
        # retired, workflows referencing the image FAIL hard on
        # the next push. Workflows that still reference a
        # deprecation-announced (but not-yet-retired) image
        # continue running with warning annotations until the
        # retirement deadline — at which point they fail
        # silently for anyone who hasn't been watching the GitHub
        # blog. This gate catches the drift the moment it lands.
        # 90/90 workflow files green at iter-67 add — pure
        # regression floor.
        run: bash tests/workflow-no-deprecated-runners.sh
      - name: Every workflow YAML parses cleanly (no syntax errors)
        # GitHub Actions SILENTLY ignores workflows that fail to
        # parse — no PR annotation, no email, no entry under the
        # Actions tab. The "broken workflow" signal is the
        # ABSENCE of a check run, which is indistinguishable from
        # "you forgot to trigger CI." This is the worst possible
        # failure mode: it looks like everything's working until
        # someone notices CI hasn't run in 3 weeks.
        # Common breakages: tab indentation (YAML requires
        # spaces), unbalanced ${{ }} braces, missing colon after
        # a key, unescaped colons in inline run: strings.
        # Test uses Python's yaml.safe_load — same parser GitHub
        # uses internally. A clean parse here = GitHub will
        # parse it identically.
        # 90/90 workflow files green at iter-68 add — pure
        # regression floor against the silent-ignore failure mode.
        run: bash tests/workflow-yaml-parseable.sh
      - name: Every workflow declares a top-level `name:` field
        # Without `name:`, GitHub Actions falls back to the FILE
