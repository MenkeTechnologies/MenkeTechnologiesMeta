        # (slow feedback); same check at lint time gives instant
        # feedback. Catches both short form (name = "*") and table
        # form (name = { version = "*", ... }) across
        # [dependencies], [dev-dependencies], [build-dependencies],
        # [workspace.dependencies]. 0/27 wildcards at iter-62 add
        # — pure regression floor.
        run: bash tests/cargo-no-wildcard-deps.sh
      - name: Cargo.toml documentation URL is https://docs.rs/<name>
        # docs.rs is the canonical hosted-rustdoc location for
        # crates.io-published crates — auto-built on every publish
        # and guaranteed in sync with the released version. Setting
        # the `documentation` field to anything else (custom blog,
        # repo URL, GH Pages) is wrong: drifts on every release and
        # collapses two crates.io sidebar links into one destination
        # (the `homepage` field already covers GH Pages docs per
        # iter-26's convention; iter-57 specifically forbids
