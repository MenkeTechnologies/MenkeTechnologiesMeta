        run: bash tests/cargo-lock-version-sync.sh
      - name: Every Cargo.toml exclude entry references a real directory
        # Catches stale exclude entries left over after refactors. A
        # `/parity/` or `/bench/` entry that's removed from the file
        # tree but kept in Cargo.toml's exclude still "works" silently
        # (cargo just ignores non-matching patterns) but signals stale
        # intent and produces noise on cargo publish.
        # Test gotcha discovered: leading-slash patterns aren't
        # necessarily dirs — `/zshrs_dump.*` is a glob for runtime-
        # generated dump files, not a directory. Initial dir-detection
        # was too loose; refined to require trailing-slash AND no glob
        # chars (`*`, `?`, `[`). Glob patterns and file paths skipped
        # entirely — only dir entries are validated.
        run: bash tests/cargo-exclude-entries-exist.sh
      - name: Workflow actions version inventory (informational)
        # Inventories every `uses: <name>@<ref>` across all 90 workflow
        # files in the umbrella. Surfaces version drift (v4 vs v6 vs
        # v3 mix) and the count of SHA-pinned references (GitHub's
        # strongest supply-chain recommendation against typosquatting/
        # action-tag-replacement attacks). INFORMATIONAL only — exits
        # 0 regardless. Coordinated action-version updates across 90
        # files is per-repo cadence work, not a forced gate.
        # Iter-40 snapshot: 245 checkout@v6 dominant, 29 stragglers on
        # @v4; 0 of 726 references are SHA-pinned.
        run: bash tests/workflow-actions-versions.sh
      - name: Every docs/*.html relative stylesheet+script dependency exists
        # Pins every `<link rel="stylesheet" href="...">` and
        # `<script src="...">` with a relative URL (not https://)
        # resolves to a file in the same docs/ directory. Catches:
        #   (a) a CSS/JS file rename (hud-static.css → hud-shared.css)
        #       that wasn't applied to all consumers — GitHub Pages
        #       returns 404 for the asset, page renders unstyled.
        #   (b) docs/index.html copy-pasted from a sibling without the
        #       sibling's co-located dependencies — same 404 silent
        #       break.
