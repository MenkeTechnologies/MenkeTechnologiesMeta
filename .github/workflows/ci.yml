        run: bash tests/cargo-homepage-not-repo-duplicate.sh
      - name: documentation URL distinct from homepage AND repository
        # Iter-56 covered the homepage==repository case (scoped to
        # docs/-having crates). Iter-57 covers the OTHER two
        # collision pairs that aren't conditional on docs/ presence:
        # documentation must always differ from both homepage and
        # repository. The canonical convention:
        #   homepage:      https://menketechnologies.github.io/<repo>/
        #   repository:    https://github.com/MenkeTechnologies/<repo>
        #   documentation: https://docs.rs/<crate>
        # 3 URLs, 3 functions, 3 different domains. If any collapse,
        # crates.io's crate page loses a clickable link.
        # 11/11 publishable crates green at iter-57 add.
        run: bash tests/cargo-three-url-distinct.sh
      - name: Every Cargo.toml [[bin]] path points at an existing file
        # Cargo's `[[bin]]` table accepts `path = "src/bin/foo.rs"`.
        # If the source file is renamed/moved/deleted without
        # updating Cargo.toml — or if Cargo.toml gets a typo'd
        # path — `cargo build` fails with "could not find source
