name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitmodules-syntax:
    name: .gitmodules syntax
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - name: Verify every submodule path has a matching url
        run: |
          set -euo pipefail
          # Each [submodule "X"] block must have a `path` and a `url` line.
          paths=$(git config -f .gitmodules --get-regexp '^submodule\..*\.path$' | wc -l)
          urls=$(git config -f .gitmodules --get-regexp  '^submodule\..*\.url$'  | wc -l)
          echo "found $paths path entries, $urls url entries"
          if [ "$paths" != "$urls" ]; then
            echo "::error::path/url count mismatch — every [submodule] block needs both"
            exit 1
          fi
      - name: Every submodule URL must be https://github.com/MenkeTechnologies/<repo>.git
        run: |
          set -euo pipefail
          bad=$(git config -f .gitmodules --get-regexp '^submodule\..*\.url$' \
            | awk '{print $2}' \
            | grep -vE '^https://github\.com/MenkeTechnologies/[A-Za-z0-9._-]+\.git$' || true)
          if [ -n "$bad" ]; then
            echo "::error::non-canonical submodule URLs found:"
            echo "$bad"
            exit 1
          fi
      - name: Every submodule path must be a top-level directory name with no slashes
        run: |
          set -euo pipefail
          bad=$(git config -f .gitmodules --get-regexp '^submodule\..*\.path$' \
            | awk '{print $2}' \
            | grep '/' || true)
          if [ -n "$bad" ]; then
            echo "::error::nested submodule paths found (this repo expects flat layout):"
            echo "$bad"
            exit 1
          fi

  submodule-reachability:
    name: Submodule URL reachability
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: ls-remote every submodule URL
        run: |
          set -euo pipefail
          urls=$(git config -f .gitmodules --get-regexp '^submodule\..*\.url$' | awk '{print $2}')
          failures=""
          for u in $urls; do
            if ! git ls-remote --quiet "$u" HEAD >/dev/null 2>&1; then
              failures="$failures $u"
            fi
          done
          if [ -n "$failures" ]; then
            echo "::error::unreachable submodule URLs:$failures"
            exit 1
          fi
          echo "all $(echo "$urls" | wc -w) submodule URLs reachable"

  bin-scripts-shellcheck:
    name: Shellcheck helper scripts
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - run: sudo apt-get update && sudo apt-get install -y shellcheck
      - run: shellcheck bin/*

  bin-scripts-smoke:
    name: bin/ scripts smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: false
      - name: bin/status-all runs on empty checkout
        run: |
          set -euo pipefail
          # No submodules initialized — status-all should still produce headers
          # without erroring out (each submodule row will show "not init" markers).
          bash bin/status-all || true
          echo "status-all exit ok"
      - name: bin/foreach is invoked with a benign command
        run: |
          set -euo pipefail
          # With no submodules initialized, `git submodule foreach` is a no-op.
          # We're testing the wrapper doesn't crash on empty.
          bash bin/foreach 'true' || true

  readme-link-check:
    name: README link sanity
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - name: README references match .gitmodules submodule list
        run: |
          set -euo pipefail
          # Every submodule path from .gitmodules should appear as a link
          # somewhere in README.md (either as github URL or local path).
          missing=""
          while read -r path; do
            if ! grep -qE "(MenkeTechnologies/${path}|\(${path}/\))" README.md; then
              missing="$missing $path"
            fi
          done < <(git config -f .gitmodules --get-regexp '^submodule\..*\.path$' | awk '{print $2}')
          if [ -n "$missing" ]; then
            echo "::warning::submodules registered in .gitmodules but not linked from README:$missing"
          fi
          # Hard error if README total submodule badge is wrong.
          actual=$(git config -f .gitmodules --get-regexp '^submodule\..*\.path$' | wc -l | tr -d ' ')
          claimed=$(grep -oE 'submodules-[0-9]+' README.md | head -1 | grep -oE '[0-9]+')
          echo "actual=$actual claimed=$claimed"
          if [ "$actual" != "$claimed" ]; then
            echo "::error::README submodule badge says $claimed but .gitmodules has $actual"
            exit 1
          fi

      - name: README per-tier row counts match the (N) in each ### Tier header
        run: |
          set -euo pipefail
          # Each "### Tier N — Label (N)" section must contain exactly N
          # table rows starting with "| [" (the canonical link-cell row).
          # Catches drift when somebody adds a row but forgets to bump the
          # header count, or vice versa. Also sums the tier counts and
          # compares against the .gitmodules total — third independent check.
          fail=0
          tier_sum=0
          for tier_n in 1 2 3 4 5 6; do
            start=$(grep -nE "^### Tier $tier_n " README.md | head -1 | cut -d: -f1)
            if [ -z "$start" ]; then
              echo "::error::Tier $tier_n header not found in README"
              fail=1
              continue
            fi
            end=$(awk -v s="$start" 'NR > s && (/^### Tier /||/^## /||/^---/){print NR; exit}' README.md)
            [ -z "$end" ] && end=99999
            rows=$(sed -n "${start},${end}p" README.md | grep -cE '^\| \[' || true)
            claimed=$(grep -nE "^### Tier $tier_n " README.md | head -1 | grep -oE '\([0-9]+\)' | tr -d '()')
            tier_sum=$((tier_sum + claimed))
            if [ "$rows" != "$claimed" ]; then
              echo "::error::Tier $tier_n header claims ($claimed) but section has $rows rows"
              fail=1
            else
              echo "Tier $tier_n: $rows rows match header ($claimed)"
            fi
          done
          actual=$(git config -f .gitmodules --get-regexp '^submodule\..*\.path$' | wc -l | tr -d ' ')
          if [ "$tier_sum" != "$actual" ]; then
            echo "::error::Tier headers sum to $tier_sum but .gitmodules has $actual submodules"
            fail=1
          else
            echo "Tier sum $tier_sum matches .gitmodules count $actual"
          fi
          exit $fail

      - name: docs/index.html stat-cards match README + .gitmodules
        run: |
          set -euo pipefail
          fail=0
          if [ -f docs/index.html ]; then
            actual_sub=$(git config -f .gitmodules --get-regexp '^submodule\..*\.path$' | wc -l | tr -d ' ')
            docs_sub=$(grep -oE '"n">[0-9]+</div><div class="l">submodules' docs/index.html | grep -oE '[0-9]+' | head -1)
            if [ -n "$docs_sub" ] && [ "$docs_sub" != "$actual_sub" ]; then
              echo "::error::docs/index.html submodules stat-card says $docs_sub but .gitmodules has $actual_sub"
              fail=1
            fi
            docs_tiers=$(grep -oE '"n">[0-9]+</div><div class="l">tiers' docs/index.html | grep -oE '[0-9]+' | head -1)
            if [ -n "$docs_tiers" ] && [ "$docs_tiers" != "6" ]; then
              echo "::error::docs/index.html tiers stat-card says $docs_tiers but README documents 6 tiers"
              fail=1
            fi
            # `zsh plugins` stat-card must match the Tier 4 (N) header in README
            docs_zsh=$(grep -oE '"n">[0-9]+</div><div class="l">zsh plugins' docs/index.html | grep -oE '[0-9]+' | head -1)
            t4_count=$(grep -nE '^### Tier 4 ' README.md | head -1 | grep -oE '\([0-9]+\)' | tr -d '()')
            if [ -n "$docs_zsh" ] && [ -n "$t4_count" ] && [ "$docs_zsh" != "$t4_count" ]; then
              echo "::error::docs/index.html zsh-plugins stat-card says $docs_zsh but README Tier 4 header has ($t4_count)"
              fail=1
            fi
            # `rust crates` stat-card must match actual Cargo.toml count
            # (any submodule with top-level Cargo.toml is a Rust crate).
            # Only run this check when submodules are initialized — this
            # job uses actions/checkout WITHOUT submodules:true, so the
            # directories may be empty placeholders.
            actual_rust=0
            while read -r path; do
              if [ -f "$path/Cargo.toml" ]; then
                actual_rust=$((actual_rust + 1))
              fi
            done < <(git config -f .gitmodules --get-regexp '^submodule\..*\.path$' | awk '{print $2}')
            docs_rust=$(grep -oE '"n">[0-9]+</div><div class="l">rust crates' docs/index.html | grep -oE '[0-9]+' | head -1)
            if [ "$actual_rust" -gt 0 ] && [ -n "$docs_rust" ] && [ "$docs_rust" != "$actual_rust" ]; then
              echo "::error::docs/index.html rust-crates stat-card says $docs_rust but actual top-level Cargo.toml count is $actual_rust"
              fail=1
            elif [ "$actual_rust" -eq 0 ]; then
              echo "rust-crates check skipped: submodules not initialized in this job (Cargo.toml count is 0)"
            fi
          fi
          exit $fail
