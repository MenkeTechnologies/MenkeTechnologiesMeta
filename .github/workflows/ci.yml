        # 38/38 Cargo.toml files green at iter-170 add —
        # pure regression floor.
        run: bash tests/cargo-toml-size-bound.sh
      - name: Brew formula file size is under 200 lines
        # Canonical brew formula is 30-80 lines. 200+ signals
        # excessive options, install methods doing too much,
