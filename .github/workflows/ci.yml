        # at a removed bin, OR there's a typo — `cargo run` fails
        # at command time with "a bin target must be available".
        # `cargo test` doesn't surface this; the drift sits dormant
        # until someone hits the workflow that runs the binary.
        # Implicit bin name (package-name when src/main.rs exists)
        # also counted as valid.
        # 2/2 Cargo.toml files with default-run set green at
        # iter-70 add — pure regression floor.
        run: bash tests/cargo-default-run-valid.sh
      - name: Publishable Cargo.toml name matches submodule directory
        # crates.io publishes the crate under `name` — that's the
        # canonical identifier (`cargo add <name>`, docs.rs/<name>,
        # crates.io/crates/<name>). When name diverges from the
        # repo dir, iter-26's GH Pages convention, iter-63's
        # docs.rs URL pattern, and README install instructions
        # all start telling slightly different stories about
        # which identifier to use. Confusing for downstream users.
        # publish=false crates SKIPPED — they don't go to
        # crates.io and the org's `-helper`/`-desktop` suffix
        # convention on stryke-* connectors and Tauri inner
        # crates is intentional.
        # 11/11 publishable crates green at iter-71 add — pure
        # regression floor.
        run: bash tests/cargo-name-matches-dir.sh
      - name: Every Cargo workspace member directory exists
        # Cargo walks the [workspace].members list at every command
        # (build, test, metadata, tree). A stale entry that no
        # longer points at a valid sub-crate fails with "failed
        # to load manifest for workspace member" — dormant until
        # the next cargo build, easily missed by rust-analyzer
        # until restart.
        # Drift: rename a sub-crate dir without updating members,
        # delete a sub-crate without removing its entry, typo
        # in entry path, members entry pointing at a dir lacking
        # Cargo.toml. Glob entries ("crates/*") are SKIPPED —
        # they resolve at runtime.
        # 11/11 workspace member paths green at iter-72 add —
        # pure regression floor (traderview's 6 sub-crates).
        run: bash tests/cargo-workspace-members-exist.sh
      - name: Every Cargo.toml parses as valid TOML 1.0
        # Cargo's own parser rejects invalid TOML, but `cargo
        # build` has to spin up rustc + dep resolution before the
        # error surfaces. Lint-time TOML validation cuts the
        # round trip from minutes to seconds: a contributor PR
        # with a broken Cargo.toml gets fast-fail without burning
        # a full Rust build slot.
