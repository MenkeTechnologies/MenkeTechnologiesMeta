        # log. A repo with 5 workflows all showing as
        # `.github/workflows/*.yml` is unnavigable. Status badges
        # render with the filename as alt-text, leaking
        # implementation detail to README readers and breaking
        # on any future filename rename.
        # 90/90 workflow files green at iter-69 add — pure
        # regression floor against accidental name-field deletion
        # during reformatting.
        run: bash tests/workflow-top-name.sh
      - name: Workflow top-level name is at most 80 chars
        # Actions tab sidebar truncates at fixed width; PR
        # check-run names embed workflow name (long → job
        # name column truncates); notification emails wrap
        # awkwardly past 80. Pairs with iter-69 (presence).
        # 80-char limit matches iter-136 (brew formula desc).
        # 90/90 workflows green at iter-168 add — pure
        # regression floor.
        run: bash tests/workflow-name-length.sh
      - name: Workflow yml file size is under 1000 lines
        # GitHub max is 1024 KB (~30k lines) but 1000 is the
        # practical readability boundary. Past 1000 lines
        # almost always means split-needed jobs, copy-paste
        # boilerplate, or dead code. This meta repo's ci.yml
