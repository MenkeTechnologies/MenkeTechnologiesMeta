name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitmodules-syntax:
    name: .gitmodules syntax
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - name: Verify every submodule path has a matching url
        run: |
          set -euo pipefail
          # Each [submodule "X"] block must have a `path` and a `url` line.
          paths=$(git config -f .gitmodules --get-regexp '^submodule\..*\.path$' | wc -l)
          urls=$(git config -f .gitmodules --get-regexp  '^submodule\..*\.url$'  | wc -l)
          echo "found $paths path entries, $urls url entries"
          if [ "$paths" != "$urls" ]; then
            echo "::error::path/url count mismatch — every [submodule] block needs both"
            exit 1
          fi
      - name: Every submodule URL must be https://github.com/MenkeTechnologies/<repo>.git
        run: |
          set -euo pipefail
          bad=$(git config -f .gitmodules --get-regexp '^submodule\..*\.url$' \
            | awk '{print $2}' \
            | grep -vE '^https://github\.com/MenkeTechnologies/[A-Za-z0-9._-]+\.git$' || true)
          if [ -n "$bad" ]; then
            echo "::error::non-canonical submodule URLs found:"
            echo "$bad"
            exit 1
          fi
      - name: Every submodule path must be a top-level directory name with no slashes
        run: |
          set -euo pipefail
          bad=$(git config -f .gitmodules --get-regexp '^submodule\..*\.path$' \
            | awk '{print $2}' \
            | grep '/' || true)
          if [ -n "$bad" ]; then
            echo "::error::nested submodule paths found (this repo expects flat layout):"
            echo "$bad"
            exit 1
          fi

  submodule-reachability:
    name: Submodule URL reachability
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: ls-remote every submodule URL
        run: |
          set -euo pipefail
          urls=$(git config -f .gitmodules --get-regexp '^submodule\..*\.url$' | awk '{print $2}')
          failures=""
          for u in $urls; do
            if ! git ls-remote --quiet "$u" HEAD >/dev/null 2>&1; then
              failures="$failures $u"
            fi
          done
          if [ -n "$failures" ]; then
            echo "::error::unreachable submodule URLs:$failures"
            exit 1
          fi
          echo "all $(echo "$urls" | wc -w) submodule URLs reachable"

  bin-scripts-shellcheck:
    name: Shellcheck helper scripts
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - run: sudo apt-get update && sudo apt-get install -y shellcheck
      - run: shellcheck bin/*

  bin-scripts-smoke:
    name: bin/ scripts smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: false
      - name: bin/status-all runs on empty checkout
        run: |
          set -euo pipefail
          # No submodules initialized — status-all should still produce headers
          # without erroring out (each submodule row will show "not init" markers).
          bash bin/status-all || true
          echo "status-all exit ok"
      - name: bin/foreach is invoked with a benign command
        run: |
          set -euo pipefail
          # With no submodules initialized, `git submodule foreach` is a no-op.
          # We're testing the wrapper doesn't crash on empty.
          bash bin/foreach 'true' || true
      - name: bin-scripts contract pins (+x, sh -n, usage)
        # Pin that every bin/ script has the executable bit, parses
        # under sh -n, and bin/foreach surfaces its usage when called
        # without args. Matches the checked-in tests/bin-scripts.sh
        # so contributors can run the same script locally.
        run: bash tests/bin-scripts.sh
      - name: submodule integrity pins (64 entries, paths exist, urls valid)
        # Pin .gitmodules structural invariants: 64 entries, every path
        # exists in the working tree, every url is
        # https://github.com/MenkeTechnologies/<name>.git, repo name
        # matches path basename, no duplicates. Runs without needing
        # `git submodule update --init` because it only reads
        # .gitmodules + checks `[[ -d $path ]]` on the (empty) dirs.
        run: bash tests/submodule-integrity.sh

  homebrew-formulas:
    name: Homebrew tap formula quality
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - name: Init homebrew-menketech submodule only
        # The full --recurse takes minutes; we only need one submodule.
        run: git submodule update --init --depth 1 homebrew-menketech
      - name: Formula version / sha256 / url / install invariants
        # Catches placeholder sha256s (broken auto-bump where the release
        # workflow couldn't push to the tap), url-vs-version drift, missing
        # install blocks. Same script as the local-runnable one in tests/.
        run: bash tests/homebrew-formulas.sh

  cargo-doc-version-sync:
    name: Cargo.toml ↔ docs/*.html version sync
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - name: Per-submodule docs/*.html highest version >= Cargo.toml version
        # Catches the failure mode seen 2026-05-30 with powerliners:
        # Cargo.toml was at "0.2.1" while docs/report.html still claimed
        # "v0.0.8" — the docs got refreshed via per-stat batches that
        # missed the version field, so the public docs lied about the
        # current release. This script greps each submodule's
        # docs/*.html for the highest vN.N.N (skipping Perl/Python/Rust
        # toolchain mentions) and FAILs if it's behind Cargo.toml's
        # version field.
        run: bash tests/cargo-doc-version-sync.sh
      - name: Per-submodule docs/*.html title + breadcrumb URL brand consistency
        # Catches the template-clone failure mode: dev copies docs/index.html
        # from a sibling repo, forgets to update <title> and/or the canonical
        # breadcrumb GitHub link, ships docs that brand-link to the wrong
        # project. Cross-references to sibling repos in body text ARE fine —
        # the check is scoped to <title> and the canonical breadcrumb only.
        run: bash tests/docs-brand-consistency.sh
      - name: Every Rust release.yml targeting tap must reference HOMEBREW_TAP_TOKEN
        # Catches the 2026-05-30 powerliners pattern: 4 release cycles
        # (v0.0.7 → v0.1.1) completed the build job + GH Release but
        # the "Update Homebrew tap" step died at checkout with bad
        # credentials because HOMEBREW_TAP_TOKEN wasn't referenced.
        # This gate catches missing-reference at PR time; it cannot
        # catch expired-PAT (runtime concern).
        run: bash tests/release-workflow-tap-secret.sh
      - name: Every Rust release.yml must build with --locked
        # Without --locked, `cargo build` silently rolls forward
        # transitive deps between tag-cut and rebuild — a user
        # `brew install`ing v1.2.3 today might get different transitive
        # crate versions than the same `brew install` next week, even
        # from the SAME upstream Cargo.toml. --locked refuses to mutate
        # Cargo.lock; CI fails if the lockfile is missing instead of
        # silently producing an unreproducible binary.
        run: bash tests/release-locked-build.sh
      - name: Every Tier 1 Rust binary ships man/man1/<bin>.1 + <bin>all.1
        # Pins the README line-82 convention: every Tier 1 Rust binary
        # submodule (excludes fusevm/Audio-Haxor/traderview/zpwr which
        # have different docs conventions) must ship the basic + "all"
        # variant man pages. Catches the failure mode where a new
        # binary is added to Tier 1 but the man-page step in its
        # build pipeline gets skipped (would have caught the 2026-05-30
        # powerliners gap that shipped v0.0.1 → v0.2.1 without man
        # pages while every sibling shipped them).
        run: bash tests/tier1-man-pages.sh
      - name: Every Rust submodule with Cargo license= ships a LICENSE file
        # MIT/Apache licenses themselves REQUIRE the notice text to ship
        # with distributed code. Cargo.toml claiming license="MIT" without
        # a LICENSE file in the repo root is (a) a MIT-violation, (b) a
        # crates.io "no license file detected" warning, (c) reduces
        # downstream trust. Caught 24 of 26 Rust submodules in this state
        # 2026-05-30; bulk-fixed with the canonical MenkeTechnologies MIT
        # text (same as siblings strykelang/iftoprs). Test accepts
        # LICENSE/LICENSE.md/LICENSE-MIT/LICENSE-APACHE dual-license forms.
        run: bash tests/license-file-present.sh
      - name: Every Rust binary submodule commits Cargo.lock
        # `cargo build --locked` is the standard release pattern, but it
        # only works when Cargo.lock is committed. Without it, release
        # builds silently roll forward transitive deps between tag-cut
        # and rebuild, producing unreproducible binaries. The Rust
        # community convention: library crates skip Cargo.lock; binary
        # crates commit it. Caught 2 of 26 binary repos in this state
        # 2026-05-30 (Audio-Haxor + spring-boot-rest-generator — both
        # blocked by ~/.gitignore_global's library-default rule).
        # Bulk-fixed via `cargo generate-lockfile --offline && git add -f`.
        # Test recognizes [[bin]] / default-run / src/main.rs / src/bin/*
        # as binary-eligibility signals, including workspace-root
        # Cargo.toml with src-tauri member binaries (Audio-Haxor pattern).
        run: bash tests/cargo-lock-committed.sh
      - name: Every Rust ci.yml runs the 4 canonical polish gates (fmt + clippy + doc + test)
        # Per docs/report.html "POLISH GATES" section: every Rust crate
        # should pass `cargo fmt --check`, `cargo clippy -- -D warnings`,
        # `RUSTDOCFLAGS=-D warnings cargo doc --no-deps`, and `cargo test`
        # in CI before a tag is cut. Initially caught 23 of 27 Rust
        # submodules missing one or more gates 2026-05-30; bulk-fixed 17
        # (14 stryke-* connectors + storageshower + iftoprs + nmaprs).
        # Allowlist (justified): strykelang/zshrs/fusevm mark fmt/clippy
        # advisory; Audio-Haxor/traderview use pnpm-driven Tauri builds;
        # spring-boot-rest-generator is mid Kotlin→Rust transition.
        run: bash tests/rust-ci-polish-gates.sh
      - name: Every Rust binary submodule with a tap formula has brew install in its README
        # UX failure mode: each Rust binary is `brew install`-able through
        # the unified MenkeTechnologies tap, but a user landing on the
        # GitHub README has no way to discover that path without the
        # explicit install line. Caught 8 of 9 Rust binary repos in this
        # state 2026-05-30 (powerliners was the only one with brew install
        # documented); bulk-fixed in iteration 15.
        run: bash tests/readme-brew-install.sh

  readme-link-check:
    name: README link sanity
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - name: README references match .gitmodules submodule list
        run: |
          set -euo pipefail
          # Every submodule path from .gitmodules should appear as a link
          # somewhere in README.md (either as github URL or local path).
          missing=""
          while read -r path; do
            if ! grep -qE "(MenkeTechnologies/${path}|\(${path}/\))" README.md; then
              missing="$missing $path"
            fi
          done < <(git config -f .gitmodules --get-regexp '^submodule\..*\.path$' | awk '{print $2}')
          if [ -n "$missing" ]; then
            echo "::warning::submodules registered in .gitmodules but not linked from README:$missing"
          fi
          # Hard error if README total submodule badge is wrong.
          actual=$(git config -f .gitmodules --get-regexp '^submodule\..*\.path$' | wc -l | tr -d ' ')
          claimed=$(grep -oE 'submodules-[0-9]+' README.md | head -1 | grep -oE '[0-9]+')
          echo "actual=$actual claimed=$claimed"
          if [ "$actual" != "$claimed" ]; then
            echo "::error::README submodule badge says $claimed but .gitmodules has $actual"
            exit 1
          fi

      - name: README per-tier row counts match the (N) in each ### Tier header
        run: |
          set -euo pipefail
          # Each "### Tier N — Label (N)" section must contain exactly N
          # table rows starting with "| [" (the canonical link-cell row).
          # Catches drift when somebody adds a row but forgets to bump the
          # header count, or vice versa. Also sums the tier counts and
          # compares against the .gitmodules total — third independent check.
          fail=0
          tier_sum=0
          for tier_n in 1 2 3 4 5 6; do
            start=$(grep -nE "^### Tier $tier_n " README.md | head -1 | cut -d: -f1)
            if [ -z "$start" ]; then
              echo "::error::Tier $tier_n header not found in README"
              fail=1
              continue
            fi
            end=$(awk -v s="$start" 'NR > s && (/^### Tier /||/^## /||/^---/){print NR; exit}' README.md)
            [ -z "$end" ] && end=99999
            rows=$(sed -n "${start},${end}p" README.md | grep -cE '^\| \[' || true)
            claimed=$(grep -nE "^### Tier $tier_n " README.md | head -1 | grep -oE '\([0-9]+\)' | tr -d '()')
            tier_sum=$((tier_sum + claimed))
            if [ "$rows" != "$claimed" ]; then
              echo "::error::Tier $tier_n header claims ($claimed) but section has $rows rows"
              fail=1
            else
              echo "Tier $tier_n: $rows rows match header ($claimed)"
            fi
          done
          actual=$(git config -f .gitmodules --get-regexp '^submodule\..*\.path$' | wc -l | tr -d ' ')
          if [ "$tier_sum" != "$actual" ]; then
            echo "::error::Tier headers sum to $tier_sum but .gitmodules has $actual submodules"
            fail=1
          else
            echo "Tier sum $tier_sum matches .gitmodules count $actual"
          fi
          exit $fail

      - name: docs/index.html stat-cards match README + .gitmodules
        run: |
          set -euo pipefail
          fail=0
          if [ -f docs/index.html ]; then
            actual_sub=$(git config -f .gitmodules --get-regexp '^submodule\..*\.path$' | wc -l | tr -d ' ')
            docs_sub=$(grep -oE '"n">[0-9]+</div><div class="l">submodules' docs/index.html | grep -oE '[0-9]+' | head -1)
            if [ -n "$docs_sub" ] && [ "$docs_sub" != "$actual_sub" ]; then
              echo "::error::docs/index.html submodules stat-card says $docs_sub but .gitmodules has $actual_sub"
              fail=1
            fi
            docs_tiers=$(grep -oE '"n">[0-9]+</div><div class="l">tiers' docs/index.html | grep -oE '[0-9]+' | head -1)
            if [ -n "$docs_tiers" ] && [ "$docs_tiers" != "6" ]; then
              echo "::error::docs/index.html tiers stat-card says $docs_tiers but README documents 6 tiers"
              fail=1
            fi
            # `zsh plugins` stat-card must match the Tier 4 (N) header in README
            docs_zsh=$(grep -oE '"n">[0-9]+</div><div class="l">zsh plugins' docs/index.html | grep -oE '[0-9]+' | head -1)
            t4_count=$(grep -nE '^### Tier 4 ' README.md | head -1 | grep -oE '\([0-9]+\)' | tr -d '()')
            if [ -n "$docs_zsh" ] && [ -n "$t4_count" ] && [ "$docs_zsh" != "$t4_count" ]; then
              echo "::error::docs/index.html zsh-plugins stat-card says $docs_zsh but README Tier 4 header has ($t4_count)"
              fail=1
            fi
            # `rust crates` stat-card must match actual Cargo.toml count
            # (any submodule with top-level Cargo.toml is a Rust crate).
            # Only run this check when submodules are initialized — this
            # job uses actions/checkout WITHOUT submodules:true, so the
            # directories may be empty placeholders.
            actual_rust=0
            while read -r path; do
              if [ -f "$path/Cargo.toml" ]; then
                actual_rust=$((actual_rust + 1))
              fi
            done < <(git config -f .gitmodules --get-regexp '^submodule\..*\.path$' | awk '{print $2}')
            docs_rust=$(grep -oE '"n">[0-9]+</div><div class="l">rust crates' docs/index.html | grep -oE '[0-9]+' | head -1)
            if [ "$actual_rust" -gt 0 ] && [ -n "$docs_rust" ] && [ "$docs_rust" != "$actual_rust" ]; then
              echo "::error::docs/index.html rust-crates stat-card says $docs_rust but actual top-level Cargo.toml count is $actual_rust"
              fail=1
            elif [ "$actual_rust" -eq 0 ]; then
              echo "rust-crates check skipped: submodules not initialized in this job (Cargo.toml count is 0)"
            fi
          fi
          exit $fail
