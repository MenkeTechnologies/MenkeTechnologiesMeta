        # code. Pairs with iter-169 (1000 workflow), iter-170
        # (500 Cargo.toml) — three file-size sanity gates.
        # 10/10 formulas green at iter-171 add — pure
        # regression floor.
        run: bash tests/formula-size-bound.sh
      - name: Cargo.toml default-run matches a real [[bin]] name
        # `default-run` controls which binary `cargo run` (without
