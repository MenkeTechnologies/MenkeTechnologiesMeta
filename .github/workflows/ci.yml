        # 27/27 crates green at iter-141 add — pure
        # regression floor.
        run: bash tests/cargo-description-no-todo.sh
      - name: Brew formula desc has no TODO/FIXME placeholders
        # Mirror of iter-141 (cargo-side) for brew formula
        # desc. Placeholder text in brew info / brew search /
        # formulae.brew.sh page signals "abandoned" even when
        # other fields are correct. 5 gates now pin brew desc
        # shape: presence (iter-75), length (iter-136),
        # starting char (iter-137), no trailing period
        # (iter-138), no placeholders (iter-142).
        # 10/10 formulas green at iter-142 add — pure
        # regression floor.
        run: bash tests/formula-desc-no-placeholder.sh
      - name: Brew formula desc has no shouty ALL-CAPS words
        # 2-3 letter ALL-CAPS are legitimate acronyms (AWK,
        # JIT, TUI, CLI). 4+ chars almost always signals
        # shouty emphasis ("EXTREMELY FAST"), placeholder
        # markers, or yelling. Complements iter-142's word-
        # boundary placeholder check by catching same words
        # via case-shape detection. 10/10 formulas green at
        # iter-177 add — pure regression floor.
        run: bash tests/formula-desc-no-shouty-caps.sh
      - name: Brew formula uses 2-space indentation
        # Ruby convention (RuboCop default, brew style guide).
        # Walks every non-empty non-comment line, requires
        # no tabs + even-space depth. Diffs from release.yml
        # auto-bumps stay line-oriented; editor block guides
        # render consistently.
        # 10/10 formulas green at iter-150 add — pure
        # regression floor. ROUND-150 MILESTONE.
        run: bash tests/formula-two-space-indent.sh
      - name: Cargo.toml description starts with capital or digit
        # Cargo-side mirror of iter-137 (brew formula). Same
        # rationale on crates.io: card view tagline, cargo
        # search row, docs.rs subtitle, rust-analyzer hover —
        # all expect sentence-case. Digit-leading accepted
        # for intentional content (powerliners' "1:1 Rust port").
        # Now 6 gates pin cargo desc shape: length 150 (27),
        # length 20 (53), no period (47), no URL (94), no
        # placeholders (141), capitalized (143). Symmetric
        # with brew desc shape catalog from iter-137-142.
        # 27/27 crates green at iter-143 add — pure
        # regression floor.
        run: bash tests/cargo-description-capitalized.sh
      - name: Cargo.toml description has no double spaces
        # Double-spaces in description are typos. Render as
        # visible gaps on crates.io card view; confuse tag-
        # cloud and search parsers. The two-space convention
        # is typewriter-era; modern style guides use single-
        # space. Now 7 gates pin cargo desc shape: cap 150
        # (27), no period (47), floor 20 (53), no URL (94),
        # no placeholders (141), capitalized (143), no
        # double-space (151).
        # 27/27 crates green at iter-151 add — pure
        # regression floor.
        run: bash tests/cargo-description-no-double-space.sh
      - name: Cargo.toml description has no shouty 5+ ALL-CAPS
        # Cargo descs use 4-char tech acronyms (JSON, REST,
        # HTTP, IPC, CSV). 5+ threshold catches shouty caps
        # (FIXME, PLACEHOLDER, URGENT) without false-failing
        # on legitimate acronyms. Brew side (iter-177) uses
        # 4+ because brew formula descs have narrower
        # acronym vocab. iter-141 catches TODO by name-
        # boundary regardless of case.
        # 27/27 crates green at iter-178 add — pure
        # regression floor.
        run: bash tests/cargo-description-no-shouty-caps.sh
      - name: Cargo.toml description is single-line
        # TOML `"""` triple-quoted form allows newlines;
        # crates.io card / cargo search column /
        # docs.rs subtitle / SEO meta all expect
        # single-line. Multi-line gets truncated or
        # rendered with literal \n. 9 gates pin cargo
        # desc shape: cap 150 (27), no period (47),
        # floor 20 (53), no URL (94), no placeholders
        # (141), capitalized (143), no double-space
        # (151), no 5+ ALL-CAPS (178), single-line
        # (190). 27/27 crates green at iter-190 add —
        # pure regression floor.
        run: bash tests/cargo-description-single-line.sh
      - name: Cargo.toml homepage URL has a path component
        # Bare-host homepage (https://example.com or https://
        # host/) lands users on a generic landing page with
        # no crate-specific content. Drift: cargo new
        # placeholder, aspirational org URL, refactor that
        # truncated the path. Org convention (iter-26):
        # homepage points at either GH Pages docs site or
        # GitHub repo — both have a <repo> path segment.
        # 26/26 crates with homepage green at iter-160 add —
        # pure regression floor.
        run: bash tests/cargo-homepage-has-path.sh
      - name: Cargo.toml documentation URL has a path component
        # Mirror of iter-160 for documentation field. Bare
        # docs.rs/ would land users on docs.rs's homepage —
        # search-and-browse for any crate, not specifically
        # this one. Canonical form (iter-63): docs.rs/<name>.
        # 11/11 crates with documentation green at iter-161
        # add — pure regression floor.
        run: bash tests/cargo-documentation-has-path.sh
      - name: Cargo.toml repository URL has a path component
        # Third member of cargo URL path-component triad
        # (iter-160 homepage, iter-161 documentation, iter-162
        # repository). Bare github.com lands users on github
        # homepage; canonical form (iter-64) is github.com/
        # MenkeTechnologies/<repo> with org+repo segments.
        # 26/26 crates with repository green at iter-162 add
        # — pure regression floor.
        run: bash tests/cargo-repository-has-path.sh
      - name: Cargo.toml keywords entries are unique within array
        # crates.io max_keywords is 5; duplicates waste slots
        # (effective keyword count < 5, lost discovery slot
        # irreversible). crates.io may silently dedupe at
        # ingest or not — when it doesn't, the displayed list
        # shows the dup verbatim. cargo-crate exports
        # propagate the dup into downstream tooling.
        # 11/11 keyword arrays green at iter-153 add —
        # pure regression floor.
        run: bash tests/cargo-keywords-unique.sh
      - name: Cargo.toml categories entries are unique
        # Mirror of iter-153 for categories (same max=5,
        # same discovery role, same waste-of-slot drift).
        # 11/11 category arrays green at iter-154 add —
        # pure regression floor.
        run: bash tests/cargo-categories-unique.sh
      - name: Cargo.toml authors entries are unique
        # Third member of array-uniqueness triad after
        # iter-153 (keywords) and iter-154 (categories).
        # Drift typically introduced during contributor
        # renames / email rotations where the old entry
        # gets left in place. 26/26 author arrays green
        # at iter-155 add — pure regression floor.
        run: bash tests/cargo-authors-unique.sh
      - name: Cargo.toml exclude/include entries are unique
        # Fourth array-uniqueness gate (after keywords iter-153,
        # categories iter-154, authors iter-155). Documented
        # allowlist for strykelang/Cargo.toml exclude duplicate
        # `/.github/` — sibling-repo drift, meta-only scope
        # blocks fix; entry removed when strykelang patches it.
        # 4 exclude arrays clean + 1 allowlisted at iter-156.
        run: bash tests/cargo-exclude-include-unique.sh
      - name: Workflow uses references are pinned with @ref
        # Bare `uses: actions/checkout` (no @ref) resolves to
        # the default-branch HEAD at runtime — action behavior
        # can change between two runs of the same workflow file
        # with no diff to explain why. Pin to @vN, @<sha>, or
        # @<branch>. docker:// and ./ prefixes exempted (use
        # different ref syntaxes — :tag and relative path
        # respectively). 90/90 workflows green at iter-157 add
        # — pure regression floor.
        run: bash tests/workflow-uses-pinned.sh
      - name: Workflow env keys use UPPER_SNAKE_CASE
        # POSIX env var convention, cross-OS consistency
        # (Windows is case-insensitive; Linux is case-sensitive),
        # POSIX-strict shell compatibility (dash, busybox sh),
        # reading discipline (no `MyVar` / `myVar` confusion).
        # Walks workflow/job/step env blocks. Pattern:
        # ^[A-Z_][A-Z0-9_]*$.
        # 90/90 workflows green at iter-144 add — pure
        # regression floor.
        run: bash tests/workflow-env-uppercase.sh
      - name: Workflow secrets references use UPPER_SNAKE_CASE
        # GitHub Settings UI capitalizes secret names on
        # creation. Workflow refs `${{ secrets.X }}` do
        # case-insensitive lookup, hiding typos and
        # inconsistent style. Forced UPPER_SNAKE: review
        # discipline, grep consistency, secret rotation
        # analysis stability. GITHUB_TOKEN exempted (auto-
        # provisioned by GitHub).
        # 13 secret refs across 90 workflows green at
        # iter-164 add — pure regression floor.
        run: bash tests/workflow-secrets-uppercase.sh
      - name: Workspace.dependencies entries are used by sub-crates
        # Orphan entries in [workspace.dependencies] are dead
        # code: cargo metadata resolves their transitive
        # graph for nothing (slow), reviewers waste time
        # tracing them, and their version drifts from current
        # as nothing forces bumps. Walk every sub-crate
        # Cargo.toml for `dep.workspace = true` references;
        # set-difference declared vs used. Workspace root
        # itself is INCLUDED (zshrs/Cargo.toml pattern: both
        # workspace root AND [package] crate).
        # 36/36 workspace deps green at iter-145 add — pure
        # regression floor.
        run: bash tests/cargo-workspace-deps-used.sh
      - name: Workflow if conditions are not constant true/false
        # if: true = always-runs no-op (zero filtering effect).
        # if: false = always-skipped dead code. Both forms are
        # leftovers from debugging that someone forgot to
        # revert. Accept both YAML boolean and string forms.
        # Pairs with iter-83 (steps actionable).
        # 0/90 currently use constant if — pure regression
        # floor against accidental debug-leftover introduction.
        run: bash tests/workflow-no-constant-if.sh
      - name: Cargo.toml deps don't redundantly set default-features=true
        # `default-features` defaults to true; setting it
        # explicitly is dead code from copy-paste, refactor
        # leftover, or defensive style. The = false form is
        # meaningful (disables defaults) — gate only flags
        # = true. Across 573 dep lines, 0 redundant entries
        # at iter-148 add — pure regression floor.
        run: bash tests/cargo-no-redundant-default-features.sh
      - name: Optional deps are activated by at least one feature
        # `optional = true` deps never referenced in [features]
        # are dead metadata — cargo metadata resolves their
        # transitive graph for nothing; dep audits include them
        # pointlessly; reviewers waste time tracing them.
        # Detection accepts pre-1.60 ("dep_name"), 1.60+
        # ("dep:dep_name"), and feature-of-dep ("dep_name/feat")
        # syntax in the [features] body.
        # 11/11 optional deps activated at iter-149 add — pure
        # regression floor.
        run: bash tests/cargo-optional-deps-activated.sh
      - name: Workflow matrix.include entries are mappings
        # GitHub Actions matrix include format requires each
        # entry to be a dimension-name → value mapping. Bare
        # strings/lists silently expand to malformed jobs:
        # one job with no matrix.X accessible, or zero jobs
        # entirely. The workflow runs (sometimes) but the
        # parameter sweep is broken in non-obvious ways.
        # 90/90 workflows green at iter-131 add — pure
        # regression floor.
        run: bash tests/workflow-matrix-include-mappings.sh
      - name: Brew formula class name matches TitleCased filename
        # Homebrew loads formulas by looking up a Ruby constant
        # equal to the kebab-to-camel conversion of the filename.
        # Mismatch fails at brew install time with opaque
        # `undefined method install for nil:NilClass` — the
        # formula registry lookup returns nil because the
        # expected class isn't defined under that name.
        # Algorithm: split on -, TitleCase each segment, join.
        # 10/10 formulas green at iter-119 add — pure
        # regression floor.
        run: bash tests/formula-class-matches-filename.sh
      - name: Brew formula class inherits from Formula
        # Without `< Formula`, the class is a plain Object
        # subclass — DSL methods (url, sha256, install) are
        # undefined. `brew install` fails at first DSL call with
        # `undefined method 'url' for #<Object>` — cryptic and
        # not obviously about inheritance. Pairs with iter-119:
        # iter-119 pins class identity, iter-120 pins
        # inheritance contract.
        # 10/10 formulas green at iter-120 add — pure
        # regression floor.
        run: bash tests/formula-inherits-formula.sh
      - name: Brew formula test do block contains an assertion
        # Iter-88 pinned test block EXISTS; iter-121 pins that
        # it actually VERIFIES. Without `assert*`/`refute*`,
        # `brew test` runs commands and reports SUCCESS
        # regardless of output — a segfaulting binary passes
        # silently because `shell_output` doesn't fail on
        # non-zero exit. Common forms: assert_match,
        # assert_equal, assert_path_exists, refute_match.
        # 10/10 formulas green at iter-121 add — pure
        # regression floor.
        run: bash tests/formula-test-has-assert.sh
      - name: Brew formula url uses /releases/download/ binary path
        # GitHub has two tarball URL families: /archive/ (auto-
        # generated source from git tree at tag) and
        # /releases/download/ (release.yml-uploaded binary
        # asset). For Rust-built taps, the binary path is
        # correct — otherwise brew builds from source at
        # install time and the formula's sha256 mismatches the
        # actual download. Common drift: copying the "Source
        # code (tar.gz)" link from GitHub's release page UI.
        # 10/10 formulas green at iter-123 add — pure
        # regression floor.
        run: bash tests/formula-url-binary-release.sh
      - name: Cargo workspace inheritance references resolve
        # `<field>.workspace = true` in a sub-crate Cargo.toml
        # requires that the workspace root's [workspace.package]
        # declares <field>. Broken inheritance fails at every
        # cargo command with "<field> was not set in the
        # workspace, but the member needs it." Sneaks in via
        # copy-paste from other workspaces, refactor that drops
        # a field, or new workspace without [workspace.package]
        # scaffolding. 7/7 inheritance refs green at iter-122
        # add — pure regression floor.
        run: bash tests/cargo-workspace-inheritance-valid.sh

  readme-link-check:
    name: README link sanity
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - name: README references match .gitmodules submodule list
        run: |
          set -euo pipefail
          # Every submodule path from .gitmodules should appear as a link
          # somewhere in README.md (either as github URL or local path).
          missing=""
          while read -r path; do
            if ! grep -qE "(MenkeTechnologies/${path}|\(${path}/\))" README.md; then
              missing="$missing $path"
            fi
          done < <(git config -f .gitmodules --get-regexp '^submodule\..*\.path$' | awk '{print $2}')
          if [ -n "$missing" ]; then
            echo "::warning::submodules registered in .gitmodules but not linked from README:$missing"
          fi
          # Hard error if README total submodule badge is wrong.
          actual=$(git config -f .gitmodules --get-regexp '^submodule\..*\.path$' | wc -l | tr -d ' ')
          claimed=$(grep -oE 'submodules-[0-9]+' README.md | head -1 | grep -oE '[0-9]+')
          echo "actual=$actual claimed=$claimed"
          if [ "$actual" != "$claimed" ]; then
            echo "::error::README submodule badge says $claimed but .gitmodules has $actual"
            exit 1
          fi

      - name: README per-tier row counts match the (N) in each ### Tier header
        run: |
          set -euo pipefail
          # Each "### Tier N — Label (N)" section must contain exactly N
          # table rows starting with "| [" (the canonical link-cell row).
          # Catches drift when somebody adds a row but forgets to bump the
          # header count, or vice versa. Also sums the tier counts and
          # compares against the .gitmodules total — third independent check.
          fail=0
          tier_sum=0
          for tier_n in 1 2 3 4 5 6; do
            start=$(grep -nE "^### Tier $tier_n " README.md | head -1 | cut -d: -f1)
            if [ -z "$start" ]; then
              echo "::error::Tier $tier_n header not found in README"
              fail=1
              continue
            fi
            end=$(awk -v s="$start" 'NR > s && (/^### Tier /||/^## /||/^---/){print NR; exit}' README.md)
            [ -z "$end" ] && end=99999
            rows=$(sed -n "${start},${end}p" README.md | grep -cE '^\| \[' || true)
            claimed=$(grep -nE "^### Tier $tier_n " README.md | head -1 | grep -oE '\([0-9]+\)' | tr -d '()')
            tier_sum=$((tier_sum + claimed))
            if [ "$rows" != "$claimed" ]; then
              echo "::error::Tier $tier_n header claims ($claimed) but section has $rows rows"
              fail=1
            else
              echo "Tier $tier_n: $rows rows match header ($claimed)"
            fi
          done
          actual=$(git config -f .gitmodules --get-regexp '^submodule\..*\.path$' | wc -l | tr -d ' ')
          if [ "$tier_sum" != "$actual" ]; then
            echo "::error::Tier headers sum to $tier_sum but .gitmodules has $actual submodules"
            fail=1
          else
            echo "Tier sum $tier_sum matches .gitmodules count $actual"
          fi
          exit $fail

      - name: docs/index.html stat-cards match README + .gitmodules
        run: |
          set -euo pipefail
          fail=0
          if [ -f docs/index.html ]; then
            actual_sub=$(git config -f .gitmodules --get-regexp '^submodule\..*\.path$' | wc -l | tr -d ' ')
            docs_sub=$(grep -oE '"n">[0-9]+</div><div class="l">submodules' docs/index.html | grep -oE '[0-9]+' | head -1)
            if [ -n "$docs_sub" ] && [ "$docs_sub" != "$actual_sub" ]; then
              echo "::error::docs/index.html submodules stat-card says $docs_sub but .gitmodules has $actual_sub"
              fail=1
            fi
            docs_tiers=$(grep -oE '"n">[0-9]+</div><div class="l">tiers' docs/index.html | grep -oE '[0-9]+' | head -1)
            if [ -n "$docs_tiers" ] && [ "$docs_tiers" != "6" ]; then
              echo "::error::docs/index.html tiers stat-card says $docs_tiers but README documents 6 tiers"
              fail=1
            fi
            # `zsh plugins` stat-card must match the Tier 4 (N) header in README
            docs_zsh=$(grep -oE '"n">[0-9]+</div><div class="l">zsh plugins' docs/index.html | grep -oE '[0-9]+' | head -1)
            t4_count=$(grep -nE '^### Tier 4 ' README.md | head -1 | grep -oE '\([0-9]+\)' | tr -d '()')
            if [ -n "$docs_zsh" ] && [ -n "$t4_count" ] && [ "$docs_zsh" != "$t4_count" ]; then
              echo "::error::docs/index.html zsh-plugins stat-card says $docs_zsh but README Tier 4 header has ($t4_count)"
              fail=1
            fi
            # `rust crates` stat-card must match actual Cargo.toml count
            # (any submodule with top-level Cargo.toml is a Rust crate).
            # Only run this check when submodules are initialized — this
            # job uses actions/checkout WITHOUT submodules:true, so the
            # directories may be empty placeholders.
            actual_rust=0
            while read -r path; do
              if [ -f "$path/Cargo.toml" ]; then
                actual_rust=$((actual_rust + 1))
              fi
            done < <(git config -f .gitmodules --get-regexp '^submodule\..*\.path$' | awk '{print $2}')
            docs_rust=$(grep -oE '"n">[0-9]+</div><div class="l">rust crates' docs/index.html | grep -oE '[0-9]+' | head -1)
            if [ "$actual_rust" -gt 0 ] && [ -n "$docs_rust" ] && [ "$docs_rust" != "$actual_rust" ]; then
              echo "::error::docs/index.html rust-crates stat-card says $docs_rust but actual top-level Cargo.toml count is $actual_rust"
              fail=1
            elif [ "$actual_rust" -eq 0 ]; then
              echo "rust-crates check skipped: submodules not initialized in this job (Cargo.toml count is 0)"
            fi
          fi
          exit $fail
