        # required to grow).
        # 89/89 non-allowlisted workflows green at iter-169
        # add — pure regression floor.
        run: bash tests/workflow-size-bound.sh
      - name: Cargo.toml file size is under 500 lines
        # Cargo manifests are config, not programs. 500+
        # lines almost always means: too many [[bin]]
        # (split into workspace members), excessive
