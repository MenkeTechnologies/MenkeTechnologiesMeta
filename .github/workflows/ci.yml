name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitmodules-syntax:
    name: .gitmodules syntax
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - name: Verify every submodule path has a matching url
        run: |
          set -euo pipefail
          # Each [submodule "X"] block must have a `path` and a `url` line.
          paths=$(git config -f .gitmodules --get-regexp '^submodule\..*\.path$' | wc -l)
          urls=$(git config -f .gitmodules --get-regexp  '^submodule\..*\.url$'  | wc -l)
          echo "found $paths path entries, $urls url entries"
          if [ "$paths" != "$urls" ]; then
            echo "::error::path/url count mismatch — every [submodule] block needs both"
            exit 1
          fi
      - name: Every submodule URL must be https://github.com/MenkeTechnologies/<repo>.git
        run: |
          set -euo pipefail
          bad=$(git config -f .gitmodules --get-regexp '^submodule\..*\.url$' \
            | awk '{print $2}' \
            | grep -vE '^https://github\.com/MenkeTechnologies/[A-Za-z0-9._-]+\.git$' || true)
          if [ -n "$bad" ]; then
            echo "::error::non-canonical submodule URLs found:"
            echo "$bad"
            exit 1
          fi
      - name: Every submodule path must be a top-level directory name with no slashes
        run: |
          set -euo pipefail
          bad=$(git config -f .gitmodules --get-regexp '^submodule\..*\.path$' \
            | awk '{print $2}' \
            | grep '/' || true)
          if [ -n "$bad" ]; then
            echo "::error::nested submodule paths found (this repo expects flat layout):"
            echo "$bad"
            exit 1
          fi

  submodule-reachability:
    name: Submodule URL reachability
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: ls-remote every submodule URL
        run: |
          set -euo pipefail
          urls=$(git config -f .gitmodules --get-regexp '^submodule\..*\.url$' | awk '{print $2}')
          failures=""
          for u in $urls; do
            if ! git ls-remote --quiet "$u" HEAD >/dev/null 2>&1; then
              failures="$failures $u"
            fi
          done
          if [ -n "$failures" ]; then
            echo "::error::unreachable submodule URLs:$failures"
            exit 1
          fi
          echo "all $(echo "$urls" | wc -w) submodule URLs reachable"

  bin-scripts-shellcheck:
    name: Shellcheck helper scripts
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - run: sudo apt-get update && sudo apt-get install -y shellcheck
      - run: shellcheck bin/*

  bin-scripts-smoke:
    name: bin/ scripts smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: false
      - name: bin/status-all runs on empty checkout
        run: |
          set -euo pipefail
          # No submodules initialized — status-all should still produce headers
          # without erroring out (each submodule row will show "not init" markers).
          bash bin/status-all || true
          echo "status-all exit ok"
      - name: bin/foreach is invoked with a benign command
        run: |
          set -euo pipefail
          # With no submodules initialized, `git submodule foreach` is a no-op.
          # We're testing the wrapper doesn't crash on empty.
          bash bin/foreach 'true' || true
      - name: bin-scripts contract pins (+x, sh -n, usage)
        # Pin that every bin/ script has the executable bit, parses
        # under sh -n, and bin/foreach surfaces its usage when called
        # without args. Matches the checked-in tests/bin-scripts.sh
        # so contributors can run the same script locally.
        run: bash tests/bin-scripts.sh
      - name: submodule integrity pins (64 entries, paths exist, urls valid)
        # Pin .gitmodules structural invariants: 64 entries, every path
        # exists in the working tree, every url is
        # https://github.com/MenkeTechnologies/<name>.git, repo name
        # matches path basename, no duplicates. Runs without needing
        # `git submodule update --init` because it only reads
        # .gitmodules + checks `[[ -d $path ]]` on the (empty) dirs.
        run: bash tests/submodule-integrity.sh

  homebrew-formulas:
    name: Homebrew tap formula quality
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - name: Init homebrew-menketech submodule only
        # The full --recurse takes minutes; we only need one submodule.
        run: git submodule update --init --depth 1 homebrew-menketech
      - name: Formula version / sha256 / url / install invariants
        # Catches placeholder sha256s (broken auto-bump where the release
        # workflow couldn't push to the tap), url-vs-version drift, missing
        # install blocks. Same script as the local-runnable one in tests/.
        run: bash tests/homebrew-formulas.sh

  cargo-doc-version-sync:
    name: Cargo.toml ↔ docs/*.html version sync
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - name: Per-submodule docs/*.html highest version >= Cargo.toml version
        # Catches the failure mode seen 2026-05-30 with powerliners:
        # Cargo.toml was at "0.2.1" while docs/report.html still claimed
        # "v0.0.8" — the docs got refreshed via per-stat batches that
        # missed the version field, so the public docs lied about the
        # current release. This script greps each submodule's
        # docs/*.html for the highest vN.N.N (skipping Perl/Python/Rust
        # toolchain mentions) and FAILs if it's behind Cargo.toml's
        # version field.
        run: bash tests/cargo-doc-version-sync.sh
      - name: Per-submodule docs/*.html title + breadcrumb URL brand consistency
        # Catches the template-clone failure mode: dev copies docs/index.html
        # from a sibling repo, forgets to update <title> and/or the canonical
        # breadcrumb GitHub link, ships docs that brand-link to the wrong
        # project. Cross-references to sibling repos in body text ARE fine —
        # the check is scoped to <title> and the canonical breadcrumb only.
        run: bash tests/docs-brand-consistency.sh
      - name: Every Rust release.yml targeting tap must reference HOMEBREW_TAP_TOKEN
        # Catches the 2026-05-30 powerliners pattern: 4 release cycles
        # (v0.0.7 → v0.1.1) completed the build job + GH Release but
        # the "Update Homebrew tap" step died at checkout with bad
        # credentials because HOMEBREW_TAP_TOKEN wasn't referenced.
        # This gate catches missing-reference at PR time; it cannot
        # catch expired-PAT (runtime concern).
        run: bash tests/release-workflow-tap-secret.sh
      - name: Every Rust release.yml must build with --locked
        # Without --locked, `cargo build` silently rolls forward
        # transitive deps between tag-cut and rebuild — a user
        # `brew install`ing v1.2.3 today might get different transitive
        # crate versions than the same `brew install` next week, even
        # from the SAME upstream Cargo.toml. --locked refuses to mutate
        # Cargo.lock; CI fails if the lockfile is missing instead of
        # silently producing an unreproducible binary.
        run: bash tests/release-locked-build.sh
      - name: Every Tier 1 Rust binary ships man/man1/<bin>.1 + <bin>all.1
        # Pins the README line-82 convention: every Tier 1 Rust binary
        # submodule (excludes fusevm/Audio-Haxor/traderview/zpwr which
        # have different docs conventions) must ship the basic + "all"
        # variant man pages. Catches the failure mode where a new
        # binary is added to Tier 1 but the man-page step in its
        # build pipeline gets skipped (would have caught the 2026-05-30
        # powerliners gap that shipped v0.0.1 → v0.2.1 without man
        # pages while every sibling shipped them).
        run: bash tests/tier1-man-pages.sh
      - name: Every Rust submodule with Cargo license= ships a LICENSE file
        # MIT/Apache licenses themselves REQUIRE the notice text to ship
        # with distributed code. Cargo.toml claiming license="MIT" without
        # a LICENSE file in the repo root is (a) a MIT-violation, (b) a
        # crates.io "no license file detected" warning, (c) reduces
        # downstream trust. Caught 24 of 26 Rust submodules in this state
        # 2026-05-30; bulk-fixed with the canonical MenkeTechnologies MIT
        # text (same as siblings strykelang/iftoprs). Test accepts
        # LICENSE/LICENSE.md/LICENSE-MIT/LICENSE-APACHE dual-license forms.
        run: bash tests/license-file-present.sh
      - name: Every Rust binary submodule commits Cargo.lock
        # `cargo build --locked` is the standard release pattern, but it
        # only works when Cargo.lock is committed. Without it, release
        # builds silently roll forward transitive deps between tag-cut
        # and rebuild, producing unreproducible binaries. The Rust
        # community convention: library crates skip Cargo.lock; binary
        # crates commit it. Caught 2 of 26 binary repos in this state
        # 2026-05-30 (Audio-Haxor + spring-boot-rest-generator — both
        # blocked by ~/.gitignore_global's library-default rule).
        # Bulk-fixed via `cargo generate-lockfile --offline && git add -f`.
        # Test recognizes [[bin]] / default-run / src/main.rs / src/bin/*
        # as binary-eligibility signals, including workspace-root
        # Cargo.toml with src-tauri member binaries (Audio-Haxor pattern).
        run: bash tests/cargo-lock-committed.sh
      - name: Every Rust ci.yml runs the 4 canonical polish gates (fmt + clippy + doc + test)
        # Per docs/report.html "POLISH GATES" section: every Rust crate
        # should pass `cargo fmt --check`, `cargo clippy -- -D warnings`,
        # `RUSTDOCFLAGS=-D warnings cargo doc --no-deps`, and `cargo test`
        # in CI before a tag is cut. Initially caught 23 of 27 Rust
        # submodules missing one or more gates 2026-05-30; bulk-fixed 17
        # (14 stryke-* connectors + storageshower + iftoprs + nmaprs).
        # Allowlist (justified): strykelang/zshrs/fusevm mark fmt/clippy
        # advisory; Audio-Haxor/traderview use pnpm-driven Tauri builds;
        # spring-boot-rest-generator is mid Kotlin→Rust transition.
        run: bash tests/rust-ci-polish-gates.sh
      - name: Every Rust binary submodule with a tap formula has brew install in its README
        # UX failure mode: each Rust binary is `brew install`-able through
        # the unified MenkeTechnologies tap, but a user landing on the
        # GitHub README has no way to discover that path without the
        # explicit install line. Caught 8 of 9 Rust binary repos in this
        # state 2026-05-30 (powerliners was the only one with brew install
        # documented); bulk-fixed in iteration 15.
        run: bash tests/readme-brew-install.sh
      - name: Every brew formula's bin.install is a subset of its repo's Cargo.toml [[bin]]
        # Catches typos / stale renames in formula install blocks. If
        # bin.install references a binary that doesn't exist in
        # Cargo.toml, `brew install` errors at install time with a
        # missing-file message. Subset check (not equality): formulas
        # can legitimately install a subset of all [[bin]] (e.g. dev
        # tools like gen-docs / bench-autoload stay out of brew while
        # remaining in Cargo.toml as build targets).
        run: bash tests/formula-binary-coverage.sh
      - name: Per-submodule README.md ToC anchors all resolve to a real header
        # Each Markdown `(#anchor)` link is validated against the gfm
        # slug computed for every `# / ## / ###` header in the README.
        # Catches the failure mode where a section is renamed but the
        # ToC link is left pointing at the stale slug; GitHub renders
        # the link as a broken jump to the top of the page. Caught 8
        # broken anchors across powerliners + strykelang + lsofrs +
        # traderview 2026-05-30; all bulk-fixed in iters 17–18.
        # Slugger preserves underscores and consecutive hyphens, does
        # NOT trim leading/trailing hyphens — matches the actual gfm
        # behavior even on unusual headers like `## \`> STATUS\``
        # (slug `-status`, leading hyphen preserved).
        run: bash tests/readme-toc-anchors.sh
      - name: Every formula bin.install entry is actually built by release.yml
        # Closes the pairwise loop: iter-16 verified each formula bin
        # exists as a [[bin]] in Cargo.toml; this verifies each formula
        # bin is ALSO actually built and packaged by release.yml. Two
        # failure modes:
        #   (a) formula adds a new bin.install but release.yml's
        #       explicit --bin set doesn't include it — release tarball
        #       lacks the binary and `brew install` errors at install
        #       with "no such file"
        #   (b) release.yml drops --bin foo while formula still ships
        #       bin.install "foo" — same failure mode
        # Handles yaml `cargo build \\` line-continuation pattern by
        # joining backslash-terminated lines before scanning for --bin.
        run: bash tests/release-builds-formula-bins.sh
      - name: Every `brew install <name>` command in any README/doc refers to a real formula
        # Catches typos: `brew install awks` (typo for awkrs),
        # `brew install stryke-lang` (formula is `stryke`),
        # `brew install zshrs-cli` (no such formula). Users copy-pasting
        # the documented command hit `Error: No available formula`.
        # Strict line-pattern: only matches `brew install` as a command
        # (start of line after whitespace) — sentence-style mentions in
        # prose like "you might brew install something" are skipped.
        # Allowlist covers homebrew/core and known third-party-tap names
        # (redis, mongodb-community, etc.) so cross-references to
        # external formulas don't false-fail.
        run: bash tests/readme-brew-install-formula-exists.sh
      - name: Every man page's .TH version matches its repo's Cargo.toml version
        # `.TH NAME 1 "DATE" "<name> X.Y.Z" "User Commands"` is what
        # `man <name>` prints at the top of the page. When Cargo.toml
        # bumps via the bp shortcut but the man page isn't refreshed,
        # users see misleading version info AND downstream automation
        # that reads "report bugs against <version>" gets a stale
        # number. Caught 14 of 18 man pages drifted 2026-05-30
        # (iftoprs/lsofrs/awkrs/temprs/nmaprs/strykelang/zshrs all
        # behind their Cargo.toml by 0.0.x to 0.2.x versions); bulk-
        # fixed via sed-replace on the .TH header line only.
        run: bash tests/man-page-version-sync.sh
      - name: Every Rust Cargo.toml has repository = MenkeTechnologies/<name>
        # Cargo.toml's repository field surfaces on crates.io, in
        # `cargo metadata` consumers (dependabot, advisory DBs), and
        # in `cargo search` output. Missing → publish warnings +
        # broken tool resolution. Wrong → broken bug-report links and
        # bad audit data. Test handles both direct `repository = "..."`
        # entries and `repository.workspace = true` inheritance (Tauri
        # apps like traderview use the workspace-package indirection).
        # Caught 2 missing fields (Audio-Haxor / traderview src-tauri)
        # 2026-05-30; fixed via direct addition (Audio-Haxor) and
        # workspace-resolution support in the test (traderview already
        # had the right value, the test just needed to follow the
        # inheritance chain).
        run: bash tests/cargo-repository-field.sh
      - name: "Every release.yml triggers on `push: tags: ['v*']`"
        # Silent-failure catcher: someone bumps + tags a release, runs
        # `git push --tags`, and the workflow never fires because the
        # trigger expects a different tag shape (e.g. typo'd
        # `tags: ['release-*']`) or is missing the `tags:` block. The
        # user thinks the release is shipping — no GitHub Release is
        # ever created, formulas never bump, brew users stay on the
        # old version forever. Test accepts the canonical inline form
        # `tags: ['v*']` plus equivalent yaml variants (no quotes,
        # double-quotes, list-form `- 'v*'`).
        run: bash tests/release-tag-trigger.sh
      - name: Every Rust Cargo.toml has explicit `edition = "2021"` or "2024"
        # Missing edition silently defaults to 2015 — a 10-year-old
        # edition with `extern crate` requirements, trait-object
        # syntax differences, and pre-NLL borrow checker behavior.
        # A repo working today on edition 2021 by accident (the
        # compiler default in newer toolchains shifts) silently
        # regresses to 2015 when an older or differently-configured
        # toolchain is used. Test accepts `edition = "2021"` /
        # `"2024"` directly OR `edition.workspace = true` resolved
        # through workspace root's `[workspace.package]`. 2018
        # produces a WARN (still supported but org default is 2021);
        # 2015 / missing / unknown fail.
        run: bash tests/cargo-edition-field.sh
      - name: Every Rust Cargo.toml has authors attributing MenkeTechnologies
        # crates.io publish proceeds without an authors field but the
        # crate page silently drops attribution — downstream advisory
        # DBs / mirror tools / dependabot can't resolve maintainer.
        # Catches missing authors AND post-fork attribution drift
        # (someone-else's name with no MenkeTechnologies/Jacob Menke
        # identifier). Test accepts the canonical org form
        # `["MenkeTechnologies"]` plus explicit-contact variants and
        # workspace inheritance. Caught 4 missing fields 2026-05-30
        # (awkrs / iftoprs / nmaprs / storageshower); bulk-fixed with
        # the org-name form matching 20+ siblings.
        run: bash tests/cargo-authors-field.sh
      - name: Every Rust Cargo.toml has homepage pointing at GH Pages or repo
        # crates.io shows homepage as the primary "visit project" link
        # on the crate page. Without it the only resolvable link is
        # the repository field (still useful but duplicates the GitHub
        # entry-point and skips the rendered docs at GH Pages). Caught
        # 25 of 27 Rust submodules missing this field 2026-05-30; bulk-
        # fixed with `https://menketechnologies.github.io/<repo>/` where
        # docs/index.html exists, GitHub repo URL fallback otherwise.
        # Test accepts MenkeTechnologies-attributable https URLs and
        # workspace inheritance.
        run: bash tests/cargo-homepage-field.sh
      - name: Every Rust Cargo.toml description stays under the 150-char display cap
        # crates.io search results truncate descriptions at ~100 chars
        # in the card view; the crate page itself wraps awkwardly past
        # ~150 chars. Thresholds: <= 100 PASS, 100-150 WARN (still
        # acceptable), > 150 FAIL. Caught 2 over hard cap 2026-05-30
        # (fusevm 152 chars dropped to 108; spring-boot-rest-generator
        # 202 chars dropped to 119). Test does NOT enforce the
        # Homebrew 80-char cap on Cargo's description — brew has its
        # own desc field enforced by homebrew-menketech's
        # formula-consistency.rb.
        run: bash tests/cargo-description-length.sh
      - name: Every publishable Rust Cargo.toml has keywords + categories
        # crates.io discoverability vectors: users find crates by
        # browsing categories and searching keywords. Without these,
        # the crate is effectively invisible outside of direct-name
        # lookup. Test skips publish=false crates (the 14 stryke-*
        # connectors + 2 Tauri apps Audio-Haxor/traderview added in
        # iter 28). Caught 5 publishable crates missing both fields
        # 2026-05-30 (strykelang/powerliners/spring-boot-rest-generator
        # + the 2 Tauri apps which were correctly reclassified as
        # publish=false instead). Validates 5-keyword max per crates.io
        # ingest endpoint.
        run: bash tests/cargo-keywords-categories.sh
      - name: Every publishable Rust Cargo.toml has documentation pointing at own crate
        # Validates the URL path component STARTS with the crate name,
        # not just contains it as a substring. Caught the real iter-29
        # zshrs case where documentation = "https://menketechnologies
        # .github.io/strykelang/zshrs.html" — substring "zshrs"
        # present but path prefix was /strykelang/ from copy-paste.
        # Accepts docs.rs/<name> (preferred — auto-rendered rustdoc on
        # every publish) or GH Pages /<repo>/ (acceptable when hand-
        # curated docs complement docs.rs). Bulk-added explicit
        # documentation field to 8 of 11 publishable crates 2026-05-30.
        run: bash tests/cargo-documentation-field.sh
      - name: Every shields.io crates.io badge URL matches Cargo.toml package name
        # Catches the failure mode where a README is copy-pasted from
        # a sibling crate (or a crate is renamed) but the
        # `img.shields.io/crates/v/<name>` badge URL is left pointing
        # at the old/wrong name. The badge image still renders (with
        # shields.io's "crate not found" fallback at worst) so it
        # looks valid — but clicking the badge sends users to the
        # WRONG crates.io page. Hard to spot visually.
        # Covers v/d/l/dr badge shapes. Skips READMEs without any
        # crates.io badge (the field is optional).
        run: bash tests/readme-crates-badge.sh
      - name: Every README binary-count claim matches Cargo.toml [[bin]] count
        # Codifies the iter-9 powerliners audit finding: the README
        # listed a "powerliners" binary that had been dropped in v0.1.1
        # but was still in the binary table. Without this gate,
        # future drift between the README's "N-binary suite" claim
        # and Cargo.toml's actual [[bin]] entries would require
        # repeated manual audits.
        # Detects strict shapes only ("N-binary", "ships N binaries",
        # "the N binaries", "N binaries:") to avoid false positives
        # from prose like "Perl 5 binary-protocol".
        run: bash tests/readme-binary-count-claim.sh
      - name: shellcheck tests/*.sh — audit the auditors
        # Meta-meta gate: the audit scripts in tests/ are themselves
        # code that can have bugs. shellcheck catches dropped `cd ||
        # exit` guards, unquoted variables, unreferenced locals, etc.
        # Iteration 32 cleanup: bulk-added `|| exit` guards to 28 cd
        # calls (SC2164) so a missing $root dir wouldn't silently
        # operate on the wrong tree. Severity gate is `error` only —
        # warning/info findings are surfaced but don't fail CI to
        # avoid noise from intentional patterns (e.g. version_gt
        # function's IFS-based array split, deliberate `tr -d '\\'`).
        run: |
          sudo apt-get update && sudo apt-get install -y shellcheck
          bash tests/shellcheck-tests.sh
      - name: Per-Rust Cargo.toml version >= latest git tag (monotonic semver)
        # Catches the regression failure mode where someone reverts
        # Cargo.toml's version below the latest published tag. The
        # release.yml on tag would attempt to re-upload an older
        # version; crates.io rejects duplicate version uploads, so
        # the publish silently fails. Three states surfaced:
        #   cargo == tag: PASS (just released, quiescent)
        #   cargo > tag: INFO (dev cycle ahead — normal)
        #   cargo < tag: FAIL (semver regression)
        # Iteration 33 add-time state: 24 PASS, 2 INFO (Audio-Haxor
        # 1.28.15 ahead of v1.28.9; powerliners 0.2.2 ahead of v0.2.1),
        # 0 regressions.
        run: bash tests/cargo-vs-tag-version.sh
      - name: Per-Rust Cargo.toml exclude audit (informational — bloat surfacing)
        # Reports each publishable crate's unexcluded dev dirs (docs/,
        # tests/, benches/, vendor/, parity/, .github/, fuzz/). Without
        # an explicit exclude, `cargo publish` ships everything `git
        # ls-files` matches, bloating the .crate file with content
        # downstream consumers don't need.
        # Informational only — never fails CI. The "right" exclude
        # set is opinionated (examples/ is sometimes wanted), so the
        # signal is "here's your bloat in MB; decide whether to
        # exclude" — not a forced rule. Add-time state (iter 34):
        # 3 clean, 8 with bloat (largest: powerliners 5 MB from vendor/
        # Python upstream checkout, storageshower 5 MB, fusevm 3 MB).
        run: bash tests/cargo-exclude-bloat.sh
      - name: Every man page's .SH NAME line has canonical format
        # Pins the man-pages(7) convention: the first content line
        # under `.SH NAME` must be `<stem>[, <alias>...] \- <description>`.
        # Mis-formatted .SH NAME silently breaks `whatis`, `apropos`,
        # and `mandb -c`. Test regex accepts the canonical multi-name
        # alias form (e.g. `temprs, tp \- ...`) per man-pages(7) §10
        # ("Several short identifiers, separated by commas, may be
        # listed if commands share a man page"). 22/22 man pages green
        # at add time (iter 35) — gate prevents future regressions.
        run: bash tests/man-page-name-format.sh
      - name: Every Rust submodule's .gitignore excludes target/
        # Caught powerliners 2026-05-30: no .gitignore at all. The
        # user's ~/.gitignore_global protected this dev, but fresh CI
        # clones / new-contributor workstations without that global
        # config would silently commit the cargo build directory.
        # Fix: add `/target/` to repo-local .gitignore (+ `!Cargo.lock`
        # override for binary crates per the iter-11 lock convention).
        run: bash tests/gitignore-target.sh
      - name: Every Rust submodule's LICENSE matches the canonical MenkeTechnologies MIT
        # Pins byte-equality across all 26 MenkeTechnologies-authored
        # Rust submodule LICENSE files. Catches:
        #   (a) drift if one LICENSE gets typo-fixed or year-bumped
        #       without coordinated org-wide update
        #   (b) accidental replacement with an entirely different text
        # Scoped to Rust submodules only (Cargo.toml presence detection) —
        # third-party zsh plugins (zsh-z, fzf-tab, kubectl-aliases,
        # revolver, zunit, etc.) ship upstream authors' LICENSE text
        # and would misattribute authorship if forced to MenkeTechnologies.
        # Caught Audio-Haxor missing LICENSE at iter 37 (workspace-root
        # Cargo.toml has no license field — old iter-10 test never
        # reached src-tauri/Cargo.toml's license="MIT"); fixed via
        # Audio-Haxor@f06873e0bc + iter-10 test fall-through refinement.
        run: bash tests/license-canonical-text.sh
      - name: Every Cargo.lock self-version matches its Cargo.toml version
        # Catches the failure mode where someone bumps Cargo.toml's
        # version (via the `bp` shortcut or manual edit) but skips
        # running `cargo update`/`cargo build` to refresh the lockfile.
        # Cargo.lock's [[package]] entry for the crate's OWN name then
        # references an older release. Consequences:
        #   - `cargo build --locked` (the iter-6 release pattern) FAILS
        #     because the requested dependency version doesn't match
        #   - cargo publish proceeds but ships a broken bundled lockfile;
        #     downstream `cargo install --locked` users hit build errors
        # The fix is `cargo update -p <crate>`. 26/26 green at add time.
        # Awk gotcha discovered while writing the test: the natural
        # `print cur_ver; exit` pattern also re-fires the END block on
